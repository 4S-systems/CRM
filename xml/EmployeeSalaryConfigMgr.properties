insertEmpSalConfig=INSERT INTO EMP_SALARY_CONFIG values (?,?,?,SYSDATE, ?, ?, ?,?,'UL','UL','UL','UL')
getEmpSalConfig=Select EMP_SALARY_CONFIG.EXPENSE_ID,CODE,DESC_AR,DESC_EN, CONFIG_VALUE, CONFIG_PERSENTAGE,CONFIG_TYPE,EMP_SALARY_CONFIG.CREATION_TIME From EMP_SALARY_CONFIG inner join EXPENSE_ITEM on EMP_SALARY_CONFIG.EXPENSE_ID = EXPENSE_ITEM.ID where EMP_SALARY_CONFIG.EMP_ID = ?
