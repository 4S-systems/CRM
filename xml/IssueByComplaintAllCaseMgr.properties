getRequestsBetweenDates=select distinct I.ISSUE_ID, ISSUE_TITLE, I.PROJECT_NAME, BUSINESS_ID, BUSINESS_ID_BY_DATE, BUSINESS_COMP_ID, COMP_ID, CURRENT_OWNER, CURRENT_OWNER_ID, CURRENT_OWNER_SINCE, CUSTOMER_ID, CUSTOMER_NAME, USER_ID, USER_NAME, FULL_NAME, SENDER_ID, SENDER_NAME, ENTRY_DATE, RECEIP_ID, CLIENT_COM_ID, (select count(*) from REQUESTEDDOCS WHERE REQUESTEDDOCS.DOC_ID = I.ISSUE_ID ) as counts, P.PROJECT_NAME NAME_OF_PROJECT from ISSUE_BY_COMPLAINT_ALL_CASE I left join ISSUE_PROJECT IP on I.ISSUE_ID = IP.ISSUE_ID left join PROJECT P on IP.PROJECT_ID = P.PROJECT_ID where customer_id like '%contractorID%' and sender_id like '%engineerID%' and entry_date between to_date(?,'DD-MM-YY') and to_date(?,'DD-MM-YY') and ticket_type = ? AND END_DATE IS NULL
