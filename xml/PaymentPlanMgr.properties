insertPaymentPlan = INSERT INTO PAYMENT_PLAN (PLAN_ID, PLAN_TITLE, PAYMNET_AMT, DOWN_PMT_AMT, DOWN_PMT_DATE, FIRST_INSTALL_DATE, DISCOUNT_AMT, NUM_INSTALLMENTS, RESERVATION_AMOUNT, CREATED_BY, CREATION_DATE, CLIENT_ID, UNIT_ID, UNIT_ENTITIES, STD_PLAN_ID, PAYMENT_PLAN_TYP) VALUES(?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)
insertPaymentPlanDetails = INSERT INTO PAYMENT_PLAN_DETAILS (PAYMNET_ID, PLAN_ID, PAYMENT_TITLE, PAYMENT_AMT, CREATED_BY, CREATION_TIME, PAYMENT_DATE, PAYMENT_TYPE) VALUES(?, ?, ?, ?, ?, ?, ?, ?)
getInstallmentPlan = SELECT PLAN_ID, PAYMENT_AMT, PAYMENT_DATE, PAYMENT_TYPE FROM PAYMENT_PLAN_DETAILS WHERE PLAN_ID = ?
deletePayPlan = DELETE FROM table WHERE PLAN_ID = ?
getPayPlanByClient = SELECT P.PLAN_ID, P.PLAN_TITLE, P.UNIT_ID, P.CREATION_DATE AS CREATION, U.FULL_NAME, ISS.STATUS_ID, ISS.ISSUE_TITLE FROM PAYMENT_PLAN P LEFT JOIN USERS U ON P.CREATED_BY = U.USER_ID LEFT JOIN ISSUE_STATUS ISS ON P.PLAN_ID = ISS.BUSINESS_OBJ_ID WHERE P.CLIENT_ID = ? AND ISS.END_DATE IS NULL AND ISS.OBJECT_TYPE = 'Payment_Plan'
getPayPlanDetails = SELECT UNIT_ID, PAYMNET_AMT FROM PAYMENT_PLAN WHERE PLAN_ID = ?
insertPaymentPlanIssStatus = INSERT INTO ISSUE_STATUS VALUES (?, ?, ?, 'UL', NULL, SYSDATE, '0', 'UL', 'UL', 'UL', ?, ?, 'UL', ?)
upPayPlanSt = UPDATE ISSUE_STATUS SET END_DATE = SYSDATE WHERE BUSINESS_OBJ_ID = ? AND END_DATE IS NULL AND OBJECT_TYPE = 'Payment_Plan'
getPayPlanToAllClients = SELECT PLAN_ID, PLAN_TITLE, UNIT_ID, CREATION_DATE,CLIENT_ID, ISS.STATUS_ID, ISS.ISSUE_TITLE , CL.NAME, U.FULL_NAME FROM PAYMENT_PLAN LEFT JOIN USERS U ON PAYMENT_PLAN.CREATED_BY = U.USER_ID LEFT JOIN CLIENT CL ON PAYMENT_PLAN.CLIENT_ID = CL.SYS_ID LEFT JOIN ISSUE_STATUS ISS ON PAYMENT_PLAN.PLAN_ID = ISS.BUSINESS_OBJ_ID WHERE ISS.END_DATE IS NULL AND ISS.OBJECT_TYPE = 'Payment_Plan' AND TRUNC(CREATION_DATE) BETWEEN TO_DATE(?, 'YYYY-MM-DD') AND TO_DATE(?, 'YYYY-MM-DD')
getPayPlanToAllClientsWioutFilters = SELECT PLAN_ID, PLAN_TITLE, UNIT_ID, CREATION_DATE,CLIENT_ID, ISS.STATUS_ID, ISS.ISSUE_TITLE , CL.NAME, U.FULL_NAME FROM PAYMENT_PLAN LEFT JOIN USERS U ON PAYMENT_PLAN.CREATED_BY = U.USER_ID LEFT JOIN CLIENT CL ON PAYMENT_PLAN.CLIENT_ID = CL.SYS_ID LEFT JOIN ISSUE_STATUS ISS ON PAYMENT_PLAN.PLAN_ID = ISS.BUSINESS_OBJ_ID WHERE ISS.END_DATE IS NULL AND ISS.OBJECT_TYPE = 'Payment_Plan' 
getAllMyPayPlans=SELECT PP.*, ISS.STATUS_ID, ISS.ISSUE_TITLE , CL.NAME, CL.MOBILE, CL.INTER_PHONE, U.FULL_NAME, I.ID ISSUE_ID, CC.ID COMPLAINT_ID, RPD.PAYMENT_AMT RESERVATION_PAYMENT_AMOUNT, DPD.PAYMENT_AMT DOWN_PAYMENT_AMOUNT, P.MAIN_PROJ_ID PARENT_ID, P.PROJECT_NAME UNIT_NAME FROM PAYMENT_PLAN PP LEFT JOIN USERS U ON PP.CREATED_BY = U.USER_ID LEFT JOIN CLIENT CL ON PP.CLIENT_ID = CL.SYS_ID LEFT JOIN ISSUE_STATUS ISS ON PP.PLAN_ID = ISS.BUSINESS_OBJ_ID RIGHT JOIN ISSUE I ON CL.SYS_ID = I.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID LEFT JOIN PAYMENT_PLAN_DETAILS RPD ON PP.PLAN_ID = RPD.PLAN_ID AND RPD.PAYMENT_TYPE = 'reservarion' LEFT JOIN PAYMENT_PLAN_DETAILS DPD ON PP.PLAN_ID = DPD.PLAN_ID AND DPD.PAYMENT_TYPE = 'downPayment' LEFT JOIN PROJECT P ON PP.UNIT_ID = P.PROJECT_ID WHERE PP.CREATED_BY = ? AND ISS.END_DATE IS NULL AND ISS.OBJECT_TYPE = 'Payment_Plan' AND P.PROJECT_ID IS NOT NULL
getApprovedPlanDetails=SELECT PPD.PAYMNET_ID, PPD.PLAN_ID,PPD.PAYMENT_AMT, PPD.PAYMENT_DATE, PPD.PAYMENT_TYPE FROM PAYMENT_PLAN_DETAILS PPD LEFT JOIN PAYMENT_PLAN PP ON PPD.PLAN_ID = PP.PLAN_ID LEFT JOIN ISSUE_STATUS ST ON PP.PLAN_ID = ST.BUSINESS_OBJ_ID AND ST.END_DATE IS NULL WHERE ST.STATUS_NAME = '82' AND PP.CLIENT_ID = ? AND PP.UNIT_ID = ? ORDER BY PPD.PAYMENT_DATE
getIntallmentsToBeCollected = SELECT PD.*, PL.PLAN_TITLE, CL.NAME CLIENT_NAME, PR.PROJECT_NAME UNIT_NAME FROM PAYMENT_PLAN_DETAILS PD LEFT JOIN PAYMENT_PLAN PL ON PD.PLAN_ID = PL.PLAN_ID LEFT JOIN ISSUE_STATUS ST ON PL.PLAN_ID = ST.BUSINESS_OBJ_ID AND ST.END_DATE IS NULL LEFT JOIN CLIENT CL ON PL.CLIENT_ID = CL.SYS_ID LEFT JOIN PROJECT PR ON PL.UNIT_ID = PR.PROJECT_ID WHERE TRUNC(PD.PAYMENT_DATE) BETWEEN ? AND ? AND ST.STATUS_NAME = '82'
getPayPlanInSpecificDay = SELECT PLAN_ID, PLAN_TITLE, UNIT_ID,CREATION_DATE, ISS.STATUS_ID, ISS.ISSUE_TITLE , CL.NAME, PR.PROJECT_NAME AS UNIT_NAME FROM PAYMENT_PLAN LEFT JOIN ISSUE_STATUS ISS ON PAYMENT_PLAN.PLAN_ID = ISS.BUSINESS_OBJ_ID LEFT JOIN CLIENT CL ON PAYMENT_PLAN.CLIENT_ID = CL.SYS_ID LEFT JOIN PROJECT PR ON PAYMENT_PLAN.UNIT_ID = PR.PROJECT_ID WHERE CLIENT_ID = ? AND ISS.END_DATE IS NULL AND ISS.OBJECT_TYPE = 'Payment_Plan' and TRUNC(CREATION_DATE) = to_date(?,'yyyy/MM/dd') 
getClientInstallments=SELECT P.PROJECT_NAME BUSINESS_ID, PD.PAYMENT_DATE IN_DATE, PD.PAYMENT_AMT TOTAL FROM PROJECT P LEFT JOIN PAYMENT_PLAN PP ON P.PROJECT_ID = PP.UNIT_ID LEFT JOIN PAYMENT_PLAN_DETAILS PD ON PP.PLAN_ID = PD.PLAN_ID WHERE PP.CLIENT_ID = ? ORDER BY PD.PAYMENT_DATE
getClientInstallments1=SELECT P.PROJECT_NAME BUSINESS_ID, PD.PAYMENT_DATE IN_DATE, PD.PAYMENT_AMT TOTAL FROM PROJECT P LEFT JOIN PAYMENT_PLAN PP ON P.PROJECT_ID = PP.UNIT_ID LEFT JOIN PAYMENT_PLAN_DETAILS PD ON PP.PLAN_ID = PD.PLAN_ID WHERE PP.CLIENT_ID = ? 