insertClientProject= insert into CLIENT_PROJECTS values(?,?,?,?,SYSDATE,?,?,?,?,?,?,?,?)
getReservedUnit = SELECT CP.ID, RES.ID AS RES_ID, ISS.STATUS_ID AS ISS_ID, CP.*,AD.MAX_PRICE as area, AD.OPTION1 as price , Project.PROJECT_DESCRIPTION , u.FULL_NAME FROM CLIENT_PROJECTS CP left join users u on CP.CREATED_BY = u.USER_ID inner join Project on CP.PROJECT_ID = Project.PROJECT_ID LEFT JOIN UNIT_PRICE AD ON CP.PROJECT_ID = AD.UNIT_ID LEFT JOIN RESERVATION RES ON CP.CLIENT_ID = RES.CLIENT_ID AND CP.PROJECT_ID = RES.PROJECT_ID AND RES.CURRENT_STATUS = '30' LEFT JOIN ISSUE_STATUS ISS ON CP.PROJECT_ID = ISS.BUSINESS_OBJ_ID WHERE CP.CLIENT_ID = ? AND ISS.END_DATE IS NULL AND ISS.STATUS_NAME = '9' AND ISS.END_DATE IS NULL
getInterestedUnit=select cp.* , u.FULL_NAME from CLIENT_PROJECTS cp left join users u on cp.CREATED_BY = u.USER_ID where client_id=? and product_id='interested'
getViewsUnit=select client_projects.ID, Client.NAME, Client.MOBILE, client_projects.project_id, client_projects.PRODUCT_CATEGORY_ID, client_projects.PRODUCT_NAME,client_projects.CREATION_TIME , client_projects.BUDGET, client_projects.PRODUCT_CATEGORY_NAME, Project.PROJECT_DESCRIPTION, UNIT_PRICE.MAX_PRICE , UNIT_PRICE.OPTION1, u.FULL_NAME from Client inner join client_projects on client.SYS_ID = client_projects.CLIENT_ID left join users u on client_projects.CREATED_BY = u.USER_ID inner join Project on client_projects.PROJECT_ID = Project.PROJECT_ID left join UNIT_PRICE on Project.PROJECT_ID = UNIT_PRICE.UNIT_ID where Client.SYS_ID = ? and client_projects.product_id='views'

getPurcheUnits= SELECT CP.ID, RES.ID AS RES_ID, ISS.STATUS_ID AS ISS_ID, CP.*,AD.MAX_PRICE as area, AD.OPTION1 as price , Project.PROJECT_DESCRIPTION , u.FULL_NAME FROM CLIENT_PROJECTS CP left join users u on CP.CREATED_BY = u.USER_ID inner join Project on CP.PROJECT_ID = Project.PROJECT_ID LEFT JOIN UNIT_PRICE AD ON CP.PROJECT_ID = AD.UNIT_ID LEFT JOIN RESERVATION RES ON CP.CLIENT_ID = RES.CLIENT_ID AND CP.PROJECT_ID = RES.PROJECT_ID AND RES.CURRENT_STATUS = '30' LEFT JOIN ISSUE_STATUS ISS ON CP.PROJECT_ID = ISS.BUSINESS_OBJ_ID WHERE CP.CLIENT_ID = ? AND ISS.END_DATE IS NULL AND ISS.STATUS_NAME = '10' AND ISS.END_DATE IS NULL

getProductsRatioPerRegion=SELECT c.PROJECT_NAME region, COUNT(PROJECT_NAME) AS product_count FROM client_projects cp right join (select cc.SYS_ID, p.PROJECT_NAME from client cc inner join project p on cc.REGION = p.PROJECT_ID) c on cp.client_id=c.sys_id GROUP BY c.PROJECT_NAME ORDER BY c.PROJECT_NAME ASC
getProductsRatio=SELECT CP.PRODUCT_CATEGORY_NAME product_name ,COUNT(cp.project_id) AS product_count FROM client_projects cp where CP.PRODUCT_ID = 'interested' whereCreationTime GROUP BY CP.PRODUCT_CATEGORY_NAME ORDER BY CP.PRODUCT_CATEGORY_NAME ASC
getClientProductNameAndWidth = select CLIENT_PROJECTS.Budget , CLIENT.code , CLIENT.name from CLIENT_PROJECTS INNER JOIN CLIENT ON CLIENT.SYS_ID = CLIENT_PROJECTS.CLIENT_ID WHERE CLIENT_PROJECTS.CREATION_TIME between to_date(?,'DD-MM-YY') and to_date(?,'DD-MM-YY')
updateProductStatus=update CLIENT_PROJECTS set product_id = ? where id = ?
canceledReservation=DELETE FROM CLIENT_PROJECTS WHERE ID = ?
isClientReservedUnits=SELECT COUNT(*) AS NUMBER_UNITS FROM CLIENT_PROJECTS WHERE CLIENT_ID = ?
updateReservedUnit=update CLIENT_PROJECTS set BUDGET = ?, PERIOD = ?, PAYMENT_SYSTEM = ?, NOTE = ?, UNIT_VALUE = ?, RESERVATION_VALUE = ?, CONTRACT_VALUE = ?, PLOT_AREA = ?, BUILDING_AREA = ?, BEFORE_DISCOUNT = ? where ID = ?
getClientProductWidthRatio=SELECT CLIENT_PROJECTS.BUDGET , COUNT(*) TOTAL FROM CLIENT_PROJECTS INNER JOIN CLIENT ON CLIENT.SYS_ID = CLIENT_PROJECTS.CLIENT_ID LEFT JOIN ISSUE_BY_COMPLAINT_UNIQUE IC ON CLIENT.SYS_ID = IC.CUSTOMER_ID WHERE CLIENT_PROJECTS.BUDGET NOT IN ('0', '000', 'UL') AND TRUNC(CLIENT_PROJECTS.CREATION_TIME) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND IC.CURRENT_OWNER_ID IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = ?) whereStatement GROUP BY CLIENT_PROJECTS.BUDGET UNION ALL SELECT 'Undefined' , COUNT(*) TOTAL FROM CLIENT_PROJECTS INNER JOIN CLIENT ON CLIENT.SYS_ID = CLIENT_PROJECTS.CLIENT_ID LEFT JOIN ISSUE_BY_COMPLAINT_UNIQUE IC ON CLIENT.SYS_ID = IC.CUSTOMER_ID WHERE (CLIENT_PROJECTS.BUDGET IN ('0', '000', 'UL') OR CLIENT_PROJECTS.BUDGET IS NULL) AND TRUNC(CLIENT_PROJECTS.CREATION_TIME) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND IC.CURRENT_OWNER_ID IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = ?) whereStatement
getMyClientProductWidthRatio = SELECT CLIENT_PROJECTS.BUDGET , COUNT(*) TOTAL FROM CLIENT_PROJECTS INNER JOIN CLIENT ON CLIENT.SYS_ID = CLIENT_PROJECTS.CLIENT_ID LEFT JOIN ISSUE_BY_COMPLAINT IC ON CLIENT.SYS_ID = IC.CUSTOMER_ID LEFT JOIN USERS U1 ON IC.CURRENT_OWNER_ID = U1.USER_ID WHERE CLIENT_PROJECTS.BUDGET NOT IN ('0', '000', 'UL') and IC.CURRENT_OWNER_ID = ? AND CLIENT_PROJECTS.CREATION_TIME BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') GROUP BY CLIENT_PROJECTS.BUDGET UNION ALL SELECT 'Undefined' , COUNT(*) TOTAL FROM CLIENT_PROJECTS INNER JOIN CLIENT ON CLIENT.SYS_ID = CLIENT_PROJECTS.CLIENT_ID WHERE (CLIENT_PROJECTS.BUDGET IN ('0', '000', 'UL') OR CLIENT_PROJECTS.BUDGET IS NULL) AND CLIENT_PROJECTS.CREATION_TIME BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY')
getReservedlientProduct = SELECT * FROM CLIENT_PROJECTS WHERE CLIENT_ID = ? AND PROJECT_ID = ? AND PRODUCT_ID = 'reserved'
updateClientProducts=UPDATE CLIENT_PROJECTS set unit_value = ? where id = ?
getprojectsNameByClientsAndWidth = select cp.Budget ,U.FULL_NAME, cp.CREATION_TIME, project.PROJECT_NAME as unitNm,p1.PROJECT_NAME as projNm, project.PROJECT_ID , CLIENT.name from project INNER JOIN CLIENT_PROJECTS cp ON project.PROJECT_ID = cp.PROJECT_ID INNER JOIN project p1 ON cp.PRODUCT_CATEGORY_ID = p1.PROJECT_ID INNER JOIN USERS U ON cp.CREATED_BY = U.USER_ID INNER JOIN CLIENT ON cp.CLIENT_ID=CLIENT.SYS_ID LEFT JOIN ISSUE_BY_COMPLAINT_UNIQUE IC ON CLIENT.SYS_ID = IC.CUSTOMER_ID WHERE trunc(cp.CREATION_TIME) between to_date(?,'DD-MM-YY') and to_date(?,'DD-MM-YY') AND IC.CURRENT_OWNER_ID IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = ?) whereStatement ORDER BY CLIENT.name
getprojectsNameByMyClientsAndWidth = select cp.Budget ,U.FULL_NAME, cp.CREATION_TIME, project.PROJECT_NAME as unitNm,p1.PROJECT_NAME as projNm, project.PROJECT_ID , CLIENT.name, U1.FULL_NAME from project INNER JOIN CLIENT_PROJECTS cp ON project.PROJECT_ID = cp.PROJECT_ID INNER JOIN project p1 ON cp.PRODUCT_CATEGORY_ID = p1.PROJECT_ID INNER JOIN USERS U ON cp.CREATED_BY = U.USER_ID INNER JOIN CLIENT ON cp.CLIENT_ID=CLIENT.SYS_ID LEFT JOIN ISSUE_BY_COMPLAINT IC ON CLIENT.SYS_ID = IC.CUSTOMER_ID LEFT JOIN USERS U1 ON IC.CURRENT_OWNER_ID = U1.USER_ID WHERE IC.CURRENT_OWNER_ID = ? and cp.CREATION_TIME between to_date(?,'DD-MM-YY') and to_date(?,'DD-MM-YY') ORDER BY CLIENT.name
updateClientSProject = UPDATE CLIENT_PROJECTS SET PROJECT_ID = ?, PRODUCT_CATEGORY_ID = ?, PRODUCT_CATEGORY_NAME = ?, CREATED_BY = ?, CREATION_TIME = SYSDATE WHERE CLIENT_ID IN (clntIDS) AND (PROJECT_ID = ? OR PRODUCT_CATEGORY_ID = ?) AND PRODUCT_ID = 'interested'

viewMyPurchUnits = SELECT UNIQUE CP.CREATION_TIME,CP.PROJECT_ID, CP.CLIENT_ID,  CP.ID , C.NAME, P.PROJECT_NAME AS UNIT, P1.PROJECT_NAME AS PROJECT, U.FULL_NAME AS CREATED_BY, UP.MAX_PRICE AS AREA, UP.OPTION1 AS PRICE , U2.FULL_NAME AS distTo FROM CLIENT_PROJECTS CP LEFT JOIN ISSUE I ON CP.CLIENT_ID = I.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID LEFT JOIN USERS U2 ON CC.CURRENT_OWNER_ID = U2.USER_ID LEFT JOIN CLIENT C ON CP.CLIENT_ID = C.SYS_ID LEFT JOIN PROJECT P ON CP.PROJECT_ID = P.PROJECT_ID LEFT JOIN PROJECT P1 ON CP.PRODUCT_CATEGORY_ID = P1.PROJECT_ID LEFT JOIN USERS U ON CP.CREATED_BY = U.USER_ID LEFT JOIN UNIT_PRICE UP ON CP.PROJECT_ID = UP.UNIT_ID WHERE CP.PRODUCT_ID = 'purche'AND CP.CREATED_BY =? AND CP.CREATION_TIME between to_date(?,'DD-MM-YY') and to_date(?,'DD-MM-YY')

viewSalesUnits = SELECT UNIQUE CP.CREATION_TIME,CP.PROJECT_ID, CP.CLIENT_ID,  CP.ID , C.NAME, C.CREATION_TIME REGISTRATION_DATE, P.PROJECT_NAME AS UNIT, P1.PROJECT_NAME AS PROJECT, U.FULL_NAME AS CREATED_BY, UP.MAX_PRICE AS AREA, UP.OPTION1 AS PRICE , M.PROJECT_NAME MODEL_NAME FROM CLIENT_PROJECTS CP LEFT JOIN ISSUE I ON CP.CLIENT_ID = I.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID INNER JOIN CLIENT C ON CP.CLIENT_ID = C.SYS_ID LEFT JOIN PROJECT P ON CP.PROJECT_ID = P.PROJECT_ID LEFT JOIN PROJECT P1 ON CP.PRODUCT_CATEGORY_ID = P1.PROJECT_ID LEFT JOIN USERS U ON CP.CREATED_BY = U.USER_ID LEFT JOIN UNIT_PRICE UP ON CP.PROJECT_ID = UP.UNIT_ID LEFT JOIN PROJECT M ON P.EQ_NO = M.PROJECT_ID WHERE CP.PRODUCT_ID = 'purche' AND CP.CREATION_TIME between to_date(?,'DD-MM-YY') and to_date(?,'DD-MM-YY')
getSalesTotalByYear=SELECT EXTRACT(MONTH FROM CP.CREATION_TIME) "MONTH", SUM(UP.OPTION1) TOTAL_VALUE FROM PROJECT P RIGHT JOIN CLIENT_PROJECTS CP ON P.PROJECT_ID = CP.PROJECT_ID LEFT JOIN CLIENT C ON CP.CLIENT_ID = C.SYS_ID LEFT JOIN USERS U ON CP.CREATED_BY = U.USER_ID LEFT JOIN ISSUE_STATUS ST ON CP.PROJECT_ID = ST.BUSINESS_OBJ_ID AND ST.END_DATE IS NULL LEFT JOIN UNIT_PRICE UP ON P.PROJECT_ID = UP.UNIT_ID WHERE CP.PRODUCT_ID = 'purche' AND EXTRACT(YEAR FROM CP.CREATION_TIME) = ? GROUP BY EXTRACT(MONTH FROM CP.CREATION_TIME) ORDER BY EXTRACT(MONTH FROM CP.CREATION_TIME)
getViewsUnitByDate = select client_projects.ID, Client.NAME, Client.MOBILE, client_projects.project_id, client_projects.PRODUCT_CATEGORY_ID, client_projects.PRODUCT_NAME,client_projects.CREATION_TIME , client_projects.BUDGET, client_projects.PRODUCT_CATEGORY_NAME, Project.PROJECT_DESCRIPTION, UNIT_PRICE.MAX_PRICE , UNIT_PRICE.OPTION1, u.FULL_NAME from Client inner join client_projects on client.SYS_ID = client_projects.CLIENT_ID left join users u on client_projects.CREATED_BY = u.USER_ID inner join Project on client_projects.PROJECT_ID = Project.PROJECT_ID left join UNIT_PRICE on Project.PROJECT_ID = UNIT_PRICE.UNIT_ID where Client.SYS_ID = ? and client_projects.product_id='views' and TRUNC(client_projects.CREATION_TIME) = to_date(?,'yyyy/MM/dd')

viewMyViewsUnits=SELECT UNIQUE P.PROJECT_NAME AS UNIT, CP.CREATION_TIME,CP.PROJECT_ID, CP.CLIENT_ID,CP.ID , C.NAME, C.MOBILE, C.EMAIL ,P1.PROJECT_NAME AS PROJECT, U.FULL_NAME AS CREATED_BY, UP.MAX_PRICE AS AREA, UP.OPTION1 AS PRICE FROM CLIENT_PROJECTS CP LEFT JOIN ISSUE I ON CP.CLIENT_ID = I.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID LEFT JOIN CLIENT C ON CP.CLIENT_ID = C.SYS_ID LEFT JOIN PROJECT P ON CP.PROJECT_ID = P.PROJECT_ID LEFT JOIN PROJECT P1 ON CP.PRODUCT_CATEGORY_ID = P1.PROJECT_ID LEFT JOIN USERS U ON CP.CREATED_BY = U.USER_ID LEFT JOIN UNIT_PRICE UP ON CP.PROJECT_ID = UP.UNIT_ID WHERE CP.PRODUCT_ID = 'views' AND CP.CREATED_BY = ? AND TRUNC(CP.CREATION_TIME) between to_date(?,'DD-MM-YY') and to_date(?,'DD-MM-YY')
viewClientsViewsUnits = SELECT UNIQUE P.PROJECT_NAME AS UNIT, CP.CREATION_TIME,CP.PROJECT_ID, CP.CLIENT_ID,CP.ID , C.NAME, C.MOBILE, C.EMAIL ,P1.PROJECT_NAME AS PROJECT, U.FULL_NAME AS CREATED_BY, UP.MAX_PRICE AS AREA, UP.OPTION1 AS PRICE FROM CLIENT_PROJECTS CP LEFT JOIN ISSUE I ON CP.CLIENT_ID = I.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID LEFT JOIN CLIENT C ON CP.CLIENT_ID = C.SYS_ID LEFT JOIN PROJECT P ON CP.PROJECT_ID = P.PROJECT_ID LEFT JOIN PROJECT P1 ON CP.PRODUCT_CATEGORY_ID = P1.PROJECT_ID LEFT JOIN USERS U ON CP.CREATED_BY = U.USER_ID LEFT JOIN UNIT_PRICE UP ON CP.PROJECT_ID = UP.UNIT_ID WHERE CP.PRODUCT_ID = 'views' AND TRUNC(CP.CREATION_TIME) between to_date(?,'DD-MM-YY') and to_date(?,'DD-MM-YY')
getReserveSellUser=SELECT U.USER_ID, U.USER_NAME, U.FULL_NAME FROM CLIENT_PROJECTS CP LEFT JOIN USERS U ON CP.CREATED_BY = U.USER_ID WHERE CP.PROJECT_ID = ? AND CP.PRODUCT_ID = ?