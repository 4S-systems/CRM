updateCurrentStatus=UPDATE CLIENT_COMPLAINTS SET CURRENT_STATUS = ?, CURRENT_STATUS_SINCE = SYSDATE WHERE ID = ?
updateCurrentOwner=UPDATE CLIENT_COMPLAINTS SET CURRENT_OWNER_ID = ?, CURRENT_OWNER = ?, CURRENT_STATUS_SINCE = SYSDATE WHERE ID = ?
getCurrentSenderAndResponsible=SELECT U1.USER_ID AS SENDER_ID, U1.FULL_NAME AS SENDER, U2.FULL_NAME AS RESPONSIBLE FROM DISTRIBUTION_LIST LIST, USERS U1, USERS U2 WHERE SYS_ID = (SELECT MAX(TO_NUMBER(SUB_LIST.SYS_ID)) FROM DISTRIBUTION_LIST SUB_LIST WHERE SUB_LIST.CLIENT_COM_ID = ? AND RESP_CONTEXT = '1') AND LIST.SENDER_ID = U1.USER_ID AND LIST.RECEIP_ID = U2.USER_ID
getLastClientComplaintForIssue=SELECT MAX(ID) AS CLIENT_COMPLAINTS_ID FROM CLIENT_COMPLAINTS WHERE ISSUE_ID = ?
insertClientComplaintProject = INSERT INTO CLIENT_COMPLAIN_PROJECT (PROJECT_ID,CLIENT_COMPLAIN_ID,CREATION_USER) VALUES (?,?,?)
getClientComplaintByFolderCode = select * from CLIENT_COMPLAINTS inner join CLIENT_COMPLAIN_PROJECT on CLIENT_COMPLAINTS.ID = CLIENT_COMPLAIN_PROJECT.CLIENT_COMPLAIN_ID  where CLIENT_COMPLAIN_PROJECT.PROJECT_ID = ?
getNumberOfAppropriations=SELECT COUNT(*) AS TOTAL FROM ISSUE_BY_COMPLAINT_ALL_CASE WHERE ISSUE_ID  = ? AND END_DATE IS NULL
getClientComplaintByIssueAndType=SELECT * FROM CLIENT_COMPLAINTS WHERE ISSUE_ID = ? AND TICKET_TYPE = ?
getLastTicketTypeOnIssue=SELECT ID FROM CLIENT_COMPLAINTS WHERE ID = (SELECT MAX(TO_NUMBER(SUB_C.ID)) FROM CLIENT_COMPLAINTS SUB_C WHERE SUB_C.ISSUE_ID = ? AND SUB_C.TICKET_TYPE = ?)

getEngEmployeeProduction=SELECT COUNT(I.USER_ID) TOTAL, I.USER_ID, U.FULL_NAME USER_NAME FROM   Issue I LEFT JOIN USERS U ON I.USER_ID = U.USER_ID WHERE  I.ISSUE_TITLE = ? AND trunc(I.CREATION_TIME) BETWEEN ? AND ? GROUP BY I.USER_ID, U.FULL_NAME

getEngEmployeeProduction1=SELECT COUNT(CO.CREATED_BY) TOTAL, CO.CREATED_BY, U.FULL_NAME USER_NAME FROM CLIENT_COMPLAINTS CO LEFT JOIN USERS U ON CO.CREATED_BY = U.USER_ID WHERE CO.TICKET_TYPE = ? AND trunc(CO.CREATION_TIME) BETWEEN ? AND ? GROUP BY CO.CREATED_BY, U.FULL_NAME

getNewClientComplaintsStatusRatio=SELECT COUNT(*) TOTAL, CO.CURRENT_STATUS, ST.CASE_AR STATUS_NAME_AR, ST.CASE_EN STATUS_NAME_EN FROM CLIENT_COMPLAINTS CO LEFT JOIN ISSUE I ON CO.ISSUE_ID = I.ID LEFT JOIN CLIENT CL ON I.URGENCY_ID = CL.SYS_ID LEFT JOIN STATUS_TYPE ST ON CO.CURRENT_STATUS = ST.ID WHERE CL.CURRENT_STATUS = '12' AND CL.CREATION_TIME BETWEEN ? AND ? GROUP BY CO.CURRENT_STATUS, ST.CASE_AR, ST.CASE_EN
updateBusinessCompID=UPDATE CLIENT_COMPLAINTS SET BUSINESS_COMP_ID = ? WHERE ID = ?
updateBusinessCompComment=UPDATE DISTRIBUTION_LIST SET ANY_COMMENT =? WHERE CLIENT_COM_ID =?

getAllQCNotCompletedComplaints=SELECT C.*, I.CURRENT_STATUS ISSUE_STATUS FROM CLIENT_COMPLAINTS C LEFT JOIN ISSUE I ON C.ISSUE_ID = I.ID WHERE  BUSINESS_COMP_ID LIKE 'QM-%' AND ISSUE_ID IN (SELECT ID FROM ISSUE WHERE ISSUE_TITLE = '\u0637\u0644\u0628 \u062a\u0633\u0644\u064a\u0645' AND CURRENT_STATUS IN ('40', '34')) AND C.CURRENT_STATUS NOT IN ('7') AND I.USER_ID != '1401524070443' union SELECT C.*, I.CURRENT_STATUS ISSUE_STATUS FROM CLIENT_COMPLAINTS C LEFT JOIN ISSUE I ON C.ISSUE_ID = I.ID WHERE  BUSINESS_COMP_ID LIKE 'QM-%' AND ISSUE_ID IN (SELECT ID FROM ISSUE WHERE ISSUE_TITLE = '\u0637\u0644\u0628 \u062a\u0633\u0644\u064a\u0645' AND CURRENT_STATUS IN ('36')) AND C.CURRENT_STATUS NOT IN ('7', '6') AND I.USER_ID != '1401524070443'
getActiveClientComplaint=SELECT CC.ID CLIENT_COMPLAINT_ID, I.ID ISSUE_ID FROM CLIENT_COMPLAINTS CC LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID WHERE I.URGENCY_ID = ? AND CC.CURRENT_STATUS NOT IN ('5', '6', '7') ORDER BY CC.ID ASC
updateClientComplaintsType=INSERT INTO CLIENT_COMPLAINTS_TYPE SELECT DISTINCT CLIENT_COM_ID, OPTION1 FROM DISTRIBUTION_LIST WHERE DISTRIBUTION_LIST.CLIENT_COM_ID NOT IN (SELECT ID FROM CLIENT_COMPLAINTS_TYPE)
getCustomerServiceReport=SELECT sumStatement C.CREATED_BY USER_ID, U.FULL_NAME FROM (SELECT countStatement CC.TICKET_TYPE, CC.CREATED_BY FROM CLIENT_COMPLAINTS CC WHERE CC.TICKET_TYPE IN (inStatement) AND TRUNC(CC.CREATION_TIME) BETWEEN ? AND ? AND CC.CREATED_BY IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID IN (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?) UNION SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?) GROUP BY CC.TICKET_TYPE, CC.CREATED_BY) C LEFT JOIN USERS U ON C.CREATED_BY = U.USER_ID GROUP BY C.CREATED_BY, U.FULL_NAME
getRequestsByUserInPeriod=SELECT CC.*, U.FULL_NAME CURRENT_OWNER_NAME, I.BUSINESS_ID_BY_DATE, C.SYS_ID CLIENT_ID, C.NAME CLIENT_NAME, ST.CASE_AR STATUS_NAME_AR, ST.CASE_EN STATUS_NAME_EN FROM CLIENT_COMPLAINTS CC LEFT JOIN USERS U ON CC.CURRENT_OWNER_ID = U.USER_ID LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID LEFT JOIN STATUS_TYPE ST ON CC.CURRENT_STATUS = ST.ID WHERE CC.CREATED_BY = ? AND CC.TICKET_TYPE = ? AND TRUNC(CC.CREATION_TIME) BETWEEN ? AND ?
getDistributionRequestsReport=SELECT sumStatement C.CURRENT_OWNER_ID USER_ID, U.FULL_NAME FROM (SELECT countStatement CC.TICKET_TYPE, CC.CURRENT_OWNER_ID FROM CLIENT_COMPLAINTS CC WHERE CC.TICKET_TYPE IN (inStatement) AND TRUNC(CC.CREATION_TIME) BETWEEN ? AND ? AND CC.CURRENT_OWNER_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID IN (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) GROUP BY CC.TICKET_TYPE, CC.CURRENT_OWNER_ID) C LEFT JOIN USERS U ON C.CURRENT_OWNER_ID = U.USER_ID GROUP BY C.CURRENT_OWNER_ID, U.FULL_NAME
getRequestsByOwnerInPeriod=SELECT CC.*, U.FULL_NAME CREATED_BY_NAME, I.BUSINESS_ID_BY_DATE, C.SYS_ID CLIENT_ID, C.NAME CLIENT_NAME, ST.CASE_AR STATUS_NAME_AR, ST.CASE_EN STATUS_NAME_EN FROM CLIENT_COMPLAINTS CC LEFT JOIN USERS U ON CC.CREATED_BY = U.USER_ID LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID LEFT JOIN STATUS_TYPE ST ON CC.CURRENT_STATUS = ST.ID WHERE CC.CURRENT_OWNER_ID = ? AND CC.TICKET_TYPE = ? AND TRUNC(CC.CREATION_TIME) BETWEEN ? AND ?

insertClientComplaintSLA = INSERT INTO CLIENT_COMPLAINTS_SLA VALUES (?, ?, ?, ?, ?, ?, NULL, NULL, NULL, NULL, NULL, NULL)
getComplaintsWithRate=SELECT DISTINCT CC.*, I.URGENCY_ID CLIENT_ID FROM CLIENT_COMPLAINTS CC LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN CLIENT_RATING CR ON I.URGENCY_ID = CR.CLIENT_ID WHERE CR.RATE_ID = ? AND CC.CURRENT_OWNER_ID = CR.CREATED_BY 
getRecentComplaints=SELECT CC.*, CC.ID CLIENT_COMPLAINT_ID, CC.CREATED_BY COMPLAINT_CREATED_BY, I.BUSINESS_ID_BY_DATE, U.FULL_NAME, ST.CASE_AR STATUS_NAME, U.EMAIL, TT.TYPE_NAME, CL.NAME CLIENT_NAME, CL.MOBILE FROM CLIENT_COMPLAINTS CC LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN USERS U ON CC.CURRENT_OWNER_ID = U.USER_ID LEFT JOIN STATUS_TYPE ST ON CC.CURRENT_STATUS = ST.ID LEFT JOIN CLIENT CL ON I.URGENCY_ID = CL.SYS_ID LEFT JOIN TICKET_TYPE TT ON CC.TICKET_TYPE = TT.TYPE_ID WHERE CC.TICKET_TYPE IN ('1', '3', '25') AND CC.CREATION_TIME BETWEEN SYSDATE - ? / (24 * 60) AND SYSDATE