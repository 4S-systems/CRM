updateIssueStatusClientComp= UPDATE CLIENT_COMPLAINTS SET CURRENT_STATUS = '7' WHERE ID = ? AND ISSUE_ID=?
updateIssueStauts=  UPDATE issue_status SET END_DATE = ? WHERE END_DATE = TO_DATE('31-Dec-2010','DD-MON-YYYY') AND ISSUE_ID = ?
date=SELECT SYSDATE FROM DUAL
deleteComplaint=DELETE FROM issue_status  WHERE BUSINESS_OBJ_ID=?
getCompStatusByUser= select max(status_id) as status_id  from issue_status where BUSINESS_OBJ_ID=? and OBJECT_TYPE=? 
updateStatusByUser= update issue_status set END_DATE=sysdate where STATUS_ID=?
updateStatusByUser2= update issue_status set END_DATE=(TO_TIMESTAMP('ppp','yyyy/mm/dd hh24:mi:ss')) where STATUS_ID=?
updateStatusByUser3= update issue_status set total_time=1 where STATUS_ID=?
saveCompStatus= INSERT INTO ISSUE_STATUS VALUES (?,?,?,?,null,SYSDATE,?,?,?,?,?,?,?,?)
saveCompStatus2= INSERT INTO ISSUE_STATUS VALUES (?,?,?,?,(TO_TIMESTAMP('ppp','yyyy/mm/dd hh24:mi:ss')),SYSDATE,?,?,?,?,?,?,?,?)
deleteComp=update DISTRIBUTION_LIST set option3='delete' where CLIENT_COM_ID=?
closeSelectedComp=update DISTRIBUTION_LIST set option3='closed' where CLIENT_COM_ID=?
getClosedMsg=select * from ISSUE_STATUS where business_obj_id=? and status_name=7
getFinishedMsg=select * from ISSUE_STATUS where business_obj_id=? and status_name=6
getRejectdMsg=select * from ISSUE_STATUS where business_obj_id=? and status_name=5
getClosedChilds=select * from ISSUE_STATUS where parent_id=? and status_name=7
getCompByStatusCode=select TO_CHAR(begin_DATE,'yyyy-mm-dd hh24:mi') as begin_date,TO_CHAR(end_DATE,'yyyy-mm-dd hh24:mi') as end_date from ISSUE_STATUS where BUSINESS_OBJ_ID=? and status_name=?
getStatusForObject=SELECT ISSUE_STATUS.STATUS_ID, STATUS_TYPE.CASE_AR CASE_NAME, CAST(ISSUE_STATUS.BEGIN_DATE AS TIMESTAMP) AS BEGIN_DATE,CAST(ISSUE_STATUS.END_DATE AS TIMESTAMP) AS END_DATE,TO_NUMBER(TOTAL_TIME) AS DURATION ,ISSUE_STATUS.STATUS_NOTE AS STATUS_NOTE ,DECODE(ISSUE_STATUS.ACTION_TAKEN,'100','Other',PROJECT.PROJECT_NAME) as type, U.FULL_NAME FROM ISSUE_STATUS INNER JOIN STATUS_TYPE ON STATUS_TYPE.ID = ISSUE_STATUS.STATUS_NAME LEFT JOIN PROJECT ON ISSUE_STATUS.ACTION_TAKEN = PROJECT.PROJECT_ID LEFT JOIN USERS U ON ISSUE_STATUS.CREATED_BY = U.USER_ID WHERE BUSINESS_OBJ_ID = ? ORDER BY TO_NUMBER(STATUS_ID) ASC
insertIssueStatus=INSERT INTO ISSUE_STATUS VALUES (?, ?, ?, ?, NULL, (TO_TIMESTAMP(?,'yyyy/mm/dd hh24:mi:ss')), '0', ?, ?, ?, ?, ?, ?, ?)
updatePreviousStatus=UPDATE ISSUE_STATUS SET END_DATE = TO_TIMESTAMP(?,'yyyy/mm/dd hh24:mi:ss'), TOTAL_TIME = ROUND(CAST((24 * 60 * (CAST(TO_TIMESTAMP(?,'yyyy/mm/dd hh24:mi:ss') AS DATE) - CAST(BEGIN_DATE AS DATE))) AS NUMBER), 1) WHERE STATUS_ID IN (SELECT STATUS_ID FROM ISSUE_STATUS WHERE BUSINESS_OBJ_ID = ? AND OBJECT_TYPE = ? AND END_DATE IS NULL)
updateEmployeeStatus=UPDATE ISSUE_STATUS SET END_DATE = sysdate , TOTAL_TIME = ROUND(CAST((24 * 60 * (CAST(TO_TIMESTAMP(?,'yyyy/mm/dd hh24:mi:ss') AS DATE) - CAST(BEGIN_DATE AS DATE))) AS NUMBER), 1) WHERE STATUS_ID IN (SELECT STATUS_ID FROM ISSUE_STATUS WHERE BUSINESS_OBJ_ID = ? AND OBJECT_TYPE = ? AND END_DATE IS NULL)
isStatusExist=SELECT STATUS_ID FROM ISSUE_STATUS WHERE BUSINESS_OBJ_ID = ? AND OBJECT_TYPE = ? AND STATUS_NAME = ?
getStatusNotesByType=select st.STATUS_NOTE, st.CREATED_BY, st.BEGIN_DATE, cl.CLIENT_NO, cl."NAME" CLIENT_NAME, i.BUSINESS_ID, i.BUSINESS_ID_BY_DATE from ISSUE_STATUS st left join CLIENT_COMPLAINTS co on st.BUSINESS_OBJ_ID = co.ID left join ISSUE i on co.ISSUE_ID = i.ID left join CLIENT cl on i.URGENCY_ID = cl.SYS_ID where SYS_ID is not null and st.CREATED_BY = ? and STATUS_NAME = ? and trunc(BEGIN_DATE) between ? and ? commentQuery order by CLIENT_NAME
getEmployeesLoadByStatus=select count(st.CREATED_BY) TOTAL, st.CREATED_BY, u.FULL_NAME from ISSUE_STATUS st left join USERS u on st.CREATED_BY = u.USER_ID where st.OBJECT_TYPE = 'client_complaint' and st.CREATED_BY in (select EMP_ID EMPLOYEE_ID from EMP_MGR where MGR_ID in (select OPTION_ONE from PROJECT where PROJECT_ID = ?) union select OPTION_ONE EMPLOYEE_ID from PROJECT where PROJECT_ID = ?) and st.STATUS_NAME = ? group by st.CREATED_BY, u.FULL_NAME
getClosureNotesProductions=SELECT COUNT(ST.CREATED_BY) TOTAL, ST.CREATED_BY, U.FULL_NAME USER_NAME FROM ISSUE_STATUS ST LEFT JOIN CLIENT_COMPLAINTS CO ON ST.BUSINESS_OBJ_ID = CO.ID LEFT JOIN ISSUE I ON CO.ISSUE_ID = I.ID LEFT JOIN CLIENT CL ON I.URGENCY_ID = CL.SYS_ID LEFT JOIN USERS U ON ST.CREATED_BY = U.USER_ID WHERE SYS_ID IS NOT NULL AND STATUS_NAME = ? AND ST.CREATED_BY IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = ?) and trunc(BEGIN_DATE) between ? and ? GROUP BY ST.CREATED_BY, U.FULL_NAME ORDER BY U.FULL_NAME
getLastStatusForObject=SELECT * FROM ISSUE_STATUS WHERE BUSINESS_OBJ_ID = ? AND END_DATE IS NULL
getAllStatusForObject=SELECT * FROM ISSUE_STATUS WHERE BUSINESS_OBJ_ID=? ORDER BY TO_NUMBER(STATUS_ID) ASC
getAllStatusForIssueAndDepCode=SELECT * FROM ISSUE_STATUS WHERE BUSINESS_OBJ_ID IN (SELECT MAX(ID) FROM CLIENT_COMPLAINTS WHERE ISSUE_ID = ? AND BUSINESS_COMP_ID LIKE 'departmentCode%') ORDER BY TO_NUMBER(STATUS_ID) ASC