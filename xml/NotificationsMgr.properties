getNotificationsByIssueCreator=SELECT * FROM NOTIFICATIONS WHERE ISSUE_CREATED_BY = ? AND TRUNC(ALERT_CRAETION_TIME) BETWEEN ? AND ? AND ALERT_CREATED_BY != ? ORDER BY TO_NUMBER(ISSUE_CREATED_BY) DESC, ALERT_CRAETION_TIME DESC
getNotificationsByIssueCreator2=SELECT * FROM NOTIFICATIONS WHERE ISSUE_CREATED_BY = ? AND STATUS_CODE = '37' ORDER BY TO_NUMBER(ISSUE_CREATED_BY) DESC, ALERT_CRAETION_TIME DESC
getNotificationByMgrGroup=SELECT Distinct NOTIFICATIONS.* FROM NOTIFICATIONS INNER JOIN EMP_MGR ON NOTIFICATIONS.ISSUE_CREATED_BY = EMP_MGR.EMP_ID where (MGR_id = ? OR ISSUE_CREATED_BY = ?) AND ALERT_CRAETION_TIME BETWEEN SYSDATE - WITH_IN/24 AND SYSDATE AND ALERT_CREATED_BY != ? ORDER BY TO_NUMBER(ISSUE_CREATED_BY) DESC, ALERT_CRAETION_TIME DESC 
getNotificationsByComplaintCode=SELECT * FROM NOTIFICATIONS WHERE BUSINESS_COMP_ID LIKE 'ccccc-%' AND ALERT_CRAETION_TIME BETWEEN SYSDATE - no_of_hours/24 and SYSDATE ORDER BY ALERT_CRAETION_TIME DESC, TO_NUMBER(ISSUE_CREATED_BY) ASC
getAllNotifications=SELECT * FROM NOTIFICATIONS WHERE TRUNC(ALERT_CRAETION_TIME) BETWEEN ? AND ? dprtmntCnfgCon ORDER BY TO_NUMBER(ISSUE_CREATED_BY) DESC, ALERT_CRAETION_TIME DESC
getNotificationsByOwner=SELECT * FROM NOTIFICATIONS WHERE COMPLAINT_CURRENT_OWNER_ID = ? AND TRUNC(ALERT_CRAETION_TIME) BETWEEN ? AND ? AND ALERT_CREATED_BY != ? ORDER BY TO_NUMBER(ISSUE_CREATED_BY) DESC, ALERT_CRAETION_TIME DESC


