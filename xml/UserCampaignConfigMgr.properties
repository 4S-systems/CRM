insertUserCampaignConfig=INSERT INTO USER_CAMPAIGN_CONFIG VALUES(?,?,?,?,SYSDATE)
getAllUserCampaignConfig=SELECT UC.*, C.CAMPAIGN_TITLE FROM USER_CAMPAIGN_CONFIG UC LEFT JOIN CAMPAIGN C ON UC.CAMPAIGN_ID = C.ID WHERE UC.USER_ID = ?
getCampaignsForUser=SELECT UC.ID, C.CAMPAIGN_TITLE, C.ID CAMPAIGN_ID FROM USER_CAMPAIGN_CONFIG UC RIGHT JOIN CAMPAIGN C ON UC.CAMPAIGN_ID = C.ID AND UC.USER_ID = ? WHERE C.PARENT_ID IN (SELECT ID FROM CAMPAIGN WHERE CURRENT_STATUS IN ('16', '20')) OR (C.PARENT_ID = '0' AND CURRENT_STATUS IN ('16', '20'))
getUserCampaigns=SELECT U.FULL_NAME USER_NAME, C.CAMPAIGN_TITLE, UC.CREATION_TIME FROM USERS U INNER JOIN USER_CAMPAIGN_CONFIG UC ON U.USER_ID = UC.USER_ID INNER JOIN CAMPAIGN C ON UC.CAMPAIGN_ID = C.ID