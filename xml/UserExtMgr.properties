getBrokersStatistics=SELECT UE.*, CASE WHEN U.FULL_NAME IS NOT NULL THEN U.FULL_NAME ELSE U.USER_NAME END FULL_NAME, C.ID CAMPAIGN_ID, C.CAMPAIGN_TITLE FROM USERS_EXT UE INNER JOIN USERS U ON UE.USER_ID = U.USER_ID LEFT JOIN CAMPAIGN C ON C.CAMPAIGN_TITLE LIKE ('%' || U.FULL_NAME)
getBrokerClientsCount=SELECT COUNT(*) CLIENT_NO, CC.CAMPAIGN_ID FROM CLIENT C INNER JOIN CLIENT_CAMPAIGN CC ON C.SYS_ID=CC.CLIENT_ID GROUP BY CC.CAMPAIGN_ID
getBrokerSoldCount=SELECT COUNT(*) CLIENT_NO, CP.ID CAMPAIGN_ID FROM CLIENT C LEFT JOIN CLIENT_CAMPAIGN CC ON C.SYS_ID=CC.CLIENT_ID LEFT JOIN CAMPAIGN CP ON CC.CAMPAIGN_ID = CP.ID LEFT JOIN USERS U ON C.CREATED_BY = U.USER_ID LEFT JOIN (SELECT * FROM ISSUE_BY_COMPLAINT_UNIQUE WHERE CLIENT_COM_ID IN (SELECT MAX(CLIENT_COM_ID) FROM ISSUE_BY_COMPLAINT_UNIQUE GROUP BY CUSTOMER_ID)) IC ON C.SYS_ID = IC.CUSTOMER_ID LEFT JOIN USERS OU ON OU.USER_ID = IC.CURRENT_OWNER_ID LEFT JOIN CLIENT_RATING CR ON CR.CLIENT_ID = C.SYS_ID LEFT JOIN PROJECT R ON CR.RATE_ID = R.PROJECT_ID WHERE C.SYS_ID IN (SELECT CLIENT_ID FROM CLIENT_PROJECTS WHERE PRODUCT_ID = 'purche') AND CP.ID IS NOT NULL GROUP BY CP.ID
deleteBroker=DELETE FROM RECORD_SEASON WHERE ID = ?
deleteBrokerTool=DELETE FROM RECORD_SEASON WHERE ENGLISH_NAME LIKE ('%' || ?)
deleteBrokerCampaign=DELETE FROM CAMPAIGN WHERE CAMPAIGN_TITLE LIKE ('%' || ?) AND ID NOT IN (SELECT CAMPAIGN_ID FROM CLIENT_CAMPAIGN)
getBrokersList=SELECT UE.* FROM RECORD_SEASON UE 