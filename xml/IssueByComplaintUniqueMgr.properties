getNewClientsBetweenDates=select unique i.*, c.DESCRIPTION, c.INTER_PHONE, co.TOTAL_COMMENTS, ap.TOTAL_APPOINTMENTS, s.BEGIN_DATE STATUS_DATE from ISSUE_BY_COMPLAINT_UNIQUE i left join client c on i.CUSTOMER_ID = c.SYS_ID left join issue_status s on i.CUSTOMER_ID = s.BUSINESS_OBJ_ID and s.END_DATE is null left join (select count(*) TOTAL_COMMENTS, BUSNIESS_OBJECT_ID from COMMENTS group by BUSNIESS_OBJECT_ID) co on i.CUSTOMER_ID = co.BUSNIESS_OBJECT_ID left join (select count(*) TOTAL_APPOINTMENTS, CLIENT_ID from APPOINTMENT group by CLIENT_ID) ap on i.CUSTOMER_ID = ap.CLIENT_ID where s.STATUS_NAME <> '11' and comp_subject IN (SELECT PROJECT_NAME FROM PROJECT WHERE LOCATION_TYPE = 'RQ-TYPE') and c.description like '%clientDescription%' and entry_date between to_date(?,'YYYY/MM/DD HH24:MI') and to_date(?,'YYYY/MM/DD HH24:MI') otherWhereStatement
getNewClientsBetweenDatesNew=select unique i.created_by_name, I.Customer_Name, CLIENT_MOBILE, C.INTER_PHONE, ST.ARABICNAME SEASON_NAME, CP.CAMPAIGN_TITLE, UG.GROUP_NAME, R.PROJECT_NAME RATE_NAME from ISSUE_BY_COMPLAINT_UNIQUE i left join client c on i.CUSTOMER_ID = c.SYS_ID left join user_group UG on i.CREATED_BY = UG.USER_ID left join issue_status s on i.CUSTOMER_ID = s.BUSINESS_OBJ_ID and s.END_DATE is null left join CLIENT_CAMPAIGN CC on C.SYS_ID = CC.CLIENT_ID left join CAMPAIGN CP ON CC.CAMPAIGN_ID = CP.ID LEFT JOIN SEASON_TYPE ST ON C.OPTION3 = ST.ID LEFT JOIN CLIENT_RATING CR ON C.SYS_ID = CR.CLIENT_ID LEFT JOIN PROJECT R ON CR.RATE_ID = R.PROJECT_ID where s.STATUS_NAME <> '11' and comp_subject IN (SELECT PROJECT_NAME FROM PROJECT WHERE LOCATION_TYPE = 'RQ-TYPE') and c.description like '%clientDescription%' and entry_date between to_date(?,'YYYY/MM/DD HH24:MI') and to_date(?,'YYYY/MM/DD HH24:MI') otherWhereStatement order by UG.GROUP_NAME, I.CUSTOMER_NAME
getAllCaseBetweenDatesByStatus=select * from ISSUE_BY_COMPLAINT_UNIQUE v left join client c on v.CUSTOMER_ID = c.SYS_ID where status_code like '%sssss%' and trunc(entry_date) between to_date(?,'DD-MM-YY') and to_date(?,'DD-MM-YY') tttttt
getComplaintByCreatedBy=SELECT unique * FROM ISSUE_BY_COMPLAINT_UNIQUE where STATUS_CODE IN (7,6,5,4,3,2) AND CREATED_BY = ? AND TRUNC(ENTRY_DATE) BETWEEN ? AND ?
getComplaintByClient = select * from ISSUE_BY_COMPLAINT_UNIQUE v left join client c on v.CUSTOMER_ID = c.SYS_ID where c.SYS_ID = ? and C.CURRENT_STATUS in (select MAX(DECODE(client_status,'11', '11')) as client_status from client_rule where department_id =? union select MAX(DECODE(client_status,'99','12')) as client_status from client_rule where department_id = ? union select MAX(DECODE(client_status,'99','13')) as client_status from client_rule where department_id = ? union select MAX(DECODE(client_status,'99','14')) as client_status from client_rule where department_id = ?)
getAllCaseBetweenDatesByDepCode=SELECT * FROM ISSUE_BY_COMPLAINT_UNIQUE V LEFT JOIN CLIENT C ON V.CUSTOMER_ID = C.SYS_ID WHERE BUSINESS_COMP_ID LIKE 'departmentCode%' AND TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY')
getClientComplaintsToBeFinished=SELECT * FROM ISSUE_BY_COMPLAINT_UNIQUE WHERE ROUND(SYSDATE - CAST(ENTRY_DATE AS DATE)) * 24 * 60 * 60 >= ? AND STATUS_CODE IN ('1', '2', '3', '4') AND BUSINESS_COMP_ID LIKE 'departmentCode%'
getClientsWithNoComments=SELECT UNIQUE I.*, C.DESCRIPTION, C.INTER_PHONE, CO.TOTAL_COMMENTS, AP.TOTAL_APPOINTMENTS, S.BEGIN_DATE STATUS_DATE FROM ISSUE_BY_COMPLAINT_UNIQUE I LEFT JOIN CLIENT C ON I.CUSTOMER_ID = C.SYS_ID LEFT JOIN ISSUE_STATUS S ON I.CUSTOMER_ID = S.BUSINESS_OBJ_ID AND S.END_DATE IS NULL LEFT JOIN (SELECT COUNT(*) TOTAL_COMMENTS, BUSNIESS_OBJECT_ID FROM COMMENTS GROUP BY BUSNIESS_OBJECT_ID) CO ON I.CUSTOMER_ID = CO.BUSNIESS_OBJECT_ID LEFT JOIN (SELECT COUNT(*) TOTAL_APPOINTMENTS, CLIENT_ID FROM APPOINTMENT GROUP BY CLIENT_ID) AP ON I.CUSTOMER_ID = AP.CLIENT_ID WHERE COMP_SUBJECT IN (SELECT PROJECT_NAME FROM PROJECT WHERE LOCATION_TYPE = 'RQ-TYPE') AND CO.TOTAL_COMMENTS IS NULL AND AP.TOTAL_APPOINTMENTS IS NULL AND I.STATUS_AR_NAME IS NOT NULL AND C.CURRENT_STATUS = '12' AND TRUNC(ENTRY_DATE) BETWEEN ? AND ? AND CURRENT_OWNER_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID IN(SELECT OPTION_ONE FROM PROJECT WHERE PROJECT_ID whereStatement))
getMyActivityInPeriod=SELECT V.*, C.*, ST.BEGIN_DATE, US.CASE_AR US_STATUS_AR, US.CASE_EN US_STATUS_EN FROM ISSUE_BY_COMPLAINT_UNIQUE V LEFT JOIN CLIENT C ON V.CUSTOMER_ID = C.SYS_ID LEFT JOIN ISSUE_STATUS ST ON V.CLIENT_COM_ID = ST.BUSINESS_OBJ_ID LEFT JOIN STATUS_TYPE US ON ST.STATUS_NAME = US.ID WHERE ST.STATUS_NAME LIKE ? AND ST.CREATED_BY = ? AND TRUNC(ST.BEGIN_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY')
getNonDistributedComplaints=SELECT I.ID ISSUE_ID, I.ISSUE_TITLE, I.CALL_TYPE, I.PROJECT_NAME, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, I.USER_ID CREATED_BY, CS.FULL_NAME CREATED_BY_NAME, I.CREATION_TIME ENTRY_DATE, CC.BUSINESS_COMP_ID, CC.ID AS COMP_ID, CC.TICKET_TYPE, CC.CURRENT_OWNER, CC.CURRENT_OWNER_ID, CC.CURRENT_OWNER_SINCE, CU.SYS_ID AS CUSTOMER_ID, CU.NAME AS CUSTOMER_NAME, CU.AGE_GROUP AS AGE, CU.PHONE AS CLIENT_PHONE, CU.MOBILE AS CLIENT_MOBILE, CU.OPTION3 AS CLIENT_OTHER, IST.STATUS_NAME STATUS_CODE, IST.ACTION_TAKEN ACTION_TAKEN, ST.CASE_EN STATUS_EN_NAME, ST.CASE_AR STATUS_AR_NAME, CC.CREATED_BY SENDER_ID, S.USER_NAME AS SENDER_NAME, S.FULL_NAME AS SENDER_FULL_NAME, SLA.OPTION1 AS SUBJECT, SLA.OPTION2 AS COMMENTS FROM CLIENT_COMPLAINTS CC LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN CLIENT CU ON I.URGENCY_ID = CU.SYS_ID LEFT JOIN TICKET_TYPE TP ON CC.TICKET_TYPE = TP.TYPE_ID LEFT JOIN ISSUE_STATUS IST ON CC.ID = IST.BUSINESS_OBJ_ID AND IST.END_DATE IS NULL LEFT JOIN STATUS_TYPE ST ON IST.STATUS_NAME = ST.ID LEFT JOIN USERS S ON CC.CREATED_BY = S.USER_ID LEFT JOIN USERS CS ON I.USER_ID = CS.USER_ID LEFT JOIN CLIENT_COMPLAINTS_SLA SLA ON CC.ID = SLA.ID WHERE CC.ID NOT IN (SELECT DISTINCT CLIENT_COM_ID FROM DISTRIBUTION_LIST)
getEmpWithTotalClients =SELECT UNIQUE I.CURRENT_OWNER, Sum(I.BUSINESS_ID) AS Total FROM ISSUE_BY_COMPLAINT_UNIQUE I LEFT JOIN CLIENT C ON I.CUSTOMER_ID = C.SYS_ID LEFT JOIN ISSUE_STATUS S ON I.CUSTOMER_ID = S.BUSINESS_OBJ_ID AND S.END_DATE IS NULL LEFT JOIN (SELECT COUNT(*) TOTAL_COMMENTS, BUSNIESS_OBJECT_ID FROM COMMENTS GROUP BY BUSNIESS_OBJECT_ID) CO ON I.CUSTOMER_ID = CO.BUSNIESS_OBJECT_ID LEFT JOIN (SELECT COUNT(*) TOTAL_APPOINTMENTS, CLIENT_ID FROM APPOINTMENT GROUP BY CLIENT_ID) AP ON I.CUSTOMER_ID = AP.CLIENT_ID WHERE COMP_SUBJECT IN (SELECT PROJECT_NAME FROM PROJECT WHERE LOCATION_TYPE = 'RQ-TYPE') AND CO.TOTAL_COMMENTS IS NULL AND AP.TOTAL_APPOINTMENTS IS NULL AND I.STATUS_AR_NAME IS NOT NULL AND C.CURRENT_STATUS = '12' AND TRUNC(ENTRY_DATE) BETWEEN ? AND ? Group By I.CURRENT_OWNER
getClientsWithoutCommentsDetailes = SELECT UNIQUE I.CURRENT_OWNER, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, I.CUSTOMER_NAME, C.DESCRIPTION, C.INTER_PHONE,S.BEGIN_DATE STATUS_DATE FROM ISSUE_BY_COMPLAINT_UNIQUE I LEFT JOIN CLIENT C ON I.CUSTOMER_ID = C.SYS_ID LEFT JOIN ISSUE_STATUS S ON I.CUSTOMER_ID = S.BUSINESS_OBJ_ID AND S.END_DATE IS NULL LEFT JOIN (SELECT COUNT(*) TOTAL_COMMENTS, BUSNIESS_OBJECT_ID FROM COMMENTS GROUP BY BUSNIESS_OBJECT_ID) CO ON I.CUSTOMER_ID = CO.BUSNIESS_OBJECT_ID LEFT JOIN (SELECT COUNT(*) TOTAL_APPOINTMENTS, CLIENT_ID FROM APPOINTMENT GROUP BY CLIENT_ID) AP ON I.CUSTOMER_ID = AP.CLIENT_ID WHERE COMP_SUBJECT IN (SELECT PROJECT_NAME FROM PROJECT WHERE LOCATION_TYPE = 'RQ-TYPE') AND CO.TOTAL_COMMENTS IS NULL AND AP.TOTAL_APPOINTMENTS IS NULL AND I.STATUS_AR_NAME IS NOT NULL AND TRUNC(ENTRY_DATE) BETWEEN ? AND ? Group By I.CURRENT_OWNER, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, I.CUSTOMER_NAME, C.DESCRIPTION, C.INTER_PHONE,S.BEGIN_DATE order by I.CURRENT_OWNER
                                    SELECT UNIQUE I.*, C.DESCRIPTION, C.INTER_PHONE, CO.TOTAL_COMMENTS, AP.TOTAL_APPOINTMENTS, S.BEGIN_DATE STATUS_DATE
getClientsWithNoCommentsInter=SELECT UNIQUE I.*, C.DESCRIPTION,C.CLIENT_NO, C.INTER_PHONE, CO.TOTAL_COMMENTS, AP.TOTAL_APPOINTMENTS, S.BEGIN_DATE STATUS_DATE FROM ISSUE_BY_COMPLAINT_UNIQUE I LEFT JOIN CLIENT C ON I.CUSTOMER_ID = C.SYS_ID LEFT JOIN ISSUE_STATUS S ON I.CUSTOMER_ID = S.BUSINESS_OBJ_ID AND S.END_DATE IS NULL LEFT JOIN (SELECT COUNT(*) TOTAL_COMMENTS, BUSNIESS_OBJECT_ID FROM COMMENTS GROUP BY BUSNIESS_OBJECT_ID) CO ON I.CUSTOMER_ID = CO.BUSNIESS_OBJECT_ID LEFT JOIN (SELECT COUNT(*) TOTAL_APPOINTMENTS, CLIENT_ID FROM APPOINTMENT GROUP BY CLIENT_ID) AP ON I.CUSTOMER_ID = AP.CLIENT_ID WHERE COMP_SUBJECT IN (SELECT PROJECT_NAME FROM PROJECT WHERE LOCATION_TYPE = 'RQ-TYPE') AND CO.TOTAL_COMMENTS IS NULL AND AP.TOTAL_APPOINTMENTS IS NULL AND I.STATUS_AR_NAME IS NOT NULL AND C.CURRENT_STATUS = '12' and substr(C.INTER_PHONE,0,5) = ? 
getNewClientsBetweenDatesGroupedCount=select UG.GROUP_NAME, count(*) CLIENT_NO from ISSUE_BY_COMPLAINT_UNIQUE i left join client c on i.CUSTOMER_ID = c.SYS_ID left join user_group UG on i.CREATED_BY = UG.USER_ID left join issue_status s on i.CUSTOMER_ID = s.BUSINESS_OBJ_ID and s.END_DATE is null left join (select count(*) TOTAL_COMMENTS, BUSNIESS_OBJECT_ID from COMMENTS group by BUSNIESS_OBJECT_ID) co on i.CUSTOMER_ID = co.BUSNIESS_OBJECT_ID left join (select count(*) TOTAL_APPOINTMENTS, CLIENT_ID from APPOINTMENT group by CLIENT_ID) ap on i.CUSTOMER_ID = ap.CLIENT_ID where s.STATUS_NAME <> '11' and comp_subject IN (SELECT PROJECT_NAME FROM PROJECT WHERE LOCATION_TYPE = 'RQ-TYPE') and c.description like '%clientDescription%' and entry_date between to_date(?,'YYYY/MM/DD HH24:MI') and to_date(?,'YYYY/MM/DD HH24:MI') otherWhereStatement group by UG.GROUP_NAME
getMyClientComplaints=SELECT * FROM ISSUE_BY_COMPLAINT_UNIQUE WHERE CURRENT_OWNER_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID IN(SELECT OPTION_ONE FROM PROJECT WHERE PROJECT_ID IN (SELECT DEPARTMENT_ID FROM USER_DEPARTMENT_CONFIG WHERE USER_ID = '1')))
getNonFollowersClientsDetails=SELECT DISTINCT IC.*, U.FULL_NAME CURRENT_OWNER_NAME FROM ISSUE_BY_COMPLAINT_UNIQUE IC LEFT JOIN CLIENT C ON IC.CUSTOMER_ID = C.SYS_ID LEFT JOIN USERS U ON IC.CURRENT_OWNER_ID = U.USER_ID WHERE IC.CUSTOMER_ID NOT IN (SELECT DISTINCT BUSNIESS_OBJECT_ID FROM COMMENTS INNER JOIN CLIENT ON COMMENTS.BUSNIESS_OBJECT_ID = CLIENT.SYS_ID  WHERE TRUNC(COMMENTS.CREATION_TIME) BETWEEN ? AND ?) AND IC.CUSTOMER_ID NOT IN (SELECT DISTINCT APPOINTMENT.CLIENT_ID FROM APPOINTMENT INNER JOIN CLIENT ON APPOINTMENT.CLIENT_ID = CLIENT.SYS_ID WHERE TRUNC(APPOINTMENT.CREATION_TIME) BETWEEN ? AND ?) AND IC.CURRENT_OWNER_ID IN (SELECT DISTINCT USER_ID FROM USER_GROUP WHERE GROUP_ID = ?) AND C.CURRENT_STATUS = 12 AND IC.CURRENT_OWNER_ID = ? ORDER BY U.FULL_NAME


getClientsWithNoCommentsLead=SELECT I.*,C.DESCRIPTION,S.BEGIN_DATE AS STATUS_DATE FROM ISSUE_BY_COMPLAINT_UNIQUE I JOIN (SELECT CUSTOMER_ID, MAX(ENTRY_DATE) AS MAX_ENTRY_DATE FROM ISSUE_BY_COMPLAINT_UNIQUE GROUP BY CUSTOMER_ID) M ON I.CUSTOMER_ID = M.CUSTOMER_ID AND I.ENTRY_DATE = M.MAX_ENTRY_DATE LEFT JOIN CLIENT C ON I.CUSTOMER_ID = C.SYS_ID LEFT JOIN ISSUE_STATUS S ON I.CUSTOMER_ID = S.BUSINESS_OBJ_ID AND S.END_DATE IS NULL
