getUnitDelivery=SELECT UNIQUE  U.PROJECT_ID, U.PROJECT_NAME,CP.CLIENT_ID AS OWNER_ID, T.NAME, T.AGE_GROUP, P.PROJECT_NAME PARENT_NAME, DOC.DOC_ID, UT.UNIT_DATE DELIVERY_DATE FROM PROJECT U LEFT JOIN CLIENT_PROJECTS CP ON U.PROJECT_ID = CP.PROJECT_ID AND CP.PRODUCT_ID IN ('main owner', 'purche') LEFT JOIN CLIENT T ON CP.CLIENT_ID = T.SYS_ID LEFT JOIN PROJECT P ON U.MAIN_PROJ_ID = P.PROJECT_ID LEFT JOIN ISSUE_STATUS I ON U.PROJECT_ID = I.BUSINESS_OBJ_ID AND I.END_DATE IS NULL LEFT JOIN (SELECT MIN(DOC_ID) DOC_ID, UNIT_ID CLIENT_ID FROM MNTNBLE_UNIT_DOC WHERE DOC_META_TYPE = 'pdf' GROUP BY UNIT_ID) DOC ON T.SYS_ID = DOC.CLIENT_ID LEFT JOIN UNIT_TIME UT ON U.PROJECT_ID = UT.UNIT_ID AND UT.DATE_TYPE = ? WHERE U.LOCATION_TYPE != 'ENG-UNIT' AND U.PROJECTFLAG = '0' AND I.STATUS_NAME IN (SELECT APARTMENT_STATUS FROM APARTMENT_RULE WHERE DEPARTMENT_ID = ?) AND I.STATUS_NAME = '10' AND((U.MAIN_PROJ_ID = ?))
