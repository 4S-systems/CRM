accurateUnitSearch=SELECT CL.NAME, CL.MOBILE, CP.PROJECT_ID UNIT_ID, CP.PRODUCT_CATEGORY_ID PROJECT_ID, CP.PRODUCT_NAME UNIT_NAME, CP.PRODUCT_CATEGORY_NAME PROJECT_NAME, P.PROJECT_DESCRIPTION, PZ.ZONE_ID REGION_ID, Z.PROJECT_NAME REGION_NAME, UP.MAX_PRICE AREA, UP.OPTION1 PRICE FROM CLIENT CL INNER JOIN CLIENT_PROJECTS CP ON CL.SYS_ID = CP.CLIENT_ID INNER JOIN PROJECT P ON CP.PROJECT_ID = P.PROJECT_ID INNER JOIN PROJECT_ZONE PZ ON CP.PRODUCT_CATEGORY_ID = PZ.PROJECT_ID INNER JOIN PROJECT Z ON PZ.ZONE_ID = Z.PROJECT_ID INNER JOIN UNIT_PRICE UP ON CP.PROJECT_ID = UP.UNIT_ID WHERE CL.AGE_GROUP = '200'
getAreasSales=SELECT COUNT(CASE WHEN ST.STATUS_NAME = '8' THEN ST.STATUS_NAME END) AVAILABLE, COUNT(CASE WHEN ST.STATUS_NAME = '9' THEN ST.STATUS_NAME END) RESERVED, COUNT(CASE WHEN ST.STATUS_NAME = '10' THEN ST.STATUS_NAME END) SOLD, COUNT(CASE WHEN ST.STATUS_NAME = '28' THEN ST.STATUS_NAME END) HIDE, COUNT(*) TOTAL, UP.MAX_PRICE AREA FROM UNIT_PRICE UP LEFT JOIN ISSUE_STATUS ST ON UP.UNIT_ID = ST.BUSINESS_OBJ_ID AND ST.END_DATE IS NULL LEFT JOIN PROJECT P ON UP.UNIT_ID = P.PROJECT_ID WHERE UP.MAX_PRICE IS NOT NULL AND UP.MAX_PRICE != '0' GROUP BY UP.MAX_PRICE 

