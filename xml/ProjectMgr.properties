getClntWrkrLst = SELECT E.EMP_NO,E.EMP_ID, E.EMP_NAME, E.WORK_PHONE, E.EMAIL , JB1.PROJECT_NAME as CLINTNM,FCINF.FCLTY_CNFG_ID as row_id , FCINF.FCLTY_ID as CLINTId,FCINF.SHFT_ID, FCINF.RATE, FCINF.CREATION_TIME, CB.FULL_NAME FROM EMPLOYEE E LEFT JOIN FCLTY_CNFG FCINF ON E.EMP_ID = FCINF.CNFG_ID LEFT JOIN PROJECT JB1 ON FCINF.FCLTY_ID = JB1.PROJECT_ID LEFT JOIN USERS CB ON FCINF.CREATED_BY = CB.USER_ID WHERE FCINF.FCLTY_ID IN (SELECT CL.PROJECT_ID FROM PROJECT CL WHERE CL.MAIN_PROJ_ID IN (SELECT ST.PROJECT_ID FROM PROJECT ST WHERE ST.MAIN_PROJ_ID = ?))AND FCINF.ASS_END_DATE IS NULL
