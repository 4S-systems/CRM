getAllUnitsWithPriceAndDetails=SELECT UNIQUE U.*, T.NAME, T.AGE_GROUP, T.AGE_GROUP, T.SYS_ID, P.PROJECT_NAME PARENT_NAME, I.STATUS_NAME STATUS_NAME, PR.MAX_PRICE AREA , PR.OPTION1 PRICE, PA.METER_PRICE, AD.PROJECT_NAME ADDON_NAME, UA.PRICE ADDON_PRICE, UA.AREA ADDON_AREA, L.PROJECT_NAME LEVEL_NAME FROM PROJECT U LEFT JOIN (SELECT * FROM UNIT_PRICE WHERE ID IN (SELECT MAX(ID) FROM UNIT_PRICE GROUP BY UNIT_ID)) PR ON PR.UNIT_ID = U.PROJECT_ID LEFT JOIN (SELECT CLIENT.NAME, CLIENT_PROJECTS.PROJECT_ID, CLIENT.AGE_GROUP, CLIENT.SYS_ID FROM CLIENT_PROJECTS INNER JOIN CLIENT ON CLIENT.SYS_ID = CLIENT_PROJECTS.CLIENT_ID) T ON U.PROJECT_ID = T.PROJECT_ID LEFT JOIN PROJECT P ON U.MAIN_PROJ_ID = P.PROJECT_ID LEFT JOIN ISSUE_STATUS I ON U.PROJECT_ID = I.BUSINESS_OBJ_ID AND I.END_DATE IS NULL LEFT JOIN PROJECT_ACC PA ON U.MAIN_PROJ_ID = PA.PROJECT_ID AND PA.METER_PRICE IS NOT NULL LEFT JOIN UNIT_ADDON_DETAILS UA ON U.PROJECT_ID = UA.UNIT_ID LEFT JOIN PROJECT AD ON UA.TYPE = AD.PROJECT_ID LEFT JOIN PROJECT L ON U.OPTION_THREE = L.PROJECT_ID WHERE U.PROJECTFLAG = '0' AND STATUS_NAME IN (SELECT APARTMENT_STATUS FROM APARTMENT_RULE WHERE DEPARTMENT_ID = ?) AND STATUS_NAME = ? whereStatement
