getUnitsStatusByParent=select unique u.*, p.PROJECT_NAME PARENT_NAME, i.STATUS_NAME STATUS_NAME, UP.CREATION_TIME PRICE_DATE, up.MAX_PRICE MAX_PRICE, up.MIN_PRICE MIN_PRICE, up.OPTION1 TOTAL_PRICE from PROJECT u left join PROJECT p on u.MAIN_PROJ_ID = p.PROJECT_ID left join issue_status i on u.PROJECT_ID = i.BUSINESS_OBJ_ID and i.END_DATE is null left join (select up2.UNIT_ID, up2.MAX_PRICE, up2.MIN_PRICE, up2.CREATION_TIME, up2.OPTION1 from (select UNIT_ID, max(ID) ID from unit_price where (MAX_PRICE is not null or MIN_PRICE is not null) group by UNIT_ID) up1 left join unit_price up2 on up1.ID = up2.ID) up on u.PROJECT_ID = up.UNIT_ID where u.MAIN_PROJ_ID = ? and u.PROJECTFLAG = '0' filter_by_rules order by u.PROJECT_ID
