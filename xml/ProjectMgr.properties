getResidentialModelList=SELECT p.EQ_NO Model_Code, p.PROJECT_NAME Model_Name,p1.EQ_NO Project_Code,p1.PROJECT_NAME Project_Name,p.PROJECT_ID Model_ID, p.OPTION_ONE OPTION_ONE, ad.TOTAL_AREA TOTAL_AREA, c.TOTAL_COUNT, c.AVAILABLE_COUNT, c.RESERVED_COUNT, c.SOLD_COUNT FROM Project p INNER JOIN Project p1 On p.MAIN_PROJ_ID=p1.PROJECT_ID LEFT JOIN ARCH_DETAILS ad on p.PROJECT_ID = ad.UNIT_ID left join (select al.*, AV.AVAILABLE_COUNT, RE.reserved_count, SO.SOLD_COUNT from (select count(*) total_count, p.eq_no model_id from project p left join issue_status i on p.project_id = i.BUSINESS_OBJ_ID where eq_no in (select project_id from project where LOCATION_TYPE = 'RES-MODEL') and (i.status_name != '28') and I.END_DATE is null group by eq_no) al left join (select count(*) available_count, eq_no model_id from project p left join issue_status i on p.project_id = i.BUSINESS_OBJ_ID where eq_no in (select project_id from project where LOCATION_TYPE = 'RES-MODEL') and (i.status_name = '8') and I.END_DATE is null group by eq_no) av on al.model_id = av.model_id left join (select count(*) reserved_count, eq_no model_id from project p left join issue_status i on p.project_id = i.BUSINESS_OBJ_ID where eq_no in (select project_id from project where LOCATION_TYPE = 'RES-MODEL') and i.status_name = '9' and I.END_DATE is null group by eq_no) re on al.model_id = re.model_id left join (select count(*) sold_count, eq_no model_id from project p left join issue_status i on p.project_id = i.BUSINESS_OBJ_ID where eq_no in (select project_id from project where LOCATION_TYPE = 'RES-MODEL') and i.status_name = '10' and I.END_DATE is null group by eq_no) so on al.model_id = so.model_id) c on p.project_id = c.model_id WHERE p.LOCATION_TYPE = 'RES-MODEL'
