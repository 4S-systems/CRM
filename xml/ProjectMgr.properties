getUnitsForSpecificProject=select unique u.*,USERS.FULL_NAME ,cp.CLIENT_ID as OWNER_ID, t.NAME, t.AGE_GROUP, t.AGE_GROUP, t.SYS_ID, p.PROJECT_NAME PARENT_NAME, i.STATUS_NAME STATUS_NAME, m.PROJECT_NAME MODEL_NAME, UP.OPTION1 PRICE, UP.MAX_PRICE AREA , AD.TOTAL_AREA, DOC.DOC_ID from PROJECT u left join CLIENT_PROJECTS cp on  u.PROJECT_ID=cp.PROJECT_ID and cp.product_id = 'main owner' left join USERS on u.CREATED_BY = USERS.USER_ID left join (SELECT CLIENT.NAME, CLIENT_PROJECTS.PROJECT_ID, CLIENT.AGE_GROUP, CLIENT.SYS_ID FROM CLIENT_PROJECTS INNER JOIN CLIENT ON CLIENT.SYS_ID = CLIENT_PROJECTS.CLIENT_ID WHERE PRODUCT_ID != 'views') t on u.PROJECT_ID = t.PROJECT_ID left join PROJECT p on u.MAIN_PROJ_ID = p.PROJECT_ID left join issue_status i on u.PROJECT_ID = i.BUSINESS_OBJ_ID and i.END_DATE is null LEFT JOIN PROJECT M ON U.EQ_NO = M.PROJECT_ID LEFT JOIN UNIT_PRICE UP ON U.PROJECT_ID = UP.UNIT_ID LEFT JOIN ARCH_DETAILS AD ON M.PROJECT_ID = AD.UNIT_ID LEFT JOIN (SELECT MIN(DOC_ID) DOC_ID, UNIT_ID CLIENT_ID FROM MNTNBLE_UNIT_DOC WHERE DOC_META_TYPE = 'pdf' GROUP BY UNIT_ID) DOC ON T.SYS_ID = DOC.CLIENT_ID where u.LOCATION_TYPE != 'ENG-UNIT'  AND u.PROJECTFLAG = '0' and STATUS_NAME in (select APARTMENT_STATUS from APARTMENT_RULE) AND STATUS_NAME != '28' uuu
