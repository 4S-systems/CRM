getClientComplaintList=SELECT * FROM issue_by_complaint2 where entry_date between to_char(to_date(?,'DD-MM-YY'),'DD-Mon-YY') and to_char(to_date(?,'DD-MM-YY'),'DD-Mon-YY') ORDER BY group_selector
getComplaintCountPerDepartment=SELECT department_name, COUNT(client_com_id) AS complaint_count FROM issue_by_complaint2 GROUP BY department_name ORDER BY department_name ASC