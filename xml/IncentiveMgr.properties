getClinetIncentives=SELECT inc.*, cl.name FROM (SELECT x.client_id sum_of_incentive_title FROM (SELECT Count(incentive_id) TOTAL, incentive_title, client_id FROM incentive i right outer join client_incentive ci ON i.id = ci.incentive_id where_between_date GROUP BY incentive_title, client_id ORDER  BY incentive_title) x GROUP BY x.client_id) inc left join client cl ON inc.client_id = cl.sys_id