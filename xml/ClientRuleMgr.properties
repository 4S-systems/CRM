getClientsRules=SELECT ap.*, pr.project_name department_name, pr.project_id department_id FROM (SELECT x.project_id status_titles FROM (SELECT is_checked, project_name, project_id, client_status FROM PROJECT p right outer join CLIENT_RULE au ON p.project_id = au.department_id ORDER  BY project_name) x group by project_id) ap right join PROJECT pr ON ap.project_id = pr.project_id where pr.location_type = 'div'
insertClientRule=INSERT INTO CLIENT_RULE VALUES (?,?,?,?,?,SYSDATE)
deleteAllRules=delete from CLIENT_RULE