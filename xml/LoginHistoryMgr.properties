insertLoginHistory=INSERT INTO LOGIN_HISTORY VALUES (?, ?, SYSDATE, ?, ?, ?)
getGroupAttendanceInPeriod=SELECT U.*, L.NO_OF_DAYS FROM USERS U RIGHT JOIN (SELECT COUNT(LOGIN_DATE) NO_OF_DAYS, USER_ID FROM (SELECT DISTINCT TRUNC(LOGIN_TIME) LOGIN_DATE, USER_ID FROM LOGIN_HISTORY WHERE TRUNC(LOGIN_TIME) BETWEEN ? AND ? AND USER_ID IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = ?)) GROUP BY USER_ID) L ON U.USER_ID = L.USER_ID
getUserAttendanceInPeriod=SELECT * FROM LOGIN_HISTORY WHERE USER_ID = ? AND TRUNC(LOGIN_TIME) BETWEEN ? AND ? ORDER BY LOGIN_TIME
getFirstLastLogin=SELECT FH.LOGIN_TIME FIRST_LOGIN, FU.FULL_NAME FIRST_USER_NAME, LH.LOGIN_TIME LAST_LOGIN, LU.FULL_NAME LAST_USER_NAME, FL.LOGIN_DATE FROM LOGIN_HISTORY FH INNER JOIN (SELECT MAX(ID) LAST_ID, MIN(ID) FIRST_ID, TRUNC(LOGIN_TIME) LOGIN_DATE FROM LOGIN_HISTORY GROUP BY TRUNC(LOGIN_TIME)) FL ON FH.ID = FL.FIRST_ID INNER JOIN LOGIN_HISTORY LH ON LH.ID = FL.LAST_ID LEFT JOIN USERS FU ON FH.USER_ID = FU.USER_ID LEFT JOIN USERS LU ON LH.USER_ID = LU.USER_ID WHERE FL.LOGIN_DATE BETWEEN ? AND ? ORDER BY FL.LOGIN_DATE
getLoginInDay=SELECT count( fh.user_id) entryCount,fh.user_id user_id,(select full_name from users ug where ug.user_id=fh.user_id) as userName, minTime ,maxTime from login_history fh left join (select min(login_time) minTime,user_id from login_history WHERE LOGIN_TIME between ? AND  ?  + interval '1' day group by user_id ) lh on lh.user_id=fh.user_id  left join (select max(login_time) maxTime,user_id from login_history WHERE LOGIN_TIME between  ? AND  ?  + interval '1' day group by user_id ) hh on hh.user_id=fh.user_id WHERE FH.LOGIN_TIME between ? AND  ? + interval '1' day  and fh.user_id in (select option_one from project where project_id bydepartid ) byuserid group  by fh.user_id,minTime,maxTime order by fh.user_id 