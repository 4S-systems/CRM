getLastIssueBySchedule=SELECT us.unit_name, us.maintenance_title, p.project_name, i.business_id, i.business_id_by_date, i.actual_begin_date, icr.counter_reading FROM unit_schedule us, maintainable_unit mu, issue_counter_reading icr, issue i, project p WHERE i.unit_schedule_id = us.id AND mu.id = us.unit_id AND i.current_status != 'CANCELED' AND i.current_status != 'REMOVED' AND i.id = icr.issue_id AND icr.schedule_id = ? AND us.unit_id = ? AND p.project_id = mu.site AND mu.site IN ( sss ) AND i.actual_begin_date = (SELECT MAX(i.actual_begin_date) FROM issue i, unit_schedule us where i.unit_schedule_id = us.id AND us.unit_id = ? AND us.periodic_id = ?)
getIssue=select i.issue_desc,i.id,i.business_id,i.creation_time ,i.call_type,c.client_no, c.name from  issue i, client c where i.urgency_id=c.sys_id 
updateCallType= update issue set issue_desc=?, issue_type=?  where id =?
updateCallDirection=update issue set call_type=?  where id =?
getPenultimateIssueBySchedule=SELECT us.unit_name, us.maintenance_title, p.project_name, i.business_id, i.business_id_by_date, i.actual_begin_date, icr.counter_reading FROM unit_schedule us, maintainable_unit mu, issue_counter_reading icr, issue i, project p WHERE i.unit_schedule_id = us.id AND mu.id = us.unit_id AND i.current_status != 'CANCELED' AND i.current_status != 'REMOVED' AND i.id = icr.issue_id AND icr.schedule_id = ? AND us.unit_id = ? AND p.project_id = mu.site AND mu.site IN ( sss ) AND i.actual_begin_date = (SELECT i1.actual_begin_date FROM issue i1, unit_schedule us WHERE i1.unit_schedule_id = us.id AND us.unit_id = ? AND us.periodic_id = ? AND 1 = (SELECT COUNT(DISTINCT(i2.actual_begin_date)) FROM issue i2, unit_schedule us WHERE i2.unit_schedule_id = us.id AND us.unit_id = ? AND us.periodic_id = ? AND i2.actual_begin_date > i1.actual_begin_date))
getIssuesWithin=select i.issue_desc,i.id,i.business_id,i.creation_time ,i.call_type,c.client_no, c.name from  issue i, client c where i.urgency_id=c.sys_id and TRUNC(i.creation_time) BETWEEN ? AND ? and USER_ID = ?
getIssuesByDepartmentWithin=SELECT I.ISSUE_DESC,I.ID,I.BUSINESS_ID,I.CREATION_TIME ,I.CALL_TYPE,C.CLIENT_NO, C.NAME FROM ISSUE I, CLIENT C WHERE I.URGENCY_ID=C.SYS_ID AND I.ID IN (SELECT CLIENT_COMPLAINTS.ISSUE_ID FROM CLIENT_COMPLAINTS WHERE CLIENT_COMPLAINTS.BUSINESS_COMP_ID LIKE 'CODE-%') AND I.CREATION_TIME BETWEEN SYSDATE - no_of_hours/24 AND SYSDATE
getLastIssueForClient=SELECT MAX(ID) AS ISSUE_ID FROM ISSUE WHERE URGENCY_ID = ?
getClearErrorTasks=select i.*, CL.NAME from issue i left join client cl on I.URGENCY_ID = CL.SYS_ID
getClearErrorTasksByBusiness=SELECT I.*, CL.NAME FROM ISSUE I LEFT JOIN CLIENT CL ON I.URGENCY_ID = CL.SYS_ID WHERE BUSINESS_ID = ?
deleteDistributionWithIssueID=delete from DISTRIBUTION_LIST where CLIENT_COM_ID in (select id from CLIENT_COMPLAINTS where ISSUE_ID = ?)
deleteComplaintsWithIssueID=delete from CLIENT_COMPLAINTS where ISSUE_ID = ?
deleteStatusWithIssueID=delete from ISSUE_STATUS where BUSINESS_OBJ_ID = ?
deleteDocumentDataWithIssueID=delete from ISSUE_DOCUMENT_DATA where DOCUMENT_ID in (select DOCUMENT_ID from ISSUE_DOCUMENT where BUSINESS_OBJ_ID in (select id from CLIENT_COMPLAINTS where ISSUE_ID = ?))
deleteDocumentWithIssueID=delete from ISSUE_DOCUMENT where BUSINESS_OBJ_ID in (select id from CLIENT_COMPLAINTS where ISSUE_ID = ?)
deleteIssueByID=delete from ISSUE where ID = ?
insertDocRequest = INSERT INTO REQUESTEDDOCS (ID , DOC_ID , REQUEST_ID, CREATION_TIME ,CREATED_BY) VALUES (?,?,?,?,?)
updateCurrentStatus=UPDATE ISSUE SET CURRENT_STATUS = ?, CURRENT_STATUS_SINCE = SYSDATE WHERE ID = ?
getRequestExtraditionReport=SELECT I.ISSUE_TITLE, I.CREATION_TIME, I.UNIT_ID, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, C.NAME AS CLIENT_NAME, U.FULL_NAME, S.CASE_AR AS STATUS_NAME FROM ISSUE I INNER JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID INNER JOIN USERS U ON U.USER_ID = I.USER_ID INNER JOIN STATUS_TYPE S ON S.ID = I.CURRENT_STATUS WHERE I.ID = ?
insertIssueForTypeExtracting=INSERT INTO issue VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)
updateExtraditionContractor=UPDATE ISSUE SET URGENCY_ID = ? WHERE ID = ?
updateIssueTitle=UPDATE ISSUE SET ISSUE_TITLE = ? WHERE ID = ?
getUnderFollowup=SELECT I.*, S.COMPLAINTS_NO, C.NAME CLIENT_NAME FROM (SELECT * FROM ISSUE WHERE ISSUE_TITLE = ? AND ID IN (SELECT ISSUE_ID FROM CLIENT_COMPLAINTS WHERE CURRENT_STATUS != '7')) I LEFT JOIN (SELECT COUNT(*) COMPLAINTS_NO, ISSUE_ID FROM CLIENT_COMPLAINTS GROUP BY ISSUE_ID) S ON I.ID = S.ISSUE_ID LEFT JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID
deleteDocRequests=DELETE FROM REQUESTEDDOCS WHERE REQUEST_ID = ?
deleteItemsWithIssueID=delete from REQUEST_ITEMS where ISSUE_ID = ?
getAllIssuesDepOnIssue=SELECT ID, BUSINESS_ID, BUSINESS_ID_BY_DATE FROM ISSUE WHERE ID IN (SELECT ISSUE_ID FROM ISSUE_DEPENDENCE WHERE DEPEND_ON_ID = ?)
updateIssueSourceID=UPDATE ISSUE SET USER_ID = ? WHERE ID = ?
insertIssueProcurement=INSERT INTO issue VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)

addBusinessItm = INSERT INTO JOB_ORDER_ITEMS VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, NULL, NULL)
getBusItmLst = SELECT itm.ID, itm.HOUR_NUM, itm.TOTAL, itm.NOTE, prj.EQ_NO, prj.PROJECT_NAME, prj.OPTION_THREE, CU.FULL_NAME, itm.CREATION_TIME FROM JOB_ORDER_ITEMS itm LEFT JOIN PROJECT prj ON itm.ITEM_ID = prj.PROJECT_ID LEFT JOIN USERS CU ON itm.CREATED_BY = CU.USER_ID WHERE COMPLAINTS_ID = ? AND BUSSINES_OBJ_ID = ? ORDER BY itm.CREATION_TIME
deleteBusinessItm = DELETE FROM JOB_ORDER_ITEMS WHERE ID = ? 
getComStatus = SELECT CURRENT_STATUS FROM CLIENT_COMPLAINTS WHERE ISSUE_ID = ? OR ID = ?
jobOrderInfo = SELECT CC.CREATION_TIME, CC.BUSINESS_ID, CC.BUSINESS_ID, CB.FULL_NAME, OU.FULL_NAME AS oUsr, ST.CASE_EN FROM CLIENT_COMPLAINTS CC LEFT JOIN USERS CB ON CC.CREATED_BY = CB.USER_ID LEFT JOIN USERS OU ON CC.CURRENT_OWNER_ID = OU.USER_ID LEFT JOIN STATUS_TYPE ST ON CC.CURRENT_STATUS = ST.ID WHERE CC.ID = ?

updateSpareAmnt = UPDATE PROJECT SET OPTION_ONE = ? WHERE PROJECT_ID = ?

addWithdrawInfo = INSERT INTO WITHDRAW VALUES (?, ?, ?, ?, ?, ?, ?, SYSDATE, 'UL', 'UL', 'UL', 'UL')
getWithdraw = SELECT WD.CLIENT_ID, WD.CLIENT_MOBILE, WD.CLIENT_PHONE, WD.CLIENT_INTER_PHONE, WD.WIHDRAW_TIME, WB.FULL_NAME WITHDRAWED_BY, OU.FULL_NAME OWNER, CL.CLIENT_NO, CL.NAME, P.PROJECT_NAME RATE_NAME FROM WITHDRAW WD LEFT JOIN USERS WB ON WD.DRAWER_ID = WB.USER_ID LEFT JOIN USERS OU ON WD.ORIGINAL_USER_ID = OU.USER_ID LEFT JOIN CLIENT CL ON WD.CLIENT_ID = CL.SYS_ID LEFT JOIN CLIENT_RATING CR ON CL.SYS_ID = CR.CLIENT_ID LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID

deleteWithdraw = DELETE FROM WITHDRAW WHERE CLIENT_ID = ?

getEmployeesClientsWithdraw = SELECT unique WD.CLIENT_ID, WD.CLIENT_MOBILE, WD.CLIENT_PHONE, WD.CLIENT_INTER_PHONE, WD.WIHDRAW_TIME, WB.FULL_NAME WITHDRAWED_BY, OU.FULL_NAME OWNER, CL.CLIENT_NO, CL.NAME FROM WITHDRAW WD LEFT JOIN USERS WB ON WD.DRAWER_ID = WB.USER_ID LEFT JOIN USERS OU ON WD.ORIGINAL_USER_ID = OU.USER_ID LEFT JOIN CLIENT CL ON WD.CLIENT_ID = CL.SYS_ID where WD.WIHDRAW_TIME = (select max (WIHDRAW_TIME) from WITHDRAW where  CLIENT_ID = CL.SYS_ID)

deleteAllFutureAppointments = DELETE FROM APPOINTMENT WHERE USER_ID = ? AND CLIENT_ID IN (CLIENTIDS) AND APPOINTMENT_DATE > SYSDATE


getWithdrawTl = select * from EMPLOYEE_VIEW2 dl left join CLIENT CL ON dl.customer_id = CL.SYS_ID where receip_id = ?

