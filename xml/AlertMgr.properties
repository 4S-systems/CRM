insertData=INSERT INTO ALERT VALUES(?, ?, ?, ?, SYSDATE, '37', ?, ?)
changeStatus=UPDATE ALERT SET OPTION1 = ?, OPTION2 = ?, OPTION3 = ? WHERE ID = ?
getCommentsAlert=SELECT DISTINCT A.CRAETION_DATE ALERT_CREATION_DATE, A.OPTION1 STATUS_CODE, A.ID ALERT_ID, U.FULL_NAME COMMENT_BY, T.NAME ALERT_TYPE, C.NAME CLIENT_NAME, C.CLIENT_NO, C.SYS_ID CLIENT_ID FROM ALERT A LEFT JOIN USERS U ON A.CREATED_BY = U.USER_ID LEFT JOIN ALERT_TYPE T ON A.ALERT_TYPE_ID = T.ID INNER JOIN CLIENT C ON A.BUSINESS_OBJ_ID = C.SYS_ID RIGHT JOIN ISSUE I ON I.URGENCY_ID = C.SYS_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID WHERE A.CREATED_BY != ? AND CC.CURRENT_OWNER_ID = ? AND TRUNC(A.CRAETION_DATE) BETWEEN ? AND ? AND CC.CURRENT_STATUS NOT IN ('5', '6', '7') ORDER BY A.CRAETION_DATE DESC

getUnReadCommentsAlertCount = SELECT COUNT(A.ID) AS COUNT FROM ALERT A LEFT JOIN USERS U ON A.CREATED_BY = U.USER_ID LEFT JOIN ALERT_TYPE T ON A.ALERT_TYPE_ID = T.ID INNER JOIN CLIENT C ON A.BUSINESS_OBJ_ID = C.SYS_ID RIGHT JOIN ISSUE I ON I.URGENCY_ID = C.SYS_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID WHERE A.CREATED_BY != ? AND CC.CURRENT_OWNER_ID = ? AND A.OPTION1 = '37' AND CC.CURRENT_STATUS NOT IN ('5', '6', '7') ORDER BY A.CRAETION_DATE DESC
getActiveCommentsAlert=SELECT DISTINCT A.CRAETION_DATE ALERT_CREATION_DATE, A.OPTION1 STATUS_CODE, A.ID ALERT_ID, U.FULL_NAME COMMENT_BY, T.NAME ALERT_TYPE, C.NAME CLIENT_NAME, C.CLIENT_NO, C.SYS_ID CLIENT_ID FROM ALERT A LEFT JOIN USERS U ON A.CREATED_BY = U.USER_ID LEFT JOIN ALERT_TYPE T ON A.ALERT_TYPE_ID = T.ID INNER JOIN CLIENT C ON A.BUSINESS_OBJ_ID = C.SYS_ID RIGHT JOIN ISSUE I ON I.URGENCY_ID = C.SYS_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID WHERE A.CREATED_BY != ? AND CC.CURRENT_OWNER_ID = ? AND A.OPTION1 = '37' AND CC.CURRENT_STATUS NOT IN ('5', '6', '7') ORDER BY A.CRAETION_DATE DESC
alreadyExists=SELECT * FROM ALERT WHERE BUSINESS_OBJ_ID = ? AND ALERT_TYPE_ID = ? AND OPTION3 = ?
getContractsAlert=SELECT A.CRAETION_DATE ALERT_CREATION_DATE, A.OPTION1 STATUS_CODE, A.ID ALERT_ID, T.NAME ALERT_TYPE, CT.CONTACT_NUMBER CONTRACT_NUMBER, CT.BEGIN_DATE, CT.END_DATE, CL.NAME CLIENT_NAME, CL.CLIENT_NO, CL.SYS_ID CLIENT_ID FROM ALERT A LEFT JOIN ALERT_TYPE T ON A.ALERT_TYPE_ID = T.ID LEFT JOIN CONTRACT CT ON A.BUSINESS_OBJ_ID = CT.ID INNER JOIN CLIENT CL ON CT.CLIENT_ID = CL.SYS_ID WHERE A.OPTION3 = 'contract' AND TRUNC(A.CRAETION_DATE) BETWEEN ? AND ? ORDER BY A.CRAETION_DATE DESC
getMyClientLastCommentsAlert=SELECT DISTINCT A.CRAETION_DATE ALERT_CREATION_DATE, A.OPTION1 STATUS_CODE, A.ID ALERT_ID, U.FULL_NAME COMMENT_BY, T.NAME ALERT_TYPE, C.NAME CLIENT_NAME, C.CLIENT_NO, C.SYS_ID CLIENT_ID FROM ALERT A LEFT JOIN USERS U ON A.CREATED_BY = U.USER_ID LEFT JOIN ALERT_TYPE T ON A.ALERT_TYPE_ID = T.ID INNER JOIN CLIENT C ON A.BUSINESS_OBJ_ID = C.SYS_ID RIGHT JOIN ISSUE I ON I.URGENCY_ID = C.SYS_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID WHERE A.CREATED_BY != ? AND CC.CREATED_BY = ? AND CC.CURRENT_STATUS NOT IN ('5', '6', '7') AND TRUNC(A.CRAETION_DATE) > TRUNC(SYSDATE - ?)