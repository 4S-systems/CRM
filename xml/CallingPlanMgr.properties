insertCallingPlan=INSERT INTO CALLING_PLAN VALUES (?,?,?,?,?,?,SYSDATE,?,?,CALLING_PLAN_NUMBER.nextval,?)
insertCallingPlanStatus=INSERT INTO ISSUE_STATUS VALUES (?, ?, ?, ?, NULL, ?, '0', ?, ?, ?, ?, ?, ?, ?)
