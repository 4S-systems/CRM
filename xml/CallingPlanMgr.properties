getClientCampaigns=SELECT CP.* FROM CALLING_PLAN_DETAILS CPD LEFT JOIN CALLING_PLAN CP ON CPD.CALLING_PLAN_ID = CP.ID WHERE CPD.CLIENT_ID = ?