insertStoreTransaction=INSERT INTO STORE_TRANSACTION VALUES(?,?,STORE_TRANSACTION_SEQ.NEXTVAL,?,?,NULL,NULL,?,?,?,SYSDATE,?,SYSDATE,?,?,?,?,?,?)
getStoreTransactionsWithStatus=SELECT IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, T.CASE_AR STATUS_NAME_AR, T.CASE_EN STATUS_NAME_EN, ST.* FROM STORE_TRANSACTION ST LEFT JOIN ISSUE_BY_COMPLAINT IC ON ST.DEPEND_ON_ISSUE_ID = IC.ISSUE_ID LEFT JOIN STATUS_TYPE T ON ST.CURRENT_STATUS = T.ID WHERE ST.CURRENT_STATUS LIKE '%statusID%' AND TRUNC(ST.CREATION_TIME) BETWEEN ? AND ? AND ST.ID IN (SELECT STORE_TRANSACTION_ID FROM STORE_TRANSACTION_DETAILS WHERE ITEM_ID LIKE '%itemID%')
updateTransactionStatus=UPDATE STORE_TRANSACTION SET CURRENT_STATUS = ?, CURRENT_STATUS_SINCE = SYSDATE WHERE ID = ?