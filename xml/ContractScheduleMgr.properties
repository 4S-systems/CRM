insertContractSchedule=INSERT INTO CONTRACT_SCHEDULE VALUES (?,?,?,?,?,?,?,?,?,SYSDATE,?,?,?,?,?,?,?)
getContractSchedulesList=SELECT CS.*, CT.CONTACT_NUMBER, ST.CASE_AR SCHEDULE_STATUS_NAME FROM CONTRACT_SCHEDULE CS LEFT JOIN CONTRACT CT ON CS.CONTRACT_ID = CT.ID JOIN STATUS_TYPE ST ON CS.SCHEDULE_STATUS = ST.ID
updateContractSchedule=UPDATE CONTRACT_SCHEDULE SET CONTRACT_ID = ?, SCHEDULE_TITLE = ?, FREQUENCY_RATE = ?, FREQUENCY_TYPE = ?, SCHEDULE_TYPE = ?, FROM_DATE = ?, TO_DATE = ? WHERE ID = ?
updateContractScheduleStatus=UPDATE CONTRACT_SCHEDULE SET SCHEDULE_STATUS = ? WHERE ID = ?