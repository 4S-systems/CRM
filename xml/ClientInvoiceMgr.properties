insertInvoice=INSERT INTO CLIENT_INVOICE VALUES (?,?,?,?,?,?,SYSDATE,?,SYSDATE,?,?,?,?,?,?)
updateInvoice=UPDATE CLIENT_INVOICE SET INVOICE_DATE = ?, EXTRACT_NO = ?, OPTION1 = ? WHERE ID = ?
getClientApprovedInvoices=SELECT I.BUSINESS_ID, I.INVOICE_NO, I.INVOICE_DATE, I.OPTION1 FROM CLIENT_INVOICE I LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ID LEFT JOIN ISSUE S ON CC.ISSUE_ID = S.ID WHERE S.URGENCY_ID = ? AND I.CURRENT_STATUS IN ('83', '84') ORDER BY I.INVOICE_DATE
getClientsInvoices = SELECT DISTINCT CI.*, CL.NAME, CL.MOBILE, CL.EMAIL, U.FULL_NAME, ST.CASE_EN, ST.CASE_AR FROM CLIENT_INVOICE CI LEFT JOIN INVOICE_JOB_ORDER IJ ON CI.ID = IJ.INVOICE_ID LEFT JOIN CLIENT_COMPLAINTS CC ON IJ.JOB_ORDER_ID = CC.ID LEFT JOIN ISSUE ISS ON CC.ISSUE_ID = ISS.ID LEFT JOIN CLIENT CL ON ISS.URGENCY_ID = CL.SYS_ID LEFT JOIN USERS U ON CI.CREATED_BY = U.USER_ID LEFT JOIN STATUS_TYPE ST ON CI.CURRENT_STATUS = ST.ID WHERE TRUNC(CI.CREATION_TIME) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY')
