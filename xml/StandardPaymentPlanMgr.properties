insertStandardPaymentPlan = INSERT INTO STANDARED_PAYMENT_PLAN (SPLAN_ID, PLAN_TITEL, RESERVATION_AMT, DOWN_PMT_AMT, DOWN_PMT_DATE, INSTALLMENT_SYS, FRIST_INSTALLMENT_DATE, INSTALLMENT_NUM, CREATED_BY, CREATION_DATE) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)
getStandardPaymentPlan = SELECT SPP.SPLAN_ID, SPP.PLAN_TITEL, SPP.DOWN_PMT_AMT, SPP.DOWN_PMT_DATE, SPP.FRIST_INSTALLMENT_DATE, SPP.INSTALLMENT_SYS, SPP.INSTALLMENT_NUM, SPP.RESERVATION_AMT, SPP.INSTALLMENT_AMT, SPPT.* FROM STANDARED_PAYMENT_PLAN SPP LEFT JOIN STNDRD_PYMNT_PLN_TOLERANCE SPPT ON SPP.SPLAN_ID = SPPT.SPLAN_ID
getStandardPaymentPlanFProject = SELECT SPP.SPLAN_ID, SPP.PLAN_TITEL, SPP.DOWN_PMT_AMT, SPP.DOWN_PMT_DATE, SPP.FRIST_INSTALLMENT_DATE, SPP.INSTALLMENT_SYS, SPP.INSTALLMENT_NUM, SPP.RESERVATION_AMT, SPP.INSTALLMENT_AMT, SPPT.* FROM STANDARED_PAYMENT_PLAN SPP LEFT JOIN STNDRD_PYMNT_PLN_TOLERANCE SPPT ON SPP.SPLAN_ID = SPPT.SPLAN_ID WHERE SPP.PROJECT_ID = ?
getPayPlansToProject = SELECT PY.*, SPP.SPLAN_ID, SPP.PLAN_TITEL, SPP.PMT_AMT, SPP.DOWN_PMT_AMT, SPP.DOWN_PMT_DATE, SPP.FRIST_INSTALLMENT_DATE, SPP.INSTALLMENT_SYS, SPP.INSTALLMENT_NUM, SPP.RESERVATION_AMT, SPP.INSTALLMENT_AMT FROM PROJECT_PAYMENTPLAN PY LEFT JOIN STANDARED_PAYMENT_PLAN SPP ON PY.PAY_ID = SPP.SPLAN_ID WHERE PY.PRJ_ID = ?
getStandardPaymentPlanFProjectForD = SELECT SPP.SPLAN_ID, SPP.PLAN_TITEL, SPP.DOWN_PMT_AMT, SPP.DOWN_PMT_DATE, SPP.FRIST_INSTALLMENT_DATE, SPP.INSTALLMENT_SYS, SPP.INSTALLMENT_NUM, SPP.RESERVATION_AMT, SPP.INSTALLMENT_AMT, SPP.YEARINSPAYTYP,SPP.YEARINSPAYVAL, SPP.YEARMININSPAYVAL, SPPT.* FROM STANDARED_PAYMENT_PLAN SPP LEFT JOIN STNDRD_PYMNT_PLN_TOLERANCE SPPT ON SPP.SPLAN_ID = SPPT.SPLAN_ID WHERE SPP.PROJECT_ID = ? AND SPP.MAINTYPE = 'dual'
getStandardPaymentPlanFProjectForSppCpp = SELECT SPP.SPLAN_ID, SPP.PLAN_TITEL, SPP.DOWN_PMT_AMT, SPP.DOWN_PMT_DATE, SPP.FRIST_INSTALLMENT_DATE, SPP.INSTALLMENT_SYS, SPP.INSTALLMENT_NUM, SPP.RESERVATION_AMT, SPP.INSTALLMENT_AMT, SPP.YEARINSPAYTYP,SPP.YEARINSPAYVAL, SPP.YEARMININSPAYVAL, SPPT.* FROM STANDARED_PAYMENT_PLAN SPP LEFT JOIN STNDRD_PYMNT_PLN_TOLERANCE SPPT ON SPP.SPLAN_ID = SPPT.SPLAN_ID WHERE SPP.PROJECT_ID = ? AND SPP.MAINTYPE <> 'dual' 