insert=INSERT INTO CONTRACT VALUES(?, ?, ?, ?, ?, ?, SYSDATE, ?, ?, ?, ?, ?)
insertContract =INSERT INTO CONTRACT VALUES(?, ?, ?, contractNo, ?, ?, ?, ?, ?, ?, ?, SYSDATE, ?, ?, SYSDATE , ?, ?, ?, ?, ?,'UL','UL','UL','UL','UL')
list=SELECT CLIENT.NAME, USERS.USER_NAME, CONTRACT.*, STATUS_TYPE.CASE_AR CURRENT_STATUS_AR, STATUS_TYPE.CASE_EN CURRENT_STATUS_EN FROM CONTRACT INNER JOIN CLIENT ON CLIENT.ID = CONTRACT.CLIENT_ID INNER JOIN USERS ON USERS.USER_ID = CONTRACT.CREATED_BY LEFT JOIN STATUS_TYPE ON CONTRACT.OPTION4 = STATUS_TYPE.ID WHERE CONTRACT.OPTION3 = ?
getActiveContractsForEquipment=SELECT * FROM (SELECT UNIQUE C.*, CL.NAME CLIENT_NAME FROM CONTRACT C JOIN EMP_CARS EC ON C.OPTION2 = EC.EMPID AND EC.END_DATE IS NULL AND EC.TYPE = 'supervisor' LEFT JOIN CLIENT CL ON C.CLIENT_ID = CL.ID WHERE EC.EQUEP_ID = ? AND C.OPTION4 = '8' UNION ALL SELECT UNIQUE C.*, CL.NAME CLIENT_NAME FROM CONTRACT C LEFT JOIN CONTRACT_EMPLOYEE CE ON C.ID = CE.CONTRACT_ID JOIN EMP_CARS EC ON CE.EMPLOYEE_ID = EC.EMPID AND EC.END_DATE IS NULL AND EC.TYPE IN ('subsupervisor', 'supervisor') LEFT JOIN CLIENT CL ON C.CLIENT_ID = CL.ID WHERE EC.EQUEP_ID = ? AND C.OPTION4 = '8') ORDER BY OPTION1
insertFirstIssueStatus=INSERT INTO ISSUE_STATUS VALUES (?,?,?,?,?,NULL,SYSDATE,?,'UL','UL','UL',?,'Contract')
updateContractStatus=UPDATE CONTRACT SET OPTION4 = ?, OPTION5 = SYSDATE WHERE ID = ?
getContractStatus=SELECT * FROM STATUS_TYPE WHERE ID = ?
updateContract=UPDATE CONTRACT SET columnName = ? WHERE ID = ?

temp=select mu.*, CEIL((EOO.DATEFIELD - boo.DATEFIELD) / (1000*60*60)) from MAINTAINABLE_UNIT mu left join OPERATION_ORDER oo on MU.ID = OO.VEHICLE_ID left join (select * from OP_ORDER_EVENT_STATUS where EVENT_IDO = '11') eoo on OO.ID = EOO.OPERATION_ORDER_ID left join (select * from OP_ORDER_EVENT_STATUS where EVENT_IDO = '1') boo on OO.ID = BOO.OPERATION_ORDER_ID where OO.CURRENT_STATUS in ('3', '4') and OO.CONTRACT = '1480405513792'

getAllCntrctNo = SELECT ID, OPTION1 FROM CONTRACT
getAllContractsAboutToExpire=SELECT * FROM CONTRACT WHERE END_DATE <= SYSDATE + ?