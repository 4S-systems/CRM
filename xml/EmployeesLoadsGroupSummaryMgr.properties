getFreeEmployeeByGroup=SELECT USER_ID FROM EMPLOYEES_LOADS_GROUP_SUMMARY WHERE TOTAL = (SELECT MIN(EL.TOTAL) FROM EMPLOYEES_LOADS_GROUP_SUMMARY EL WHERE EL.GROUP_ID = ? whereStatement) AND GROUP_ID = ?
getFreeEmployeeByDefaultGroup=SELECT USER_ID FROM EMPLOYEES_LOADS_GROUP_SUMMARY WHERE TOTAL = (SELECT MIN(EL.TOTAL) FROM EMPLOYEES_LOADS_GROUP_SUMMARY EL WHERE EL.GROUP_ID = ? AND EL.IS_DEFAULT = ?) AND GROUP_ID = ? AND IS_DEFAULT = ?