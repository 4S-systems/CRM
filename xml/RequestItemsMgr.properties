insert=INSERT INTO REQUEST_ITEMS VALUES(?,?,?,?,?,?,?,SYSDATE,?,?,?,?,?,?)
update=UPDATE REQUEST_ITEMS SET QUANTITY = ?, VALID = ?, NOTE = ? WHERE ID = ?
delete=DELETE FROM REQUEST_ITEMS WHERE ID = ?
deleteByIssueId=DELETE FROM REQUEST_ITEMS WHERE ISSUE_ID = ?
getByIssueId=SELECT * FROM REQUEST_ITEMS WHERE ISSUE_ID = ?
getRepeatedUnitItems=SELECT RS.NUM, P.PROJECT_NAME UNIT_NAME, P.PROJECT_ID UNIT_ID, I.PROJECT_NAME ITEM_NAME, I.PROJECT_ID ITEM_ID FROM (SELECT COUNT(*) NUM, P.PROJECT_ID UNIT_ID, R.PROJECT_ID ITEM_ID FROM REQUEST_ITEMS R LEFT JOIN ISSUE I ON R.ISSUE_ID = I.ID LEFT JOIN PROJECT P ON I.UNIT_ID = P.PROJECT_NAME WHERE I.CREATION_TIME BETWEEN ? AND ? GROUP BY P.PROJECT_ID, R.PROJECT_ID) RS LEFT JOIN PROJECT P ON RS.UNIT_ID = P.PROJECT_ID LEFT JOIN PROJECT I ON RS.ITEM_ID = I.PROJECT_ID WHERE RS.NUM > 1 AND RS.UNIT_ID IS NOT NULL
getRepeatedItemIssues=SELECT I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, C.NAME CONTRACTOR_NAME, I.ID ISSUE_ID FROM ISSUE I LEFT JOIN REQUEST_ITEMS R ON I.ID = R.ISSUE_ID LEFT JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID WHERE I.UNIT_ID = ? AND R.PROJECT_ID = ?
getRequestItemsUnit=SELECT UNIQUE P.PROJECT_NAME UNIT_NAME, P.PROJECT_ID UNIT_ID FROM REQUEST_ITEMS R LEFT JOIN ISSUE I ON R.ISSUE_ID = I.ID LEFT JOIN PROJECT P ON I.UNIT_ID = P.PROJECT_NAME WHERE I.CREATION_TIME BETWEEN ? AND ?
getItemsByUnit=SELECT R.*, P.PROJECT_NAME ITEM_NAME, P.PROJECT_ID ITEM_ID, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, C.NAME CONTRACTOR_NAME FROM REQUEST_ITEMS R LEFT JOIN ISSUE I ON R.ISSUE_ID = I.ID LEFT JOIN PROJECT P ON R.PROJECT_ID = P.PROJECT_ID LEFT JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID WHERE I.CREATION_TIME BETWEEN ? AND ? AND I.UNIT_ID = ?
getWorkItemsRecurringCurve=SELECT COUNT(*) TOTAL, P.PROJECT_NAME ITEM_NAME FROM REQUEST_ITEMS RI LEFT JOIN PROJECT P ON P.PROJECT_ID = RI.PROJECT_ID WHERE ISSUE_ID IN (SELECT IC.ISSUE_ID FROM ISSUE_BY_COMPLAINT IC LEFT JOIN ISSUE_PROJECT IP ON IC.ISSUE_ID = IP.ISSUE_ID WHERE TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND CREATED_BY LIKE '%engineerID%' AND CUSTOMER_ID LIKE '%contractorID%' AND IP.PROJECT_ID LIKE '%projectID%') GROUP BY P.PROJECT_NAME
getSpareItemStatuses=SELECT * FROM STATUS_TYPE WHERE BUSINESS_TYPE = 'Spare Item'
updateObject=UPDATE REQUEST_ITEMS SET NOTE = ?, OPTION3 = ?, OPTION4 = ?, OPTION5 = ?, OPTION6 = ? WHERE ID = ?