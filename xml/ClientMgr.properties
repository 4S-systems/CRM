getClientByEmail=select DISTINCT c.*, s.CASE_AR, s.CASE_EN, p.PROJECT_NAME as branchName from client c left join issue ISS ON ISS.URGENCY_ID = C.SYS_ID left join project p on c.BRANCH = p.PROJECT_ID left join status_type s on c.CURRENT_STATUS = s.ID where LOWER(c.EMAIL) LIKE '%emailAddress%'
getNonFollowers=SELECT UNIQUE C.*, CC.CURRENT_OWNER_ID, U.FULL_NAME CURRENT_OWNER_NAME, P.PROJECT_NAME RATE_NAME, P.OPTION_THREE IMAGE_NAME , COM.CREATION_TIME AS LAST_COM_DATE , AP.CREATION_TIME AS LAST_APP_DATE FROM CLIENT C LEFT JOIN COMMENTS COM ON C.SYS_ID = COM.BUSNIESS_OBJECT_ID LEFT JOIN APPOINTMENT AP ON C.SYS_ID = AP.CLIENT_ID LEFT JOIN ISSUE I ON C.SYS_ID = I.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CC ON CC.ISSUE_ID = I.ID LEFT JOIN DISTRIBUTION_LIST DL ON CC.ID = DL.CLIENT_COM_ID LEFT JOIN USERS U ON CC.CURRENT_OWNER_ID = U.USER_ID LEFT JOIN CLIENT_RATING CR ON C.SYS_ID = CR.CLIENT_ID LEFT JOIN PROJECT P ON P.PROJECT_ID = CR.RATE_ID WHERE C.CURRENT_STATUS = '12' AND (COM.CREATION_TIME = (SELECT MAX(CREATION_TIME) FROM COMMENTS WHERE BUSNIESS_OBJECT_ID = C.SYS_ID)OR COM.CREATION_TIME IS NULL) AND (AP.CREATION_TIME = (SELECT MAX(CREATION_TIME) FROM APPOINTMENT WHERE CLIENT_ID = C.SYS_ID) OR AP.CREATION_TIME IS NULL) AND C.SYS_ID NOT IN (SELECT CLIENT_ID FROM APPOINTMENT WHERE CREATION_TIME >= TRUNC(SYSDATE - ?)) AND C.SYS_ID NOT IN (SELECT BUSNIESS_OBJECT_ID FROM COMMENTS WHERE CREATION_TIME >= TRUNC(SYSDATE - ?)) AND DL.OPTION1 LIKE '%\u0639\u0645\u064a\u0644 \u062c\u062f\u064a\u062f%' AND CC.CURRENT_OWNER_ID LIKE 'currentOwnerID'
getEmployeeProductions = select count(*) TOTAL,CREATED_BY from CLIENT where CREATION_TIME between to_date(?,'dd-MM-YYYY') and to_date(?,'dd-MM-YYYY') and CREATED_BY in (select user_id from user_group where group_id=?) group by CREATED_BY
getProductivityByGroup=select count(creation_time) total, start_date, end_date from (select creation_time from client where created_by in (select user_id from user_group where group_id = ?)) cl right join (select unique TRUNC((to_date(?, 'dd/mm/yyyy') + rownum) - 4, 'IW') + 4 as start_date, TRUNC((to_date(?, 'dd/mm/yyyy') + rownum) + 3, 'IW') + 3 as end_date from dual connect by level <= 92) d on TRUNC(CL.CREATION_TIME) >= d.start_date and TRUNC(CL.CREATION_TIME) <= end_date group by start_date, end_date order by start_date
getProductivityByUser=select count(creation_time) total, start_date, end_date from (select creation_time from client where created_by = ?) cl right join (select unique TRUNC((to_date(?, 'dd/mm/yyyy') + rownum) - 4, 'IW') + 4 as start_date, TRUNC((to_date(?, 'dd/mm/yyyy') + rownum) + 3, 'IW') + 3 as end_date from dual connect by level <= 92) d on TRUNC(CL.CREATION_TIME) >= d.start_date and TRUNC(CL.CREATION_TIME) <= end_date group by start_date, end_date order by start_date
getAppointmentsByUser=select count(CREATION_TIME) total, start_date, end_date from (select CREATION_TIME from appointment where USER_ID = ? AND TITLE != 'Job Order' AND CURRENT_STATUS = '29') cl right join (select unique TRUNC((to_date(?, 'dd/mm/yyyy') + rownum) - 4, 'IW') + 4 as start_date, TRUNC((to_date(?, 'dd/mm/yyyy') + rownum) + 3, 'IW') + 3 as end_date from dual connect by level <= 92) d on TRUNC(CL.CREATION_TIME) >= d.start_date and TRUNC(CL.CREATION_TIME) <= end_date group by start_date, end_date order by start_date
deleteIssuesWithCLientID=delete from ISSUE where URGENCY_ID = ?
getClientsWithCommentsByOwnerDate=SELECT CL.SYS_ID, CL.CLIENT_NO, CL.NAME, CL.MOBILE, CL.PHONE, CL.INTER_PHONE, CL.DESCRIPTION, CO.CREATED_BY, U.FULL_NAME AS CREATED_BY_NAME, CO.COMMENT_DESC, CO.CREATION_TIME ,cl.creation_time as clCreation_time ,CP.CAMPAIGN_TITLE FROM CLIENT CL INNER JOIN COMMENTS CO ON CL.SYS_ID = CO.BUSNIESS_OBJECT_ID AND CO.CREATION_TIME = (SELECT MAX(CO2.CREATION_TIME) FROM COMMENTS CO2 WHERE CO2.BUSNIESS_OBJECT_ID = CL.SYS_ID) INNER JOIN USERS U ON CO.CREATED_BY = U.USER_ID LEFT JOIN CLIENT_CAMPAIGN CCP ON CL.SYS_ID = CCP.CLIENT_ID LEFT JOIN CAMPAIGN CP ON CCP.CAMPAIGN_ID = CP.ID WHERE wherestatment cl.creation_time BETWEEN TO_DATE(?, 'YYYY/MM/dd') AND TO_DATE(?, 'YYYY/MM/dd') ORDER BY CREATION_TIME DESC
getClientByUnitID=select * from client where SYS_ID = (select client_id from client_projects where product_id = 'purche' and project_id = ?)
getGroupSummary=SELECT TOTAL_CLIENTS, TOTAL_COMMENTS, TOTAL_APPOINTMENTS, TOTAL_FINISH, TOTAL_CLOSURE, TOTAL_CONFIRMED, TOTAL_NON_CONFIRMED, CASE WHEN I.CREATED_BY IS NOT NULL THEN I.CREATED_BY WHEN M.CREATED_BY IS NOT NULL THEN M.CREATED_BY WHEN A.CREATED_BY IS NOT NULL THEN A.CREATED_BY WHEN SC.CREATED_BY IS NOT NULL THEN SC.CREATED_BY WHEN SF.CREATED_BY IS NOT NULL THEN SF.CREATED_BY WHEN CF.CREATED_BY IS NOT NULL THEN CF.CREATED_BY ELSE NCF.CREATED_BY END CREATED_BY, CASE WHEN I.FULL_NAME IS NOT NULL THEN I.FULL_NAME WHEN M.FULL_NAME IS NOT NULL THEN M.FULL_NAME WHEN A.FULL_NAME IS NOT NULL THEN A.FULL_NAME WHEN SC.FULL_NAME IS NOT NULL THEN SC.FULL_NAME WHEN SF.FULL_NAME IS NOT NULL THEN SF.FULL_NAME WHEN CF.FULL_NAME IS NOT NULL THEN CF.FULL_NAME ELSE NCF.FULL_NAME END USER_NAME FROM (SELECT COUNT(*) TOTAL_CLIENTS, CL.CREATED_BY, US.FULL_NAME FROM CLIENT CL LEFT JOIN USERS US ON CL.CREATED_BY = US.USER_ID WHERE TRUNC(CL.CREATION_TIME) BETWEEN 'fromDate' AND 'toDate' AND CL.CREATED_BY IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = 'groupID') GROUP BY CL.CREATED_BY, US.FULL_NAME) I FULL JOIN (SELECT COUNT(*) TOTAL_COMMENTS, CO.CREATED_BY, US.FULL_NAME FROM COMMENTS CO LEFT JOIN USERS US ON CO.CREATED_BY = US.USER_ID WHERE TRUNC(CO.CREATION_TIME) BETWEEN 'fromDate' AND 'toDate' AND CO.CREATED_BY IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = 'groupID') GROUP BY CO.CREATED_BY, US.FULL_NAME) M ON I.CREATED_BY = M.CREATED_BY FULL JOIN (SELECT COUNT(*) TOTAL_APPOINTMENTS, AP.USER_ID CREATED_BY, US.FULL_NAME FROM APPOINTMENT AP LEFT JOIN USERS US ON AP.USER_ID = US.USER_ID WHERE TRUNC(AP.CREATION_TIME) BETWEEN 'fromDate' AND 'toDate' AND AP.USER_ID IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = 'groupID') AND TITLE != 'Job Order' AND AP.CURRENT_STATUS ='29' GROUP BY AP.USER_ID, US.FULL_NAME) A ON I.CREATED_BY = A.CREATED_BY OR M.CREATED_BY = A.CREATED_BY LEFT JOIN (SELECT COUNT(*) TOTAL_FINISH, ST.CREATED_BY, US.FULL_NAME FROM ISSUE_STATUS ST LEFT JOIN USERS US ON ST.CREATED_BY = US.USER_ID WHERE ST.STATUS_NAME = '6' AND TRUNC(ST.BEGIN_DATE) BETWEEN 'fromDate' AND 'toDate' AND ST.CREATED_BY IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = 'groupID') GROUP BY ST.CREATED_BY, US.FULL_NAME) SC ON I.CREATED_BY = SC.CREATED_BY OR SC.CREATED_BY = A.CREATED_BY OR SC.CREATED_BY = M.CREATED_BY LEFT JOIN (SELECT COUNT(*) TOTAL_CLOSURE, ST.CREATED_BY, US.FULL_NAME FROM ISSUE_STATUS ST LEFT JOIN USERS US ON ST.CREATED_BY = US.USER_ID WHERE ST.STATUS_NAME = '7' AND TRUNC(ST.BEGIN_DATE) BETWEEN 'fromDate' AND 'toDate' AND ST.CREATED_BY IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = 'groupID') GROUP BY ST.CREATED_BY, US.FULL_NAME) SF ON SF.CREATED_BY = I.CREATED_BY OR SF.CREATED_BY = A.CREATED_BY OR SF.CREATED_BY = M.CREATED_BY OR SF.CREATED_BY = SC.CREATED_BY LEFT JOIN (SELECT COUNT(*) TOTAL_CONFIRMED, RV.CREATED_BY CREATED_BY, US.FULL_NAME FROM RESERVATION RV LEFT JOIN USERS US ON RV.CREATED_BY = US.USER_ID WHERE TRUNC(RV.CREATION_TIME) BETWEEN 'fromDate' AND 'toDate' AND RV.CREATED_BY IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = 'groupID') AND RV.CURRENT_STATUS = '31' GROUP BY RV.CREATED_BY, US.FULL_NAME) CF ON CF.CREATED_BY = I.CREATED_BY OR CF.CREATED_BY = A.CREATED_BY OR CF.CREATED_BY = M.CREATED_BY OR CF.CREATED_BY = SC.CREATED_BY OR CF.CREATED_BY = SF.CREATED_BY LEFT JOIN (SELECT COUNT(*) TOTAL_NON_CONFIRMED, RV.CREATED_BY CREATED_BY, US.FULL_NAME FROM RESERVATION RV LEFT JOIN USERS US ON RV.CREATED_BY = US.USER_ID WHERE TRUNC(RV.CREATION_TIME) BETWEEN 'fromDate' AND 'toDate' AND RV.CREATED_BY IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = 'groupID') AND RV.CURRENT_STATUS <> '31' GROUP BY RV.CREATED_BY, US.FULL_NAME) NCF ON NCF.CREATED_BY = I.CREATED_BY OR NCF.CREATED_BY = A.CREATED_BY OR NCF.CREATED_BY = M.CREATED_BY OR NCF.CREATED_BY = SC.CREATED_BY OR NCF.CREATED_BY = SF.CREATED_BY OR NCF.CREATED_BY = CF.CREATED_BY
getClientsByProject=select c.*, cp.CREATION_TIME AS interestingTime, u.FULL_NAME as createdBy FROM CLIENT_PROJECTS CP LEFT JOIN CLIENT C ON CP.CLIENT_ID = C.SYS_ID LEFT JOIN USERS u ON cp.CREATED_BY = u.USER_ID WHERE CP.PRODUCT_ID = 'interested' AND (CP.PROJECT_ID = ? or CP.PRODUCT_CATEGORY_ID = ?)and trunc(C.CREATION_TIME) between ? and ?
getClosedClients=SELECT UNIQUE C.*, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, SU.FULL_NAME SALESMAN_NAME, CU.FULL_NAME CLOSED_BY_NAME, CC.CURRENT_STATUS_SINCE END_DATE FROM ISSUE I LEFT JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID LEFT JOIN USERS SU ON C.CREATED_BY = SU.USER_ID LEFT JOIN USERS CU ON CU.USER_ID = CC.CURRENT_OWNER_ID WHERE C.CURRENT_STATUS != '11' AND CC.CURRENT_STATUS = '7' AND TRUNC(CC.CURRENT_STATUS_SINCE) BETWEEN ? AND ?
getAbstractClient=select count(distinct I.URGENCY_ID) as client_count, u.FULL_NAME User_name from CLIENT c left join issue i on c.SYS_ID = I.URGENCY_ID left join CLIENT_COMPLAINTS cm on CM.ISSUE_ID = I.ID left join users u on CM.CURRENT_OWNER_ID = u.USER_ID where SYS_ID NOT in (select distinct BUSNIESS_OBJECT_ID from comments inner join client on comments.BUSNIESS_OBJECT_ID = client.SYS_ID) and SYS_ID NOT IN (select distinct APPOINTMENT.CLIENT_ID from APPOINTMENT inner join client on APPOINTMENT.CLIENT_ID = client.SYS_ID) and CM.CURRENT_OWNER_ID in (select distinct user_id from user_group where group_id = ?) and c.CURRENT_STATUS = 12 GROUP BY u.FULL_NAME
getCampaignClients=SELECT DISTINCT C.*, U.FULL_NAME CREATED_BY_NAME, OU.FULL_NAME CURRENT_OWNER_NAME, R.PROJECT_NAME CLIENT_RATE, CL.BUSINESS_ID FROM CLIENT C LEFT JOIN CLIENT_CAMPAIGN CC ON C.SYS_ID=CC.CLIENT_ID LEFT JOIN CAMPAIGN CP ON CC.CAMPAIGN_ID = CP.ID LEFT JOIN USERS U ON C.CREATED_BY = U.USER_ID LEFT JOIN ISSUE I ON C.SYS_ID = I.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CL ON CL.ISSUE_ID = I.ID LEFT JOIN USERS OU ON OU.USER_ID = CL.CURRENT_OWNER_ID LEFT JOIN CLIENT_RATING CR ON CR.CLIENT_ID = C.SYS_ID LEFT JOIN PROJECT R ON CR.RATE_ID = R.PROJECT_ID WHERE CC.CAMPAIGN_ID = ? AND CL.CURRENT_STATUS NOT IN ('5', '6', '7')
getCampaignSolidClients=SELECT DISTINCT C.*, U.FULL_NAME CREATED_BY_NAME, OU.FULL_NAME CURRENT_OWNER_NAME, R.PROJECT_NAME CLIENT_RATE FROM CLIENT C LEFT JOIN CLIENT_CAMPAIGN CC ON C.SYS_ID=CC.CLIENT_ID LEFT JOIN CAMPAIGN CP ON CC.CAMPAIGN_ID = CP.ID LEFT JOIN USERS U ON C.CREATED_BY = U.USER_ID LEFT JOIN (SELECT * FROM ISSUE_BY_COMPLAINT_UNIQUE WHERE CLIENT_COM_ID IN (SELECT MAX(CLIENT_COM_ID) FROM ISSUE_BY_COMPLAINT_UNIQUE GROUP BY CUSTOMER_ID)) IC ON C.SYS_ID = IC.CUSTOMER_ID LEFT JOIN USERS OU ON OU.USER_ID = IC.CURRENT_OWNER_ID LEFT JOIN CLIENT_RATING CR ON CR.CLIENT_ID = C.SYS_ID LEFT JOIN PROJECT R ON CR.RATE_ID = R.PROJECT_ID WHERE C.SYS_ID IN (SELECT CLIENT_ID FROM CLIENT_PROJECTS WHERE PRODUCT_ID = 'purche') AND CC.CAMPAIGN_ID = ?
getNonFollowersClientsSummary=SELECT COUNT(DISTINCT IC.ISSUE_ID) AS CLIENT_COUNT, U.FULL_NAME USER_NAME FROM ISSUE_BY_COMPLAINT_UNIQUE IC LEFT JOIN CLIENT C ON IC.CUSTOMER_ID = C.SYS_ID LEFT JOIN USERS U ON IC.CURRENT_OWNER_ID = U.USER_ID where IC.CUSTOMER_ID NOT in (select distinct BUSNIESS_OBJECT_ID from comments inner join client on comments.BUSNIESS_OBJECT_ID = client.SYS_ID WHERE TRUNC(COMMENTS.CREATION_TIME) BETWEEN ? AND ?) and IC.CUSTOMER_ID NOT IN (select distinct APPOINTMENT.CLIENT_ID from APPOINTMENT inner join client on APPOINTMENT.CLIENT_ID = client.SYS_ID WHERE TRUNC(APPOINTMENT.CREATION_TIME) BETWEEN ? AND ?) and IC.CURRENT_OWNER_ID in (select distinct user_id from user_group where group_id = ?) and C.CURRENT_STATUS = 12 GROUP BY U.FULL_NAME ORDER BY U.FULL_NAME
getAverageResponseSpeed=SELECT C.*, CM.FIRST_COMMENT_DATE, AP.FIRST_APPOINTMENT_DATE FROM CLIENT C LEFT JOIN (SELECT MIN(CREATION_TIME) FIRST_COMMENT_DATE, BUSNIESS_OBJECT_ID FROM COMMENTS GROUP BY BUSNIESS_OBJECT_ID) CM ON C.SYS_ID = CM.BUSNIESS_OBJECT_ID INNER JOIN (SELECT MIN(APPOINTMENT_DATE) FIRST_APPOINTMENT_DATE, CLIENT_ID FROM APPOINTMENT WHERE OPTION2 = 'meeting' AND OPTION9 = 'attended' GROUP BY CLIENT_ID) AP ON C.SYS_ID = AP.CLIENT_ID LEFT JOIN CLIENT_CAMPAIGN CP ON C.SYS_ID = CP.CLIENT_ID WHERE TRUNC(C.CREATION_TIME) BETWEEN ? AND ? AND C.SYS_ID IN (SELECT I.URGENCY_ID FROM ISSUE I LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID LEFT JOIN CLIENT_COMPLAINTS_TYPE CT ON CC.ID = CT.ID WHERE CC.CURRENT_OWNER_ID IN (SELECT USER_ID FROM USERS WHERE USER_ID IN (SELECT EMP_MGR.EMP_ID FROM EMP_MGR WHERE EMP_MGR.MGR_ID IN (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID LIKE '%departmentID') UNION ALL SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID LIKE '%departmentID'))) AND CP.CAMPAIGN_ID LIKE '%campaignID' ORDER BY C.CREATION_TIME
getClientsLastAppointmentByOwner=SELECT DISTINCT CL.SYS_ID, CL.CLIENT_NO, CL.NAME, CL.MOBILE, CL.PHONE, CL.INTER_PHONE, CL.DESCRIPTION, AP.USER_ID, U.FULL_NAME AS CREATED_BY_NAME, AP.NOTE, AP.CREATION_TIME, AP."COMMENT", PR.PROJECT_NAME RATE_NAME ,CL.CREATION_TIME as clientCreationTime, CP.CAMPAIGN_TITLE FROM CLIENT CL INNER JOIN APPOINTMENT AP ON CL.SYS_ID = AP.CLIENT_ID AND AP.CURRENT_STATUS_SINCE IN (SELECT MAX(CURRENT_STATUS_SINCE) FROM APPOINTMENT WHERE CLIENT_ID = CL.SYS_ID AND "COMMENT" IS NOT NULL) INNER JOIN USERS U ON AP.USER_ID = U.USER_ID LEFT JOIN CLIENT_RATING CR ON CL.SYS_ID = CR.CLIENT_ID LEFT JOIN PROJECT PR ON CR.RATE_ID = PR.PROJECT_ID LEFT JOIN CLIENT_CAMPAIGN CCP ON CL.SYS_ID = CCP.CLIENT_ID LEFT JOIN CAMPAIGN CP ON CCP.CAMPAIGN_ID = CP.ID WHERE wherestatment AND CL.CREATION_TIME BETWEEN TO_DATE(?, 'YYYY/MM/dd') AND TO_DATE(?, 'YYYY/MM/dd') +interval '1' day ORDER BY CREATION_TIME DESC
getActiveClientByOwner=SELECT DISTINCT IC.CUSTOMER_ID SYS_ID, IC.CUSTOMER_NAME NAME, IC.CLIENT_MOBILE MOBILE, IC.CLIENT_PHONE PHONE, CASE WHEN CPD.ID IS NOT NULL THEN '1' ELSE '0' END PLAN_FLAG, CL.CLIENT_NO, CL.CURRENT_STATUS, CL.DESCRIPTION, ST.CASE_EN STATUS_NAME FROM ISSUE_BY_COMPLAINT IC LEFT JOIN CALLING_PLAN_DETAILS CPD ON IC.CUSTOMER_ID = CPD.CLIENT_ID LEFT JOIN CLIENT CL ON IC.CUSTOMER_ID = CL.SYS_ID LEFT JOIN STATUS_TYPE ST ON CL.CURRENT_STATUS = ST.ID WHERE IC.CURRENT_OWNER_ID = ? AND IC.STATUS_CODE IN ('1','2','3','4') AND IC.RESP= '1'
getBuildingCustomers=SELECT * FROM CLIENT C LEFT JOIN CLIENT_PROJECTS CP ON C.SYS_ID = CP.CLIENT_ID WHERE CP.PRODUCT_ID = 'purche' AND PROJECT_ID IN (SELECT PROJECT_ID FROM PROJECT WHERE PROJECT.MAIN_PROJ_ID = ? AND PROJECT_NAME NOT LIKE '%G.%')
getClientByDescForSales=SELECT DISTINCT C.*, S.CASE_AR, S.CASE_EN FROM CLIENT C left join issue ISS ON ISS.URGENCY_ID = C.SYS_ID LEFT JOIN STATUS_TYPE S ON C.CURRENT_STATUS = S.ID WHERE C.DESCRIPTION LIKE '%clientDescription%'
getNonCustomersByOwner=SELECT DISTINCT IC.CUSTOMER_ID SYS_ID, IC.CUSTOMER_NAME NAME, IC.CLIENT_MOBILE MOBILE, CL.CLIENT_NO, CL.EMAIL, CL.CURRENT_STATUS, CL.DESCRIPTION, ST.CASE_EN STATUS_NAME FROM ISSUE_BY_COMPLAINT IC LEFT JOIN CLIENT CL ON IC.CUSTOMER_ID = CL.SYS_ID LEFT JOIN STATUS_TYPE ST ON CL.CURRENT_STATUS = ST.ID WHERE IC.CURRENT_OWNER_ID = ? AND CL.CURRENT_STATUS != '11'
getCustomersClassification=SELECT DISTINCT IC.CUSTOMER_ID SYS_ID, IC.CUSTOMER_NAME NAME, IC.CLIENT_MOBILE MOBILE, CL.CLIENT_NO, CL.EMAIL,CL.CURRENT_STATUS,CL.DESCRIPTION, CL.CREATION_TIME, ST.ENGLISHNAME,CASE WHEN P.PROJECT_NAME IS NOT NULL THEN P.PROJECT_NAME ELSE 'Following up' END CLASS_TITLE, P.OPTION_THREE IMAGE_NAME, CR.RATE_ID , ap.CREATION_TIME as appDate ,COM.CREATION_TIME AS comDate, ap."COMMENT" as lstAppCom FROM ISSUE_BY_COMPLAINT IC LEFT JOIN CLIENT_COMPLAINTS CCC ON IC.ISSUE_ID = CCC.ISSUE_ID LEFT JOIN CLIENT_COMPLAINTS_TYPE CCT ON CCC.ID = CCT.ID LEFT JOIN CLIENT CL ON IC.CUSTOMER_ID = CL.SYS_ID LEFT JOIN APPOINTMENT ap ON CL.SYS_ID = ap.CLIENT_ID LEFT JOIN COMMENTS COM ON CL.CLIENT_NO = COM.BUSNIESS_OBJECT_ID LEFT JOIN CLIENT_RATING CR ON CR.CLIENT_ID = CL.SYS_ID LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID LEFT JOIN CLIENT_COMPLAINTS CC ON IC.COMP_ID = CC.ID LEFT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID WHERE IC.CURRENT_OWNER_ID = ? AND (ap.CURRENT_STATUS_SINCE  IN (SELECT MAX(CURRENT_STATUS_SINCE) FROM APPOINTMENT WHERE APPOINTMENT.CLIENT_ID = CL.SYS_ID)OR ap.CREATION_TIME IS NULL) AND (COM.CREATION_TIME IN (SELECT MAX(CREATION_TIME) FROM COMMENTS WHERE COMMENTS.BUSNIESS_OBJECT_ID = CL.CLIENT_NO) OR COM.CREATION_TIME IS NULL)
getCustomersClassification1=SELECT DISTINCT IC.CUSTOMER_ID SYS_ID, IC.CUSTOMER_NAME NAME, IC.CLIENT_MOBILE MOBILE,cl.inter_phone interphone ,CL.CLIENT_NO, CL.EMAIL,CL.CURRENT_STATUS,CL.DESCRIPTION, CL.CREATION_TIME, ST.ENGLISHNAME,CASE WHEN P.PROJECT_NAME IS NOT NULL THEN P.PROJECT_NAME ELSE 'Following up' END CLASS_TITLE, P.OPTION_THREE IMAGE_NAME, CR.RATE_ID , ap.CREATION_TIME as appDate , ap.appointment_date,COM.CREATION_TIME AS comDate, ap."COMMENT" as lstAppCom FROM ISSUE_BY_COMPLAINT IC LEFT JOIN CLIENT_COMPLAINTS CCC ON IC.COMP_ID = CCC.ID LEFT JOIN CLIENT_COMPLAINTS_TYPE CCT ON CCC.ID = CCT.ID LEFT JOIN CLIENT CL ON IC.CUSTOMER_ID = CL.SYS_ID LEFT JOIN APPOINTMENT ap ON CL.SYS_ID = ap.CLIENT_ID LEFT JOIN COMMENTS COM ON CL.CLIENT_NO = COM.BUSNIESS_OBJECT_ID LEFT JOIN CLIENT_RATING CR ON CR.CLIENT_ID = CL.SYS_ID AND CR.CREATED_BY = ? LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID LEFT JOIN CLIENT_COMPLAINTS CC ON IC.COMP_ID = CC.ID LEFT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID WHERE IC.receip_id = ? AND (ap.CURRENT_STATUS_SINCE  IN (SELECT MAX(CURRENT_STATUS_SINCE) FROM APPOINTMENT WHERE APPOINTMENT.CLIENT_ID = CL.SYS_ID)OR ap.CREATION_TIME IS NULL) AND (COM.CREATION_TIME IN (SELECT MAX(CREATION_TIME) FROM COMMENTS WHERE COMMENTS.BUSNIESS_OBJECT_ID = CL.CLIENT_NO) OR COM.CREATION_TIME IS NULL) AND IC.STATUS_CODE NOT IN ('5', '6', '7')
 
