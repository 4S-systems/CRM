getClientsWithMark=select t.SYS_ID,t.SALARY,t.REGION,t.PHONE,t.PARTNER,t.OPTION3,t.OPTION2,t.OPTION1,t.NATIONALITY,t.NAME,t.MOBILE,t.MATIRAL_STATUS,t.JOB,t.ISACTIVE,t.GENDER,t.EMAIL,t.CREATION_TIME,t.CREATED_BY,t.CODE,t.CLIENT_NO,t.CLIENTSSN,t.CLIENTNOBYDATE,t.BIRTH_DATE,t.AGE_GROUP,t.ADDRESS, t.INTER_PHONE,b.BOOKMARK_ID, b.BOOKMARK, u.FULL_NAME, CASE WHEN p.PROJECT_NAME IS NOT NULL THEN p.PROJECT_NAME ELSE 'None' END BRANCH_NAME, ST.ARABICNAME KNOW_US_BY fields_name from CLIENT t left join BOOKMARK b on t.SYS_ID = b.ISSUE_ID and b.OBJECT_TYPE ='CLIENT' and b.USER_ID = ? left join users u on t.CREATED_BY = u.USER_ID left join project p on t.BRANCH = p.PROJECT_ID LEFT JOIN SEASON_TYPE ST ON T.OPTION3 = ST.ID
