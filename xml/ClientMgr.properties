getTotalLocalClients = SELECT COUNT(*) as Total_Clients FROM CLIENT WHERE INTER_PHONE IS NULL OR IS_NUMBER(INTER_PHONE) = '0'
getClientsWithCampaginChannel=SELECT C.*, ST.ENGLISHNAME COMMUNICATION_CHANNEL, CP.CAMPAIGN_TITLE CAMPAIGN_TITLE, U.FULL_NAME CREATED_BY_NAME FROM CLIENT C LEFT JOIN CLIENT_CAMPAIGN CCP ON C.SYS_ID = CCP.CLIENT_ID LEFT JOIN CAMPAIGN CP ON CCP.CAMPAIGN_ID = CP.ID LEFT JOIN RECORD_SEASON RS ON CP.TOOL_ID = RS.ID INNER JOIN SEASON_TYPE ST ON RS.S_TYPECODE = ST.S_TYPECODE LEFT JOIN USERS U ON C.CREATED_BY = U.USER_ID WHERE TRUNC(C.CREATION_TIME) BETWEEN ? AND ? whereStatement order by COMMUNICATION_CHANNEL

getClosedRatedClients = SELECT DISTINCT CL.*, U.user_ID OWNER_ID, U.FULL_NAME OWNER_NAME, SU.FULL_NAME SOURCE_NAME, CC.ISSUE_ID FROM CLIENT CL LEFT JOIN ISSUE I ON I.URGENCY_ID = CL.SYS_ID RIGHT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID LEFT JOIN USERS U ON CC.CURRENT_OWNER_ID = U.USER_ID LEFT JOIN USERS SU ON CL.CREATED_BY = SU.USER_ID LEFT JOIN CLIENT_RATING CR ON CL.SYS_ID = CR.CLIENT_ID WHERE CR.RATE_ID IN (SELECT P.PROJECT_ID FROM PROJECT P WHERE P.PROJECT_NAME = 'Closed') whereStatement
getClassifiedClientsLastComments = SELECT DISTINCT IC.CUSTOMER_ID SYS_ID, IC.CUSTOMER_NAME NAME, IC.CLIENT_MOBILE MOBILE, CL.CLIENT_NO, CL.EMAIL, CL.CURRENT_STATUS, CL.DESCRIPTION, CL.CREATION_TIME, ST.ENGLISHNAME, CASE WHEN P.PROJECT_NAME IS NOT NULL THEN P.PROJECT_NAME ELSE 'Following up' END CLASS_TITLE, P.OPTION_THREE IMAGE_NAME, CR.RATE_ID, CMNT.CREATION_TIME AS CMNTDT, CMNT.COMMENT_DESC AS LSTCMNT FROM ISSUE_BY_COMPLAINT IC LEFT JOIN CLIENT CL ON IC.CUSTOMER_ID = CL.SYS_ID LEFT JOIN COMMENTS CMNT ON CL.SYS_ID = CMNT.BUSNIESS_OBJECT_ID LEFT JOIN CLIENT_RATING CR ON CR.CLIENT_ID = CL.SYS_ID LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID LEFT JOIN CLIENT_COMPLAINTS CC ON IC.COMP_ID = CC.ID LEFT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID WHERE CMNT.CREATED_BY = ? AND CMNT.CREATION_TIME IN (SELECT MAX(CMNTXTM.CREATION_TIME) FROM COMMENTS CMNTXTM WHERE CMNTXTM.BUSNIESS_OBJECT_ID = CL.SYS_ID)

addFcltyConfg = INSERT INTO FCLTY_CNFG VALUES (?, ?, ?, SYSDATE, NULL, '8', ?, 'UL',  ?, ?, SYSDATE, 'UL', 'UL', 'UL', ?, null)

getClientsWithdraws = SELECT UNIQUE WCH.*, C.NAME AS CLNT_NAME, C.CLIENT_NO, U1.FULL_NAME AS W_CREATED_BY, U2.FULL_NAME AS SENDER, U3.FULL_NAME AS RECIPE FROM WITHDARW_CLNT_HISTORY WCH LEFT JOIN CLIENT C ON WCH.CLIENT_ID = C.SYS_ID LEFT JOIN USERS U1 ON WCH.CREATED_BY = U1.USER_ID LEFT JOIN USERS U2 ON WCH.SENDER_ID = U2.USER_ID LEFT JOIN USERS U3 ON WCH.RECIP_ID = U3.USER_ID WHERE WCH.CLIENT_ID = (SELECT SYS_ID FROM CLIENT WHERE MOBILE = ?) and WCH.RECIP_ID <> ?
insertClientEtcInfo = INSERT INTO CLIENTS_ETC VALUES(?, ?, ?, ?, ?, ?, ?, ?, ?, ?, SYSDATE, 'UL', 'UL', 'UL', 'UL', 'UL', ?)
checkIfClientExist = SELECT * FROM CLIENTS_ETC WHERE CLIENT_ID = ?
updateClientExtraInfo = UPDATE CLIENTS_ETC SET AGE = ? , NO_OF_KIDS = ? , SCHOOL = ? , RELIGION = ? , FAV_SPORT = ? , FAV_MUSIC = ? , CLUB_MEM = ? , GENERAL_DESC = ?, MARRIAGE_DATE = ? where CLIENT_ID = ?
getClientsProfile = SELECT CP.* , CL.* , CE.*, ST.ENGLISHNAME COMCHANNEL , T.NAME AS JOBNM, UP.MAX_PRICE AS AREA, P.PROJECT_NAME AS REGIONnm, P1.PROJECT_NAME AS PROJECTNM, P2.PROJECT_NAME AS UNITNM, UP.MAX_PRICE AS AREA, UP1.OPTION1 AS PRICE , CP.CREATION_TIME AS TIMESTR FROM CLIENT_PROJECTS CP LEFT JOIN CLIENT CL ON CP.CLIENT_ID = CL.SYS_ID LEFT JOIN CLIENTS_ETC CE ON CL.SYS_ID = CE.CLIENT_ID LEFT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID LEFT JOIN TRADE T ON CL.JOB = T.ID LEFT JOIN PROJECT P ON CL.REGION = P.PROJECT_ID LEFT JOIN PROJECT P1 ON CP.PRODUCT_CATEGORY_ID = P1.PROJECT_ID LEFT JOIN PROJECT P2 ON CP.PROJECT_ID = P2.PROJECT_ID LEFT JOIN UNIT_PRICE UP ON P2.PROJECT_ID = UP.UNIT_ID LEFT JOIN UNIT_PRICE UP1 ON P2.PROJECT_ID = UP1.UNIT_ID where CP.PRODUCT_ID = 'purche' and TRUNC(CP.CREATION_TIME) between to_date(?,'YYYY-MM-DD') and to_date(?,'YYYY-MM-DD')
getClientsWithInvalidMobile=SELECT DISTINCT CL.*, IC.CURRENT_OWNER_ID, UO.FULL_NAME CURRENT_OWNER_NAME, US.FULL_NAME CREATED_BY_NAME FROM CLIENT CL LEFT JOIN ISSUE_BY_COMPLAINT_UNIQUE IC ON CL.SYS_ID = IC.CUSTOMER_ID LEFT JOIN USERS US ON CL.CREATED_BY = US.USER_ID LEFT JOIN USERS UO ON IC.CURRENT_OWNER_ID = UO.USER_ID WHERE LENGTH(TRIM(TRANSLATE(CL.MOBILE, '+0123456789',' '))) IS NOT NULL OR CL.MOBILE NOT LIKE '0%' OR CL.MOBILE LIKE '% %' OR LENGTH(CL.MOBILE) NOT BETWEEN 11 AND 16
getAllPurchOwnerClient = SELECT * FROM CLIENT WHERE SYS_ID IN (SELECT CLIENT_ID FROM RESERVATION WHERE CURRENT_STATUS IN ('30', '31'))
getAllCustomers = SELECT UNIQUE CL.SYS_ID, CL.NAME , ISS.STATUS_NAME FROM CLIENT CL LEFT JOIN ISSUE_STATUS ISS ON CL.SYS_ID = ISS.BUSINESS_OBJ_ID WHERE ISS.STATUS_NAME = '11'
getAllCustomersFiltered = SELECT UNIQUE CL.SYS_ID, CL.NAME , ISS.STATUS_NAME FROM CLIENT CL LEFT JOIN ISSUE_STATUS ISS ON CL.SYS_ID = ISS.BUSINESS_OBJ_ID WHERE ISS.STATUS_NAME = '11' AND CL.NAME LIKE '%ABC%'
getJobStatistics=SELECT COUNT(*) CLIENT_COUNT, TR.EN_NAME JOB_NAME FROM CLIENT CL LEFT JOIN TRADE TR ON CL.JOB = TR.ID WHERE CL.CURRENT_STATUS whereSign '11' AND CL.AGE_GROUP = '30-40' GROUP BY TR.EN_NAME
getRegionStatistics=SELECT COUNT(*) CLIENT_COUNT, PR.PROJECT_NAME REGION_NAME FROM CLIENT CL LEFT JOIN PROJECT PR ON CL.REGION = PR.PROJECT_ID WHERE CL.CURRENT_STATUS whereSign '11' AND CL.AGE_GROUP = '30-40' GROUP BY PR.PROJECT_NAME
getRepeatedMeetingsClients=SELECT * FROM (SELECT COUNT(*) MEETING_COUNT, CL.SYS_ID, CL.NAME, CL.MOBILE, CL.INTER_PHONE, U.FULL_NAME RATED_BY_NAME, P.PROJECT_NAME RATE_NAME FROM APPOINTMENT AP LEFT JOIN CLIENT CL ON AP.CLIENT_ID = CL.SYS_ID LEFT JOIN CLIENT_RATING CR ON AP.CLIENT_ID = CR.CLIENT_ID LEFT JOIN USERS U ON CR.CREATED_BY = U.USER_ID LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID WHERE AP.OPTION9 = 'attended' AND TRUNC(AP.APPOINTMENT_DATE) BETWEEN ? AND ? GROUP BY CL.SYS_ID, CL.NAME, CL.MOBILE, CL.INTER_PHONE, U.FULL_NAME, P.PROJECT_NAME) WHERE MEETING_COUNT whereSign 1
getappOfClientClassOfComChan =SELECT DISTINCT CL.*, ST.ENGLISHNAME AS comChannel, P.PROJECT_NAME AS rateNm FROM APPOINTMENT AP LEFT JOIN USERS U ON AP.USER_ID = U.USER_ID LEFT JOIN CLIENT CL ON AP.CLIENT_ID = CL.SYS_ID LEFT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID LEFT JOIN CLIENT_RATING CR ON CL.SYS_ID = CR.CLIENT_ID LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID WHERE CR.CREATION_TIME = (SELECT MAX (CREATION_TIME) FROM CLIENT_RATING WHERE CLIENT_ID = CL.SYS_ID) AND CL.OPTION3 IS NOT NULL AND  P.PROJECT_NAME IS NOT NULL AND TRUNC(AP.CURRENT_STATUS_SINCE) between to_date(?,'YYYY-MM-DD') and to_date(?,'YYYY-MM-DD') AND AP.OPTION9 = 'answered'
getCustomizedClients = SELECT UCL.*, CL.NAME,CL.MOBILE, CL.EMAIL, U.FULL_NAME USERNAME, U2.FULL_NAME CREATEDBY FROM USER_CLIENT_LOCK UCL LEFT JOIN CLIENT CL ON UCL.CLIENT_ID = CL.SYS_ID LEFT JOIN USERS U ON UCL.USER_ID = U.USER_ID LEFT JOIN USERS U2 ON UCL.CREATED_BY = U2.USER_ID WHERE TRUNC(UCL.CREATION_TIME) between to_date(?,'YYYY-MM-DD') and to_date(?,'YYYY-MM-DD') AND UCL.USER_ID IN (SELECT USER_GROUP.USER_ID FROM USER_GROUP WHERE USER_GROUP.GROUP_ID = ?) AND (CL.OPTION3 IS NULL OR CL.OPTION3 = 'UL') AND UCL.CLIENT_ID IN (SELECT SYS_ID FROM CLIENT)
getCustomizedClientsChart = SELECT COUNT(*) TOTAL,U.FULL_NAME USERNAME FROM USER_CLIENT_LOCK UCL LEFT JOIN USERS U ON UCL.USER_ID = U.USER_ID WHERE TRUNC(UCL.CREATION_TIME) between to_date(?,'YYYY-MM-DD') and to_date(?,'YYYY-MM-DD') AND UCL.USER_ID IN (SELECT USER_GROUP.USER_ID FROM USER_GROUP WHERE USER_GROUP.GROUP_ID = ?) AND  UCL.CLIENT_ID IN (SELECT SYS_ID FROM CLIENT WHERE OPTION3 IS NULL OR OPTION3 = 'UL') dateCon GROUP BY U.FULL_NAME
getUnratedRatedCountClForComChan=SELECT COUNT(DISTINCT CL.SYS_ID) CLIENT_COUNT, ST.ARABICNAME CHANNEL_NAME FROM CLIENT CL LEFT JOIN ISSUE I ON CL.SYS_ID = I.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID LEFT JOIN CLIENT_COMPLAINTS_TYPE CCT ON CC.ID = CCT.ID LEFT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID WHERE TRUNC(CL.CREATION_TIME) BETWEEN ? AND ? AND CL.SYS_ID NOT IN (SELECT CLIENT_ID FROM CLIENT_RATING) whereStatement GROUP BY ST.ARABICNAME
getClientChronOrder = SELECT CL.*, UCL.CREATION_TIME AS CUSTDATE, CC.CREATION_TIME AS DISTDATE , (SELECT MIN(AP.CREATION_TIME) FROM APPOINTMENT AP WHERE AP.CLIENT_ID =  CL.SYS_ID) AS CLASSTIME FROM CLIENT CL LEFT JOIN USER_CLIENT_LOCK UCL ON CL.SYS_ID = UCL.CLIENT_ID LEFT JOIN ISSUE ISS ON CL.SYS_ID = ISS.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CC ON ISS.ID = CC.ISSUE_ID WHERE CC.CREATION_TIME = (SELECT MIN(CREATION_TIME) FROM CLIENT_COMPLAINTS WHERE ISSUE_ID = ISS.ID) AND TRUNC(CL.CREATION_TIME) between to_date(?,'YYYY-MM-DD') and to_date(?,'YYYY-MM-DD')
getClientsWithoutComChannels = SELECT CL.*, ST.ENGLISHNAME FROM CLIENT CL LEFT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID  WHERE (CL.OPTION3 IS NULL OR CL.OPTION3 = 'UL') AND TRUNC(CL.CREATION_TIME) >= ? AND TRUNC(CL.CREATION_TIME) <= ? AND CL.SYS_ID IN (SELECT CLIENT_ID FROM USER_CLIENT_LOCK WHERE USER_ID IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = ?))
chngComChannel = UPDATE CLIENT SET OPTION3 = ? WHERE SYS_ID IN (clientIds)
getClientUserLocked=SELECT UC.USER_ID, U.FULL_NAME LOCKED_TO_NAME, CU.FULL_NAME LOCKED_BY_NAME, UC.CREATION_TIME LOCK_DATE FROM USER_CLIENT_LOCK UC LEFT JOIN USERS U ON UC.USER_ID = U.USER_ID LEFT JOIN USERS CU ON UC.CREATED_BY = CU.USER_ID WHERE UC.CLIENT_ID = ?
getClientByNameOrCode=SELECT * FROM CLIENT WHERE NAME LIKE '%@%' OR CLIENT_NO LIKE '%@%'
checkClientPhoneExist=SELECT * FROM CLIENT CL LEFT JOIN CLIENT_COMMUNICATION CM ON CL.SYS_ID = CM.CLIENT_ID WHERE CL.MOBILE LIKE ? OR CL.PHONE LIKE ? OR CL.INTER_PHONE LIKE ? OR (CM.COMMUNICATION_VALUE LIKE ? AND CM.COMMUNICATION_TYPE = 'phone')
getClientsWithExtraPhones=SELECT * FROM CLIENT WHERE SYS_ID IN (SELECT CLIENT_ID FROM CLIENT_COMMUNICATION)


getClassifiedClientsLastCallComments = SELECT DISTINCT IC.CUSTOMER_ID SYS_ID, IC.CUSTOMER_NAME NAME, IC.CLIENT_MOBILE MOBILE, CL.CLIENT_NO, CL.EMAIL, CL.CURRENT_STATUS, CL.DESCRIPTION, CL.CREATION_TIME, ST.ENGLISHNAME, CASE WHEN P.PROJECT_NAME IS NOT NULL THEN P.PROJECT_NAME ELSE 'Following up' END CLASS_TITLE, P.OPTION_THREE IMAGE_NAME, CR.RATE_ID, CMNT.CREATION_TIME AS CMNTDT, CMNT."COMMENT" AS LSTCMNT FROM ISSUE_BY_COMPLAINT IC LEFT JOIN CLIENT CL ON IC.CUSTOMER_ID = CL.SYS_ID LEFT JOIN APPOINTMENT CMNT ON CL.SYS_ID = CMNT.CLIENT_ID LEFT JOIN CLIENT_RATING CR ON CR.CLIENT_ID = CL.SYS_ID LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID LEFT JOIN CLIENT_COMPLAINTS CC ON IC.COMP_ID = CC.ID LEFT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID WHERE CMNT.USER_ID = ? AND CMNT.CREATION_TIME IN (SELECT MAX(CMNTXTM.CREATION_TIME) FROM APPOINTMENT CMNTXTM WHERE CMNTXTM.CLIENT_ID = CL.SYS_ID)
getUserClientsInterLocal=SELECT * FROM CLIENT CL WHERE CL.SYS_ID IN (SELECT CUSTOMER_ID FROM ISSUE_BY_COMPLAINT_UNIQUE WHERE CURRENT_OWNER_ID = ? AND TRUNC(CURRENT_OWNER_SINCE) BETWEEN ? AND ?) AND CL.SALARY = ?
updateInterClientsType=UPDATE CLIENT SET SALARY = '1' WHERE INTER_PHONE IS NOT NULL AND IS_NUMBER(INTER_PHONE) = 1
upsateLocalClientsType=UPDATE CLIENT SET SALARY = '0' WHERE INTER_PHONE IS NULL OR IS_NUMBER(INTER_PHONE) = 0
getAverageCustomerPurchaseTime=SELECT C.*, R.PURCHASE_DATE FROM (SELECT MIN(CURRENT_STATUS_SINCE) PURCHASE_DATE, CLIENT_ID FROM RESERVATION WHERE CURRENT_STATUS = '31' GROUP BY CLIENT_ID) R LEFT JOIN CLIENT C ON R.CLIENT_ID = C.SYS_ID WHERE C.SYS_ID IN (SELECT CLIENT_ID FROM CLIENT_CAMPAIGN WHERE CAMPAIGN_ID = ?)
getCampaignNonSoldClients=SELECT DISTINCT C.*, U.FULL_NAME CREATED_BY_NAME, OU.FULL_NAME CURRENT_OWNER_NAME, R.PROJECT_NAME CLIENT_RATE FROM CLIENT C LEFT JOIN CLIENT_CAMPAIGN CC ON C.SYS_ID=CC.CLIENT_ID LEFT JOIN CAMPAIGN CP ON CC.CAMPAIGN_ID = CP.ID LEFT JOIN USERS U ON C.CREATED_BY = U.USER_ID LEFT JOIN (SELECT * FROM ISSUE_BY_COMPLAINT_UNIQUE WHERE CLIENT_COM_ID IN (SELECT MAX(CLIENT_COM_ID) FROM ISSUE_BY_COMPLAINT_UNIQUE GROUP BY CUSTOMER_ID)) IC ON C.SYS_ID = IC.CUSTOMER_ID LEFT JOIN USERS OU ON OU.USER_ID = IC.CURRENT_OWNER_ID LEFT JOIN CLIENT_RATING CR ON CR.CLIENT_ID = C.SYS_ID LEFT JOIN PROJECT R ON CR.RATE_ID = R.PROJECT_ID WHERE C.SYS_ID NOT IN (SELECT CLIENT_ID FROM CLIENT_PROJECTS WHERE PRODUCT_ID = 'purche') AND CC.CAMPAIGN_ID = ?
updateNameProject=UPDATE CLIENT C SET C.NATIONALITY = (SELECT P.PROJECT_NAME FROM PROJECT P WHERE P.PROJECT_ID = C.JOB), C.OPTION3 = (SELECT R.NAME FROM REGION R WHERE R.CODE = C.REGION)  WHERE C.SYS_ID = ?
getClientsWithNoWish=SELECT CL.* FROM CLIENT CL WHERE TRUNC(CL.CREATION_TIME) BETWEEN ? AND ? AND CL.CREATED_BY IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = ?) whereStatement ORDER BY CL.NAME
clientByEmailForSales=select DISTINCT c.*, s.CASE_AR, s.CASE_EN from CLIENT c left join status_type s on c.CURRENT_STATUS = s.ID left join issue ISS ON ISS.URGENCY_ID = C.SYS_ID where (LOWER(c.EMAIL) LIKE LOWER('%clientEmail%') OR UPPER(c.EMAIL) LIKE UPPER('%clientEmail%'))
getMyClientsWithNoWish=SELECT CL.* FROM CLIENT CL WHERE CL.SYS_ID IN (SELECT I.URGENCY_ID FROM ISSUE I LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ISSUE_ID WHERE TRUNC(CC.CURRENT_STATUS_SINCE) BETWEEN ? AND ? AND CC.CURRENT_OWNER_ID = ? AND CC.CURRENT_STATUS NOT IN ('5', '6', '7')) whereStatement ORDER BY CL.NAME


getClientByOtherEmails=SELECT DISTINCT c.*, s.CASE_AR, s.CASE_EN FROM CLIENT c left join status_type s on c.CURRENT_STATUS = s.ID WHERE c.SYS_ID IN (SELECT cc.CLIENT_ID FROM CLIENT_COMMUNICATION cc WHERE cc.COMMUNICATION_VALUE like '%ClientEmail%' AND cc.CLIENT_ID NOT IN (SELECT CLNT.SYS_ID FROM CLIENT CLNT WHERE CLNT.Email = 'ClientEmail' ))
getClientsWithLegalDispute=select BEGIN_DATE,BUSINESS_OBJ_ID,STATUS_NOTE,c.* from issue_status i inner join client c on c.sys_id=BUSINESS_OBJ_ID where  STATUS_NAME='84' and OBJECT_TYPE='client' and BEGIN_DATE=(select max (BEGIN_DATE) from issue_status where   OBJECT_TYPE='client' and  i.BUSINESS_OBJ_ID=BUSINESS_OBJ_ID )  
removeClientNameWhiteSpace=UPDATE CLIENT SET NAME = TRANSLATE(NAME, CHR(10) || CHR(13) || CHR(9), '  '), EMAIL = TRANSLATE(EMAIL, CHR(10) || CHR(13) || CHR(9), '  '), MOBILE = TRANSLATE(MOBILE, CHR(10) || CHR(13) || CHR(9), '  '), DESCRIPTION = TRANSLATE(DESCRIPTION, CHR(10) || CHR(13) || CHR(9), '  ') WHERE REGEXP_LIKE(TRIM(NAME), '[[:space:]]$') OR REGEXP_LIKE(TRIM(EMAIL), '[[:space:]]$') OR REGEXP_LIKE(TRIM(MOBILE), '[[:space:]]$') OR REGEXP_LIKE(TRIM(DESCRIPTION), '[[:space:]]$')
updateClientKnownUs=UPDATE CLIENT SET OPTION3 = ? WHERE OPTION3 = ?
getTradeClients=SELECT DISTINCT C.*, U.FULL_NAME CREATED_BY_NAME FROM CLIENT C LEFT JOIN CLIENT_CAMPAIGN CC ON C.SYS_ID=CC.CLIENT_ID LEFT JOIN CAMPAIGN CP ON CC.CAMPAIGN_ID = CP.ID LEFT JOIN USERS U ON C.CREATED_BY = U.USER_ID LEFT JOIN ISSUE I ON C.SYS_ID = I.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CL ON CL.ISSUE_ID = I.ID LEFT JOIN USERS OU ON OU.USER_ID = CL.CURRENT_OWNER_ID LEFT JOIN CLIENT_RATING CR ON CR.CLIENT_ID = C.SYS_ID LEFT JOIN PROJECT R ON CR.RATE_ID = R.PROJECT_ID WHERE C.JOB = ? AND C.CURRENT_STATUS whereSign '11'

getClientByMob=select  cc.sys_id,cc.client_no,cc.name,cc.mobile,cc.email,cc.created_by,cc.creation_time,cc.INTER_PHONE from client_rating cr left join client cc on cr.client_id=cc.sys_id LEFT JOIN ISSUE ISS ON CR.CLIENT_ID = ISS.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS ccomp ON ISS.ID = ccomp.ISSUE_ID INNER JOIN ISSUE_BY_COMPLAINT CCT ON ccomp.ID = CCT.COMP_ID where CCT.current_owner_id in (SELECT USER_ID FROM USERS WHERE USER_ID IN ( SELECT EMP_MGR.EMP_ID FROM EMP_MGR WHERE EMP_MGR.MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ? )UNION SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?) ) clientMob

getClientsWithLegalDisputeForClient=select ie.STATUS_NOTE from issue_status ie where ie.STATUS_NAME='84' and ie.OBJECT_TYPE='client' and ie.end_date is null and ie.BEGIN_DATE=(select max (i.BEGIN_DATE) from issue_status i where i.OBJECT_TYPE='client' and i.BUSINESS_OBJ_ID=ie.BUSINESS_OBJ_ID ) and ie.BUSINESS_OBJ_ID = ?

getLastCommentDetails=select cct.comment_desc from comments cct where cct.busniess_object_id = ?  and creation_time = (select MAX(cc.creation_time) from comments cc where cc.busniess_object_id = cct.busniess_object_id)

getLastAppointmentDetails=select att.* from appointment att where att.client_id = ? and att.creation_time = (select MAX(cc.creation_time) from appointment cc where cc.client_id = att.client_id)


getAllClientsComments=select distinct cc.client_no,cc.name,cc.mobile,cc.address,cc.clientssn,us.full_name,cc.creation_time,cgc.campaign_title,se.englishname,st.case_en,cc.description from client cc left join users us on cc.created_by = us.user_id left join client_campaign cg on cc.sys_id = cg.client_id left join campaign cgc on cg.campaign_id = cgc.id left join season_type se on cc.option3 = se.id left join status_type st on cc.current_status = st.id where cg.id = (select max(cgg.id) from client_campaign cgg where cg.client_id = cgg.client_id)


getClientCustom=SELECT pp.project_id,CASE WHEN pp.project_id = '1' then '\u0633\u0643\u0646 \u062a\u062c\u0645\u0639' WHEN pp.project_id = '2' then 'AGILE BUSSNICE COMPLEX'  WHEN pp.project_id = '3' THEN 'RAY RESIDENCE' ELSE pp.project_name END AS project_name,(SELECT COUNT(distinct cc.sys_id) FROM client cc left join client_projects cp on cc.sys_id = cp.client_id WHERE cc.current_status = '11' and cp.product_category_id = pp.project_id and cp.product_id = 'purche') AS cust,(SELECT COUNT(distinct cb.sys_id) FROM client cb left join client_projects cp on cb.sys_id = cp.client_id where cb.current_status = '86' and cp.product_category_id = pp.project_id and cp.product_id = 'purche') AS block FROM project pp where pp.location_type = '44'


getClientsReserve=select * from datebase ie where ie.client_name = ? and ie.client_telephone = ?  and ie.reserve_flag = '2' and ie.stage_code = ?

getClientsBuyer=select * from datebase ie where ie.client_name = ? and ie.client_telephone = ?  and ie.reserve_flag = '4' and ie.stage_code = ?

getUnitValueFive=select DISTINCT PRODUCT_CATEGORY_ID from client_projects where client_id = ? and PRODUCT_ID = 'purche' 


getTypeWifi=select * from ITEMINFODETAILS


getMaxClientId=select max(code)+1 as codeClient from datebase.STORE_ALLCODES
getUnitName=select PROJECT_NAME from PROJECT where PROJECT_ID = ? 
getUnitId=select INSTITEM_ID as unitCodeRel from UNITS_REALESTATE where UNIT_NAME = ? 
getUserCode=select can_send_email from users where user_id = ?
getInstProg=select unit_value from client_projects where project_id = ?

getMaxClientIdStore=select max(store_allcodes_id)+1 as storeId from datebase.STORE_ALLCODES

getMaxtrnsNo=select max(trns_no) + 1 as trns_no from datebase.store_trns_m where trns_code = 2

getMaxstoreNo=select max(store_trns_m_id) + 1 as store_no from datebase.store_trns_m where trns_code = 2
