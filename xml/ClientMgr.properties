getClientByNameForSales=select DISTINCT c.*, s.CASE_AR, s.CASE_EN from CLIENT c left join status_type s on c.CURRENT_STATUS = s.ID left join issue ISS ON ISS.URGENCY_ID = C.SYS_ID where (LOWER(c.NAME) LIKE LOWER('%clientName%') OR UPPER(c.NAME) LIKE UPPER('%clientName%'))
getStatusTypes= select * from status_type where BUSINESS_TYPE = 'Client'
getUnHandledClients = SELECT unique cl.*, u.FULL_NAME, st.CASE_AR STATUS_NAME_AR, st.CASE_EN STATUS_NAME_EN FROM CLIENT cl left join users u on cl.CREATED_BY = u.USER_ID left join CLIENT_CAMPAIGN cc on cl.SYS_ID = cc.CLIENT_ID left join CAMPAIGN camp on cc.CAMPAIGN_ID = camp.ID left join status_type st on cl.CURRENT_STATUS = st.ID left join USER_CLIENT_LOCK ul on cl.SYS_ID = ul.CLIENT_ID WHERE SYS_ID NOT IN (SELECT DISTINCT URGENCY_ID FROM ISSUE) AND SYS_ID NOT IN (SELECT CLIENT_ID From USER_CLIENT_LOCK)  
getClientByUnitNo=select DISTINCT c.*, s.CASE_AR, s.CASE_EN, b.PROJECT_NAME as branchName from client c left join issue ISS ON ISS.URGENCY_ID = C.SYS_ID right join client_projects cp on c.SYS_ID = cp.CLIENT_ID left join project p on cp.PROJECT_ID = p.PROJECT_ID left join project b on c.BRANCH = b.PROJECT_ID left join status_type s on c.CURRENT_STATUS = s.ID where p.PROJECT_NAME like '%num%' and p.PROJECT_NAME like '%projectName%'
getClientByPhoneNo=select DISTINCT c.*, s.CASE_AR, s.CASE_EN, p.PROJECT_NAME as branchName from client c left join issue ISS ON ISS.URGENCY_ID = C.SYS_ID left join project p on c.BRANCH = p.PROJECT_ID left join status_type s on c.CURRENT_STATUS = s.ID where c.PHONE = 'num' or c.MOBILE = 'num' or c.OPTION3 = 'num' or c.INTER_PHONE = 'num' or c.CLIENT_NO = 'num'
getClientByPhoneNoAndCompany=select DISTINCT c.*, s.CASE_AR, s.CASE_EN, p.PROJECT_NAME as branchName from client c left join issue ISS ON ISS.URGENCY_ID = C.SYS_ID left join project p on c.BRANCH = p.PROJECT_ID left join status_type s on c.CURRENT_STATUS = s.ID where c.PHONE = 'num' or c.MOBILE = 'num' or c.OPTION3 = 'num' or c.INTER_PHONE = 'num' or c.CLIENT_NO = 'num' and option2=?
getClientByNo=select c.* from client c where (c.PHONE like '%num%' or c.MOBILE like '%num%' or INTER_PHONE like '%num%')
getClientByMail=select c.* from client c where (c.EMAIL like '%mail%' )
getContractorsWithJob = select client_no , client.name , TRADE.OPTION1, client.SYS_ID id from client left join TRADE on client.job = TRADE.ID where age_group ='100' 
