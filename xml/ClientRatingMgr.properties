getClientRateInterval1All=SELECT DISTINCT CR.*, CL.NAME, CL.MOBILE,cl.phone, CL.INTER_PHONE,cl.description,CL.job, CL.CREATION_TIME CLIENT_CREATION_TIME,uss.full_name, P.PROJECT_NAME RATE_NAME, P.OPTION_THREE COLOR,USSS.FULL_NAME MGR_BY, U.FULL_NAME RATED_BY, (SELECT MIN(AP.CREATION_TIME) FROM APPOINTMENT AP WHERE AP.CLIENT_ID = CL.SYS_ID) AS MCT, (SELECT MIN(AP.APPOINTMENT_DATE) FROM APPOINTMENT AP WHERE AP.CLIENT_ID = CL.SYS_ID and AP.APPOINTMENT_DATE > sysdate and AP.OPTION9 IS NULL) as FNA, ST.englishname KNOWN_US_FROM, cg.campaign_title, stk.englishname, LAST_APP."COMMENT" FROM CLIENT CL LEFT JOIN CLIENT_RATING CR ON CL.SYS_ID = CR.CLIENT_ID LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID LEFT JOIN USERS U ON CR.CREATED_BY = U.USER_ID LEFT JOIN ISSUE ISS ON CR.CLIENT_ID = ISS.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CC ON ISS.ID = CC.ISSUE_ID LEFT JOIN ISSUE_BY_COMPLAINT CCT ON CC.ID = CCT.COMP_ID LEFT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID LEFT JOIN client_campaign ccc on CL.SYS_ID = ccc.client_id LEFT JOIN campaign cg on ccc.campaign_id = cg.id LEFT JOIN client_source cso on CL.sys_id = cso.client_id LEFT JOIN source_type stk on cso.season_id = stk.id LEFT JOIN ( SELECT CLIENT_ID, "COMMENT", APPOINTMENT_DATE, ROW_NUMBER() OVER (PARTITION BY CLIENT_ID ORDER BY APPOINTMENT_DATE DESC) as rn FROM APPOINTMENT ) LAST_APP ON CL.SYS_ID = LAST_APP.CLIENT_ID AND LAST_APP.rn = 1 LEFT JOIN USERS USS ON cl.created_by = USS.USER_ID LEFT JOIN EMP_MGR EMM ON CR.CREATED_BY = emm.emp_id LEFT JOIN USERS USSS ON emm.mgr_id = USSS.USER_ID WHERE 
