insertTransaction = insert into FINANCE_TRANSACTION values (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, SYSDATE, ?, ?, 'UL', 'UL', 'UL', 0, 0, 0)
getClientUnitTotal=SELECT SUM(TRANSACTION_VALUE) TOTAL FROM FINANCE_TRANSACTION WHERE SOURCE_ID = ? AND OPTION1 = ?
getAllFinancialTransaction = SELECT FT.*, CL.NAME, P.PROJECT_NAME UnitNm, P1.PROJECT_NAME TransTyp, p2.project_name madeen, U.FULL_NAME FROM FINANCE_TRANSACTION FT LEFT JOIN CLIENT CL ON FT.SOURCE_ID = CL.SYS_ID LEFT JOIN PROJECT P ON FT.OPTION1 = P.PROJECT_ID LEFT JOIN PROJECT P1 ON FT.TRANSACTION_TYPE = P1.PROJECT_ID LEFT JOIN PROJECT P2 ON FT.DESTINATION_ID = P2.PROJECT_ID LEFT JOIN USERS U ON FT.CREATED_BY = U.USER_ID
getFinancialTransactionByDates = SELECT FT.*, CL.NAME, P.PROJECT_NAME UnitNm, P1.PROJECT_NAME TransTyp, p2.project_name madeen, U.FULL_NAME FROM FINANCE_TRANSACTION FT LEFT JOIN CLIENT CL ON FT.SOURCE_ID = CL.SYS_ID LEFT JOIN PROJECT P ON FT.OPTION1 = P.PROJECT_ID LEFT JOIN PROJECT P1 ON FT.TRANSACTION_TYPE = P1.PROJECT_ID LEFT JOIN PROJECT P2 ON FT.DESTINATION_ID = P2.PROJECT_ID LEFT JOIN USERS U ON FT.CREATED_BY = U.USER_ID WHERE TRUNC(FT.CREATION_TIME) between to_date(?,'YY-MM-DD') and to_date(?,'YY-MM-DD')
getFinancialTransactionsByCode=SELECT T.*,(select NAME from DESTINATION_VIEW  where ID=SOURCE_ID) as SourceName,(select NAME from DESTINATION_VIEW  where ID=DESTINATION_ID) as DestName ,(SELECT PROJECT_NAME FROM PROJECT WHERE PROJECT_ID=T.TRANSACTION_TYPE) as TRANSACTION_TYPE_NAME FROM FINANCE_TRANSACTION T
getAllRecipients=SELECT * FROM DESTINATION_VIEW
getAccountOpeningBalance=SELECT (DEBIT_VALUE - CREDIT_VALUE) BALANCE FROM (SELECT SUM(CASE WHEN FT.SOURCE_ID = ? THEN FT.TRANSACTION_VALUE ELSE 0 END) CREDIT_VALUE, SUM(CASE WHEN FT.DESTINATION_ID = ? THEN FT.TRANSACTION_VALUE ELSE 0 END) DEBIT_VALUE FROM FINANCE_TRANSACTION FT LEFT JOIN DESTINATION_VIEW SD ON FT.SOURCE_ID = SD.ID LEFT JOIN DESTINATION_VIEW DD ON FT.DESTINATION_ID = DD.ID LEFT JOIN PROJECT TT ON FT.TRANSACTION_TYPE = TT.PROJECT_ID WHERE (FT.SOURCE_ID = ? OR FT.DESTINATION_ID = ?) AND TRUNC(FT.DOCUMENT_DATE) < ?)
getBalanceReport2=SELECT FT.DOCUMENT_CODE, FT.TRANSACTION_CODE, FT.DOCUMENT_DATE, FT.NOTE, CASE WHEN FT.SOURCE_ID = ? THEN FT.TRANSACTION_VALUE ELSE 0 END CREDIT_VALUE, CASE WHEN FT.DESTINATION_ID = ? THEN FT.TRANSACTION_VALUE ELSE 0 END DEBIT_VALUE, '---' as CREDIT_NAME, DD.NAME DEBIT_NAME, TT.PROJECT_NAME TRANSACTION_TYPE FROM FINANCE_TRANSACTION FT LEFT JOIN DESTINATION_VIEW SD ON FT.SOURCE_ID = SD.ID LEFT JOIN DESTINATION_VIEW DD ON FT.DESTINATION_ID = DD.ID LEFT JOIN PROJECT TT ON FT.TRANSACTION_TYPE = TT.PROJECT_ID WHERE ( FT.SOURCE_ID = ?) AND TRUNC(FT.DOCUMENT_DATE) BETWEEN ? AND ? AND FT.TRANSACTION_TYPE=? union SELECT FT.DOCUMENT_CODE, FT.TRANSACTION_CODE, FT.DOCUMENT_DATE, FT.NOTE, CASE WHEN FT.SOURCE_ID = ? THEN FT.TRANSACTION_VALUE ELSE 0 END CREDIT_VALUE, CASE WHEN FT.DESTINATION_ID = ? THEN FT.TRANSACTION_VALUE ELSE 0 END DEBIT_VALUE, SD.NAME CREDIT_NAME, '---' as DEBIT_NAME, TT.PROJECT_NAME TRANSACTION_TYPE FROM FINANCE_TRANSACTION FT LEFT JOIN DESTINATION_VIEW SD ON FT.SOURCE_ID = SD.ID LEFT JOIN DESTINATION_VIEW DD ON FT.DESTINATION_ID = DD.ID LEFT JOIN PROJECT TT ON FT.TRANSACTION_TYPE = TT.PROJECT_ID WHERE ( FT.DESTINATION_ID = ?) AND TRUNC(FT.DOCUMENT_DATE) BETWEEN ? AND ? AND FT.TRANSACTION_TYPE=? ORDER BY DOCUMENT_DATE
getFinancialTransactions = SELECT FT.*, FTT.PROJECT_NAME, ST.AR_DESC SRC_AR_DESC, ST.EN_DESC SRC_EN_DESC, S.NAME SRC_NM, DT.AR_DESC DST_AR_DESC, DT.EN_DESC DST_EN_DESC, D.NAME DST_NM FROM FINANCE_TRANSACTION FT  LEFT JOIN PROJECT FTT ON FT.TRANSACTION_TYPE = FTT.PROJECT_ID  LEFT JOIN LOCATION_TYPES ST ON FT.SOURCE_TYPE = ST.TYPE_CODE LEFT JOIN DESTINATION_VIEW S ON FT.SOURCE_ID = S.ID LEFT JOIN LOCATION_TYPES DT ON FT.DESTINATION_TYPE = DT.TYPE_CODE LEFT JOIN DESTINATION_VIEW D ON FT.DESTINATION_ID = D.ID WHERE TRUNC(FT.CREATION_TIME) BETWEEN TO_DATE(?, 'YYYY/MM/DD') AND TO_DATE(?, 'YYYY/MM/DD')
getBalanceReport1=SELECT FT.DOCUMENT_CODE, FT.TRANSACTION_CODE, FT.DOCUMENT_DATE, FT.NOTE, CASE WHEN FT.SOURCE_ID = ? THEN FT.TRANSACTION_VALUE ELSE 0 END CREDIT_VALUE, CASE WHEN FT.DESTINATION_ID = ? THEN FT.TRANSACTION_VALUE ELSE 0 END DEBIT_VALUE, '---' as CREDIT_NAME, DD.NAME DEBIT_NAME, TT.PROJECT_NAME TRANSACTION_TYPE FROM FINANCE_TRANSACTION FT LEFT JOIN DESTINATION_VIEW SD ON FT.SOURCE_ID = SD.ID LEFT JOIN DESTINATION_VIEW DD ON FT.DESTINATION_ID = DD.ID LEFT JOIN PROJECT TT ON FT.TRANSACTION_TYPE = TT.PROJECT_ID WHERE ( FT.SOURCE_ID = ?) AND TRUNC(FT.DOCUMENT_DATE) BETWEEN ? AND ? union SELECT FT.DOCUMENT_CODE, FT.TRANSACTION_CODE, FT.DOCUMENT_DATE, FT.NOTE, CASE WHEN FT.SOURCE_ID = ? THEN FT.TRANSACTION_VALUE ELSE 0 END CREDIT_VALUE, CASE WHEN FT.DESTINATION_ID = ? THEN FT.TRANSACTION_VALUE ELSE 0 END DEBIT_VALUE, SD.NAME CREDIT_NAME, '---' as DEBIT_NAME, TT.PROJECT_NAME TRANSACTION_TYPE FROM FINANCE_TRANSACTION FT LEFT JOIN DESTINATION_VIEW SD ON FT.SOURCE_ID = SD.ID LEFT JOIN DESTINATION_VIEW DD ON FT.DESTINATION_ID = DD.ID LEFT JOIN PROJECT TT ON FT.TRANSACTION_TYPE = TT.PROJECT_ID WHERE ( FT.DESTINATION_ID = ?) AND TRUNC(FT.DOCUMENT_DATE) BETWEEN ? AND ? ORDER BY DOCUMENT_DATE
insertTreeTransactionTypeRel=INSERT INTO TREE_TRANSACTION_MAP VALUES(?,?,?,SYSDATE ,?,?,?,?)
detechTreeItem=delete from TREE_TRANSACTION_MAP where ITEM_ID=?