getAppointment=SELECT * FROM APPOINTMENT_NOTIFICATION WHERE USER_ID = ? AND OPTION6 != '1' AND TIME_REMAINING_MINUTES BETWEEN 0 AND ? ORDER BY TIME_REMAINING_MINUTES
getAppointmentExcluded=SELECT * FROM APPOINTMENT_NOTIFICATION WHERE ID NOT IN IDS AND USER_ID = ? AND TIME_REMAINING_MINUTES BETWEEN 0 AND ? ORDER BY TIME_REMAINING_MINUTES
getUserAppointment=SELECT * FROM APPOINTMENT_NOTIFICATION WHERE USER_ID = ? ORDER BY TIME_REMAINING_MINUTES
getClientAppointment=SELECT * FROM APPOINTMENT_NOTIFICATION WHERE CLIENT_ID = ? ORDER BY TIME_REMAINING_MINUTES
getUserAppointmentByDate=SELECT * FROM APPOINTMENT_NOTIFICATION WHERE USER_ID = ? and TRUNC(APPOINTMENT_DATE) = TO_DATE(?,'yyyy/mm/dd')
getAppointmentForByDate=SELECT * FROM APPOINTMENT_NOTIFICATION WHERE APPOINTMENT_FOR = ? AND CURRENT_STATUS_CODE <> '24' AND CURRENT_STATUS_CODE <> '29' AND TRUNC(APPOINTMENT_DATE) = TO_DATE(?,'yyyy/mm/dd')
getClientAppointmentByDate=SELECT * FROM APPOINTMENT_NOTIFICATION WHERE CLIENT_ID = ? AND CURRENT_STATUS_CODE <> '29' AND CURRENT_STATUS_CODE <> '24' and TRUNC(APPOINTMENT_DATE) = TO_DATE(?,'yyyy/mm/dd')
getDoneAppointmentByDate=SELECT * FROM APPOINTMENT_NOTIFICATION WHERE  CLIENT_ID=? and TRUNC(APPOINTMENT_DATE) = TO_DATE(?,'yyyy/mm/dd') and option1 LIKE '%on%'
getPendingAppointmentByDate=SELECT * FROM APPOINTMENT_NOTIFICATION WHERE  CLIENT_ID=? and TRUNC(APPOINTMENT_DATE) = TO_DATE(?,'yyyy/mm/dd') and option1 LIKE '%UL%'
getAppointmentByDate=SELECT CLIENT_ID, CLIENT_NAME, USER_NAME, APPOINTMENT_FOR_NAME, TITLE, APPOINTMENT_DATE, TO_NUMBER(TO_CHAR(APPOINTMENT_DATE, 'DD')) AS DAY_NO, TIME_REMAINING_MINUTES, OPTION1, CURRENT_STATUS_CODE, DIRECTED_BY_NAME, OPTION5, OPTION2, APPOINTMENT_FOR, NOTE, OPTION8, OPTION9 FROM APPOINTMENT_NOTIFICATION WHERE TRUNC(APPOINTMENT_DATE) BETWEEN ? AND ? AND CURRENT_STATUS_CODE <> '29' AND CURRENT_STATUS_CODE <> '24' departmentQuery ORDER BY CLIENT_NAME
getUserClientsAppointmentsByStatus=SELECT CLIENT_ID,MOBILE, PHONE, CLIENT_NAME, CREATION_TIME, APPOINTMENT_DATE, CURRENT_STATUS_SINCE, OPTION9, OPTION2, Note, abs(round(cast(APPOINTMENT_DATE as Date)- cast(CREATION_TIME as Date),0)) as duration, "COMMENT", CURRENT_STATUS, APPOINTMENT_PLACE, CALL_DURATION FROM APPOINTMENT_NOTIFICATION WHERE TRUNC(CURRENT_STATUS_SINCE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') and user_id = ? departmentQuery typeQuery OptionType ORDER BY CLIENT_NAME, CURRENT_STATUS_SINCE

getUniqueUserAppntmnt=Select AP.USER_ID,  cc.sys_id as CLIENT_ID,  iss.BUSINESS_ID as CLIENT_NO, cc.MOBILE, cc.PHONE,cc.INTER_PHONE, cc.NAME,st.ENGLISHNAME,gg.CAMPAIGN_TITLE,AP.CURRENT_STATUS_SINCE, AP.OPTION2,AP.NOTE, AP.CALL_DURATION, "COMMENT" FROM APPOINTMENT AP left join client cc on Ap.CLIENT_ID = cc.sys_id left join SEASON_TYPE st on cc.OPTION3 = st.ID left join CLIENT_CAMPAIGN cg on cc.SYS_ID = cg.CLIENT_ID left join CAMPAIGN gg on cg.CAMPAIGN_ID = gg.ID left join ISSUE iss on cc.SYS_ID = iss.URGENCY_ID where ap.USER_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) and ap.user_id = ? and Ap.OPTION9 is not null and Ap.OPTION9 != 'UL' and AP.APPOINTMENT_DATE >= TO_DATE(?,'yyyy/MM/dd') and AP.APPOINTMENT_DATE < TO_DATE(?,'yyyy/MM/dd') + interval '1' day and cc.sys_id in (select cc.SYS_ID FROM distribution_list dll LEFT JOIN client_complaints cck ON dll.client_com_id = cck.id LEFT JOIN issue iss ON cck.issue_id = iss.id LEFT JOIN Client cc ON iss.urgency_id = cc.sys_id and dll.RECEIP_ID = ?)
getUniqueUserAppntmntAllClient=SELECT AP.USER_ID, cc.sys_id as CLIENT_ID,  iss.BUSINESS_ID as CLIENT_NO, cc.MOBILE, cc.PHONE,cc.INTER_PHONE, cc.NAME,st.ENGLISHNAME,gg.CAMPAIGN_TITLE,AP.CURRENT_STATUS_SINCE,AP.OPTION2,AP.NOTE, AP.CALL_DURATION, "COMMENT" FROM distribution_list dll LEFT JOIN client_complaints cck ON dll.client_com_id = cck.id LEFT JOIN issue iss ON cck.issue_id = iss.id LEFT JOIN Client cc ON iss.urgency_id = cc.sys_id LEFT JOIN APPOINTMENT AP ON cc.sys_id = AP.CLIENT_ID and ap.option9 is not null and Ap.OPTION9 != 'UL' left join SEASON_TYPE st on cc.OPTION3 = st.ID left join CLIENT_CAMPAIGN cg on cc.SYS_ID = cg.CLIENT_ID left join CAMPAIGN gg on cg.CAMPAIGN_ID = gg.ID where dll.RECEIP_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) and dll.RECEIP_ID = ? and dll.receive_date >= TO_DATE(?,'yyyy/MM/dd') and dll.receive_date < TO_DATE(?,'yyyy/MM/dd') + interval '1' day
getUniqueUserAppntmntAllClientDi=SELECT AP.USER_ID, cc.sys_id as CLIENT_ID,  iss.BUSINESS_ID as CLIENT_NO, cc.MOBILE, cc.PHONE,cc.INTER_PHONE, cc.NAME,st.ENGLISHNAME,gg.CAMPAIGN_TITLE,AP.CURRENT_STATUS_SINCE,AP.OPTION2,AP.NOTE, AP.CALL_DURATION, "COMMENT" FROM distribution_list dll LEFT JOIN client_complaints cck ON dll.client_com_id = cck.id LEFT JOIN issue iss ON cck.issue_id = iss.id LEFT JOIN Client cc ON iss.urgency_id = cc.sys_id LEFT JOIN APPOINTMENT AP ON cc.sys_id = AP.CLIENT_ID and ap.option9 is not null and Ap.OPTION9 != 'UL' left join SEASON_TYPE st on cc.OPTION3 = st.ID left join CLIENT_CAMPAIGN cg on cc.SYS_ID = cg.CLIENT_ID left join CAMPAIGN gg on cg.CAMPAIGN_ID = gg.ID where dll.RECEIP_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) and dll.RECEIP_ID = ? and cc.OPTION3='1' and dll.receive_date >= TO_DATE(?,'yyyy/MM/dd') and dll.receive_date < TO_DATE(?,'yyyy/MM/dd') + interval '1' day
getUniqueUserAppntmntAllClientIn=SELECT AP.USER_ID, cc.sys_id as CLIENT_ID,  iss.BUSINESS_ID as CLIENT_NO, cc.MOBILE, cc.PHONE,cc.INTER_PHONE, cc.NAME,st.ENGLISHNAME,gg.CAMPAIGN_TITLE,AP.CURRENT_STATUS_SINCE,AP.OPTION2,AP.NOTE, AP.CALL_DURATION, "COMMENT" FROM distribution_list dll LEFT JOIN client_complaints cck ON dll.client_com_id = cck.id LEFT JOIN issue iss ON cck.issue_id = iss.id LEFT JOIN Client cc ON iss.urgency_id = cc.sys_id LEFT JOIN APPOINTMENT AP ON cc.sys_id = AP.CLIENT_ID and ap.option9 is not null and Ap.OPTION9 != 'UL' left join SEASON_TYPE st on cc.OPTION3 = st.ID left join CLIENT_CAMPAIGN cg on cc.SYS_ID = cg.CLIENT_ID left join CAMPAIGN gg on cg.CAMPAIGN_ID = gg.ID where dll.RECEIP_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) and dll.RECEIP_ID = ? and cc.OPTION3='2' and dll.receive_date >= TO_DATE(?,'yyyy/MM/dd') and dll.receive_date < TO_DATE(?,'yyyy/MM/dd') + interval '1' day
getUniqueUserAppntmntAllClientIm=SELECT AP.USER_ID, cc.sys_id as CLIENT_ID,  iss.BUSINESS_ID as CLIENT_NO, cc.MOBILE, cc.PHONE,cc.INTER_PHONE, cc.NAME,st.ENGLISHNAME,gg.CAMPAIGN_TITLE,AP.CURRENT_STATUS_SINCE,AP.OPTION2,AP.NOTE, AP.CALL_DURATION, "COMMENT" FROM distribution_list dll LEFT JOIN client_complaints cck ON dll.client_com_id = cck.id LEFT JOIN issue iss ON cck.issue_id = iss.id LEFT JOIN Client cc ON iss.urgency_id = cc.sys_id LEFT JOIN APPOINTMENT AP ON cc.sys_id = AP.CLIENT_ID and ap.option9 is not null and Ap.OPTION9 != 'UL' left join SEASON_TYPE st on cc.OPTION3 = st.ID left join CLIENT_CAMPAIGN cg on cc.SYS_ID = cg.CLIENT_ID left join CAMPAIGN gg on cg.CAMPAIGN_ID = gg.ID where dll.RECEIP_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) and dll.RECEIP_ID = ? and cc.OPTION3='3' and dll.receive_date >= TO_DATE(?,'yyyy/MM/dd') and dll.receive_date < TO_DATE(?,'yyyy/MM/dd') + interval '1' day
getUniqueUserAppntmntAllClientUn=SELECT distinct dll.RECEIP_ID as USER_ID, cc.SYS_ID as CLIENT_ID, iss.BUSINESS_ID as CLIENT_NO, cc.MOBILE, cc.PHONE,cc.INTER_PHONE, cc.NAME,st.ENGLISHNAME,gg.CAMPAIGN_TITLE,cc.CURRENT_STATUS_SINCE,'----' as OPTION2,'----' as NOTE, '----' as CALL_DURATION, '----' as "COMMENT" FROM distribution_list dll LEFT JOIN client_complaints cck ON dll.client_com_id = cck.id LEFT JOIN issue iss ON cck.issue_id = iss.id LEFT JOIN Client cc ON iss.urgency_id = cc.sys_id left join SEASON_TYPE st on cc.OPTION3 = st.ID left join CLIENT_CAMPAIGN cg on cc.SYS_ID = cg.CLIENT_ID left join CAMPAIGN gg on cg.CAMPAIGN_ID = gg.ID where dll.RECEIP_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) and dll.RECEIP_ID = ? and cc.sys_id not in (select AP.CLIENT_ID from APPOINTMENT AP) and dll.receive_date >= TO_DATE(?,'yyyy/MM/dd') and dll.receive_date < TO_DATE(?,'yyyy/MM/dd') + interval '1' day and length(dll.option2) > 3

getUserClientsAppointments=SELECT CLIENT_ID,MOBILE, PHONE, CLIENT_NAME, CREATION_TIME, APPOINTMENT_DATE, CURRENT_STATUS_SINCE, OPTION9, Note, abs(round(cast(APPOINTMENT_DATE as Date)- cast(CREATION_TIME as Date),0)) as duration, "COMMENT", CURRENT_STATUS, APPOINTMENT_PLACE, CALL_DURATION, ID FROM APPOINTMENT_NOTIFICATION WHERE TRUNC(CURRENT_STATUS_SINCE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') and user_id = ? departmentQuery and (option2 like '%call%' or option2 like '%meeting%') and OPTION9 in ('answered', 'attended') ORDER BY CLIENT_NAME, CURRENT_STATUS_SINCE
getAppointmentsByDateOrdered = SELECT AN.*, UG.GROUP_ID FROM APPOINTMENT_NOTIFICATION AN LEFT JOIN USER_GROUP UG ON AN.USER_ID = UG.USER_ID GRP_CON WHERE AN.OPTION2 = ?  AND trunc(AN.APPOINTMENT_DATE) BETWEEN ? AND ? AND CURRENT_STATUS_CODE IN ('23', '26') and AN.USER_ID IN (SELECT EMP_MGR.EMP_ID FROM EMP_MGR WHERE EMP_MGR.MGR_ID IN (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID IN (?)) UNION SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID IN (?)) ORDER BY AN.TIME_REMAINING_MINUTES
getAppointmentByDateAndUser=SELECT CLIENT_ID, CLIENT_NAME, MOBILE, USER_NAME, APPOINTMENT_FOR_NAME, TITLE,CREATION_TIME, APPOINTMENT_DATE, TO_NUMBER(TO_CHAR(APPOINTMENT_DATE, 'DD')) AS DAY_NO, TIME_REMAINING_MINUTES, OPTION1, CURRENT_STATUS_CODE, DIRECTED_BY_NAME, OPTION5 FROM APPOINTMENT_NOTIFICATION WHERE TRUNC(APPOINTMENT_DATE) BETWEEN ? AND ? AND CURRENT_STATUS_CODE <> '29' AND CURRENT_STATUS_CODE <> '24' AND APPOINTMENT_FOR = ? AND TITLE like '%typeTitle%' ORDER BY CLIENT_NAME
getUserOwnedAppointmentsByDate=SELECT A.*, C.CLIENT_NO FROM APPOINTMENT_NOTIFICATION A LEFT JOIN CLIENT C ON A.CLIENT_ID = C.SYS_ID WHERE A.APPOINTMENT_FOR = ? and TRUNC(A.APPOINTMENT_DATE) = TO_DATE(?,'yyyy/mm/dd')
getVisitsCountsForWorkerByDate=SELECT COUNT(*) VISIT_COUNT FROM APPOINTMENT_NOTIFICATION where APPOINTMENT_FOR = ? and trunc(APPOINTMENT_DATE) = ? GROUP BY APPOINTMENT_FOR
getSuccessAppointmentsByDate = SELECT AN.*, CL.MOBILE, CL.INTER_PHONE, DL.RECEIVE_DATE, US.FULL_NAME CREATED_BY_NAME, ST.CASE_EN STATUS_NAME, SEAS.ENGLISHNAME AS COMCHANNEL FROM APPOINTMENT_NOTIFICATION AN LEFT JOIN CLIENT CL ON AN.CLIENT_ID = CL.SYS_ID LEFT JOIN SEASON_TYPE SEAS ON CL.OPTION3 = SEAS.ID LEFT JOIN DISTRIBUTION_LIST DL ON AN.CLIENT_COMPLAINT_ID = DL.CLIENT_COM_ID AND AN.APPOINTMENT_FOR = DL.RECEIP_ID LEFT JOIN USERS US ON CL.CREATED_BY = US.USER_ID LEFT JOIN STATUS_TYPE ST ON CL.CURRENT_STATUS = ST.ID WHERE AN.CURRENT_STATUS_CODE = '26' AND TRUNC(AN.APPOINTMENT_DATE) BETWEEN ? AND ?
getAppointmentsStat=select count(case when current_status_code = '24' THEN ID END) as CARED, count(case when current_status_code in ('23','25','27') THEN ID END) as NOT_CARED From APPOINTMENT_NOTIFICATION where creation_time between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')+1 and OPTION2 = 'meeting' and trunc(appointment_date) <= trunc(sysdate)
getAppointmentTotalStat=select count(case when current_status_code = '26' THEN ID END) as Sccuess, count(case when current_status_code in('23','24','25','27') THEN ID END) as Fail from APPOINTMENT_NOTIFICATION where creation_time between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')+1 and OPTION2 = 'meeting' and trunc(appointment_date) <= trunc(sysdate)

getMyAppointmentTotalStat = SELECT count(case when current_status_code IN('26') THEN ID END) AS Sccuess, count(case when current_status_code IN('23','25','27') THEN ID END) AS Fail FROM APPOINTMENT_NOTIFICATION WHERE USER_ID = ? AND TRUNC(creation_time) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')+1 AND OPTION2 = 'meeting' AND TRUNC(appointment_date) <= trunc(sysdate)
getMyAppointmentsStat = SELECT count(case when current_status_code IN('24') THEN ID END) AS CARED, count(case when current_status_code IN ('23','25','27') THEN ID END) AS NOT_CARED FROM APPOINTMENT_NOTIFICATION WHERE USER_ID = ? AND TRUNC(creation_time) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') AND OPTION2 = 'meeting' AND TRUNC(appointment_date) <= trunc(sysdate)

getAppointmentsByDepartmentOrdered = SELECT * FROM APPOINTMENT_NOTIFICATION WHERE OPTION2 = ? AND USER_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID IN (SELECT OPTION_ONE FROM PROJECT WHERE PROJECT_ID = ?)) AND trunc(APPOINTMENT_DATE) BETWEEN ? AND ? ORDER BY TIME_REMAINING_MINUTES

getFutureAppointments = SELECT ID FROM APPOINTMENT_NOTIFICATION WHERE CLIENT_ID = ? AND trunc(APPOINTMENT_DATE) >= ? AND CURRENT_STATUS_CODE = '23'


getFutureUserClientsAppointments=SELECT CLIENT_ID, MOBILE, PHONE, CLIENT_NAME, CREATION_TIME, APPOINTMENT_DATE, OPTION9, Note, abs(round(cast(APPOINTMENT_DATE as Date)- cast(CREATION_TIME as Date),0)) as duration, "COMMENT", CURRENT_STATUS, APPOINTMENT_PLACE FROM APPOINTMENT_NOTIFICATION WHERE CURRENT_STATUS = '\u0645\u0641\u062a\u0648\u062d\u0629' AND (TRUNC(CREATION_TIME) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') OR TRUNC(APPOINTMENT_DATE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) and user_id = ? departmentQuery and (option2 like '%call%' or option2 like '%meeting%') ORDER BY CLIENT_NAME, CREATION_TIME
getFutureUserClientsAppointmentsByStatus=SELECT CLIENT_ID, MOBILE, PHONE, CLIENT_NAME, CREATION_TIME, APPOINTMENT_DATE, OPTION9, Note, abs(round(cast(APPOINTMENT_DATE as Date)- cast(CREATION_TIME as Date),0)) as duration, "COMMENT", CURRENT_STATUS, APPOINTMENT_PLACE FROM APPOINTMENT_NOTIFICATION WHERE CURRENT_STATUS = '\u0645\u0641\u062a\u0648\u062d\u0629' and (TRUNC(CREATION_TIME) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') OR TRUNC(APPOINTMENT_DATE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) typeQuery and user_id = ? departmentQuery ORDER BY CLIENT_NAME, CREATION_TIME 

getMeetingsByDateAndUser = SELECT CLIENT_ID, CLIENT_NAME, MOBILE, USER_NAME, APPOINTMENT_FOR_NAME, TITLE,CREATION_TIME, APPOINTMENT_DATE, TO_NUMBER(TO_CHAR(APPOINTMENT_DATE, 'DD')) AS DAY_NO, TIME_REMAINING_MINUTES, OPTION1, CURRENT_STATUS_CODE, DIRECTED_BY_NAME, OPTION5 FROM APPOINTMENT_NOTIFICATION WHERE TRUNC(APPOINTMENT_DATE) BETWEEN ? AND ? AND CURRENT_STATUS_CODE <> '29' AND CURRENT_STATUS_CODE <> '24' AND APPOINTMENT_FOR = ? AND TITLE like '%typeTitle%' AND OPTION2= 'meeting' ORDER BY CLIENT_NAME


getCallsByDateAndUser = SELECT CLIENT_ID, CLIENT_NAME, MOBILE, USER_NAME, APPOINTMENT_FOR_NAME, TITLE,CREATION_TIME, APPOINTMENT_DATE, TO_NUMBER(TO_CHAR(APPOINTMENT_DATE, 'DD')) AS DAY_NO, TIME_REMAINING_MINUTES, OPTION1, CURRENT_STATUS_CODE, DIRECTED_BY_NAME, OPTION5 FROM APPOINTMENT_NOTIFICATION WHERE TRUNC(APPOINTMENT_DATE) BETWEEN ? AND ? AND CURRENT_STATUS_CODE <> '29' AND CURRENT_STATUS_CODE <> '24' AND APPOINTMENT_FOR = ? AND TITLE like '%typeTitle%' AND OPTION2= 'call' ORDER BY CLIENT_NAME


getFutureAppointmentByUserExcel = SELECT CLIENT_ID, MOBILE, PHONE, option2 as appTyp, CLIENT_NAME, CREATION_TIME, APPOINTMENT_DATE, OPTION9, Note, abs(round(cast(APPOINTMENT_DATE as Date)- cast(CREATION_TIME as Date),0)) as duration, "COMMENT", CURRENT_STATUS, APPOINTMENT_PLACE FROM APPOINTMENT_NOTIFICATION WHERE CURRENT_STATUS = '\u0645\u0641\u062a\u0648\u062d\u0629' AND ( TRUNC(APPOINTMENT_DATE) BETWEEN ? AND ? ) AND CURRENT_STATUS_CODE <> '29' AND CURRENT_STATUS_CODE <> '24' and user_id = ? and (option2 like '%call%' or option2 like '%meeting%') ORDER BY CLIENT_NAME, CREATION_TIME
getFutureAppointmentsExcel = SELECT CLIENT_ID, MOBILE, PHONE, USER_ID, USER_NAME ,option2 as appTyp, CLIENT_NAME, CREATION_TIME, APPOINTMENT_DATE, OPTION9, Note, abs(round(cast(APPOINTMENT_DATE as Date)- cast(CREATION_TIME as Date),0)) as duration, "COMMENT", CURRENT_STATUS, APPOINTMENT_PLACE FROM APPOINTMENT_NOTIFICATION WHERE CURRENT_STATUS = '\u0645\u0641\u062a\u0648\u062d\u0629' AND (TRUNC(APPOINTMENT_DATE) BETWEEN ? AND ? ) AND CURRENT_STATUS_CODE <> '29' AND CURRENT_STATUS_CODE <> '24' departmentQuery and (option2 like '%call%' or option2 like '%meeting%') ORDER BY CLIENT_NAME, CREATION_TIME

lstEmpAppCmnt = SELECT CL.CLIENT_NO, APPNTF.*, TO_NUMBER(TO_CHAR(APPNTF.APPOINTMENT_DATE, 'DD')) AS DAY_NO FROM APPOINTMENT_NOTIFICATION APPNTF LEFT JOIN CLIENT CL ON APPNTF.CLIENT_ID = CL.SYS_ID WHERE APPNTF.APPOINTMENT_FOR = ? AND (APPNTF."COMMENT" LIKE '%frmDateStr%' OR APPNTF."COMMENT" LIKE '%tDateStr%') ORDER BY APPNTF.CLIENT_NAME
getMyAppointmentByDate=SELECT CLIENT_ID, CLIENT_NAME, USER_NAME, APPOINTMENT_FOR_NAME, TITLE, APPOINTMENT_DATE, TO_NUMBER(TO_CHAR(APPOINTMENT_DATE, 'DD')) AS DAY_NO, TIME_REMAINING_MINUTES, OPTION1, CURRENT_STATUS_CODE, DIRECTED_BY_NAME, OPTION5, OPTION2, APPOINTMENT_FOR, NOTE, OPTION8, OPTION9 FROM APPOINTMENT_NOTIFICATION WHERE TRUNC(APPOINTMENT_DATE) BETWEEN ? AND ? AND APPOINTMENT_FOR = ? AND CURRENT_STATUS_CODE <> '29' ORDER BY CLIENT_NAME
getSuccessAppointmentsCampaignStat=SELECT COUNT(*) TOTAL_CLIENT, CP.CAMPAIGN_TITLE FROM APPOINTMENT_NOTIFICATION AN LEFT JOIN CLIENT CL ON AN.CLIENT_ID = CL.SYS_ID LEFT JOIN DISTRIBUTION_LIST DL ON AN.CLIENT_COMPLAINT_ID = DL.CLIENT_COM_ID AND AN.APPOINTMENT_FOR = DL.RECEIP_ID LEFT JOIN USERS US ON CL.CREATED_BY = US.USER_ID LEFT JOIN STATUS_TYPE ST ON CL.CURRENT_STATUS = ST.ID LEFT JOIN (SELECT DISTINCT CLIENT_ID, CAMPAIGN_ID FROM CLIENT_CAMPAIGN) CC ON CL.SYS_ID = CC.CLIENT_ID LEFT JOIN CAMPAIGN CP ON CC.CAMPAIGN_ID = CP.ID WHERE AN.CURRENT_STATUS_CODE = '26' AND TRUNC(AN.APPOINTMENT_DATE) BETWEEN ? AND ? whereStatement GROUP BY CP.CAMPAIGN_TITLE

getFutureAppointmentsForUser=SELECT DISTINCT * FROM APPOINTMENT_NOTIFICATION WHERE user_id = ? AND TRUNC(APPOINTMENT_DATE) >= SYSDATE AND (CURRENT_STATUS_CODE = '23' OR CURRENT_STATUS_CODE <> '23') AND (title IS NULL OR UPPER(TRIM(title)) NOT IN ('NOT INTERESTED', 'CLOSED', 'OUT OF BUDGET')) AND client_id NOT IN (SELECT DISTINCT client_id FROM APPOINTMENT_NOTIFICATION WHERE REGEXP_LIKE(UPPER(TRIM(title)), '(NOT *INTERESTED|CLOSED|OUT *OF *BUDGET)') OR REGEXP_LIKE(UPPER(TRIM(note)), '(NOT *INTERESTED|CLOSED|OUT *OF *BUDGET)') OR REGEXP_LIKE(UPPER(TRIM("COMMENT")), '(NOT *INTERESTED|CLOSED|OUT *OF *BUDGET)')) ORDER BY APPOINTMENT_DATE DESC
getPastAppointmentsForUser=SELECT DISTINCT * FROM APPOINTMENT_NOTIFICATION WHERE user_id = ? AND TRUNC(APPOINTMENT_DATE) <= SYSDATE AND (CURRENT_STATUS_CODE = '23' OR CURRENT_STATUS_CODE <> '23') AND (title IS NULL OR UPPER(TRIM(title)) NOT IN ('NOT INTERESTED', 'CLOSED', 'OUT OF BUDGET')) AND client_id NOT IN (SELECT DISTINCT client_id FROM APPOINTMENT_NOTIFICATION WHERE REGEXP_LIKE(UPPER(TRIM(title)), '(NOT *INTERESTED|CLOSED|OUT *OF *BUDGET)') OR REGEXP_LIKE(UPPER(TRIM(note)), '(NOT *INTERESTED|CLOSED|OUT *OF *BUDGET)') OR REGEXP_LIKE(UPPER(TRIM("COMMENT")), '(NOT *INTERESTED|CLOSED|OUT *OF *BUDGET)')) ORDER BY APPOINTMENT_DATE DESC
getTodayAppointmentsForUser=SELECT DISTINCT * FROM APPOINTMENT_NOTIFICATION WHERE user_id = ? AND TRUNC(APPOINTMENT_DATE) = SYSDATE AND (CURRENT_STATUS_CODE = '23' OR CURRENT_STATUS_CODE <> '23') AND (title IS NULL OR UPPER(TRIM(title)) NOT IN ('NOT INTERESTED', 'CLOSED', 'OUT OF BUDGET')) AND client_id NOT IN (SELECT DISTINCT client_id FROM APPOINTMENT_NOTIFICATION WHERE REGEXP_LIKE(UPPER(TRIM(title)), '(NOT *INTERESTED|CLOSED|OUT *OF *BUDGET)') OR REGEXP_LIKE(UPPER(TRIM(note)), '(NOT *INTERESTED|CLOSED|OUT *OF *BUDGET)') OR REGEXP_LIKE(UPPER(TRIM("COMMENT")), '(NOT *INTERESTED|CLOSED|OUT *OF *BUDGET)')) ORDER BY APPOINTMENT_DATE DESC


getClientCostom=select distinct cc.*,st.ENGLISHNAME,gg.CAMPAIGN_TITLE from client cc left join client_projects cp on cc.sys_id = cp.client_id left join SEASON_TYPE st on cc.OPTION3 = st.ID left join CLIENT_CAMPAIGN cg on cc.SYS_ID = cg.CLIENT_ID left join CAMPAIGN gg on cg.CAMPAIGN_ID = gg.ID WHERE cc.current_status = '11' and cp.product_id = 'purche' cp.product_category_id = ?