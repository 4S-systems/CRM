getAllActiveMessages=SELECT M.*, M.ON_DATE + (M.PERIOD / (24 * 60)) UPTO_DATE FROM MESSAGES M WHERE M.STATUS = '1' AND (M.FREQUENCY != 'once' OR M.ON_DATE > SYSDATE - ((M.PERIOD + 1) / (24 * 60)))
insertMessage=INSERT INTO MESSAGES VALUES (?,?,?,?,?,?,?,?,?,?,?,?)
updateMessage=UPDATE MESSAGES SET MESSAGE = ?, ON_DATE = ?, FREQUENCY = ?, STATUS = ?, PERIOD = ?, OPTION1 = ?, OPTION2 = ?, OPTION3 = ?, OPTION4 = ?, OPTION5 = ?, OPTION6 = ? WHERE ID = ?