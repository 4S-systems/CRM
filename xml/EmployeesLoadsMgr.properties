employeesLoadDynamicReport=SELECT U.FULL_NAME AS CURRENT_OWNER_FULL_NAME, NVL(LOADS.TOTAL, 0) AS TOTAL FROM USERS U LEFT OUTER JOIN (SELECT SUM(NO_TICKET) AS TOTAL,CURRENT_OWNER_FULL_NAME, CURRENT_OWNER_ID, DEPARTMENT_ID FROM EMPLOYEES_LOADS WHERE (STATUS_CODE != 6 and STATUS_CODE != 7) GROUP BY CURRENT_OWNER_FULL_NAME, CURRENT_OWNER_ID, DEPARTMENT_ID) LOADS ON U.USER_ID = LOADS.CURRENT_OWNER_ID WHERE LOADS.DEPARTMENT_ID = ? ORDER BY TOTAL ASC
employeesLoadDynamicReportByGroup=SELECT U.FULL_NAME AS CURRENT_OWNER_FULL_NAME, NVL(LOADS.TOTAL, 0) AS TOTAL FROM USERS U LEFT OUTER JOIN (SELECT SUM(NO_TICKET) AS TOTAL,CURRENT_OWNER_FULL_NAME, CURRENT_OWNER_ID FROM EMPLOYEES_LOADS WHERE (STATUS_CODE != 6 and STATUS_CODE != 7) GROUP BY CURRENT_OWNER_FULL_NAME, CURRENT_OWNER_ID) LOADS ON U.USER_ID = LOADS.CURRENT_OWNER_ID WHERE U.USER_ID IN (SELECT UG.USER_ID FROM USER_GROUP UG WHERE UG.GROUP_ID = ?) ORDER BY TOTAL ASC
employeesLoadDynamicReportByAll=SELECT U.FULL_NAME AS CURRENT_OWNER_FULL_NAME, NVL(LOADS.TOTAL, 0) AS TOTAL FROM USERS U LEFT OUTER JOIN (SELECT SUM(NO_TICKET) AS TOTAL,CURRENT_OWNER_FULL_NAME, CURRENT_OWNER_ID FROM EMPLOYEES_LOADS WHERE (STATUS_CODE != 6 and STATUS_CODE != 7) GROUP BY CURRENT_OWNER_FULL_NAME, CURRENT_OWNER_ID) LOADS ON U.USER_ID = LOADS.CURRENT_OWNER_ID ORDER BY TOTAL ASC
employeesLoads=SELECT U.FULL_NAME AS CURRENT_OWNER_FULL_NAME, NVL(LOADS.TOTAL, 0) AS TOTAL FROM USERS U LEFT OUTER JOIN (SELECT CURRENT_OWNER_ID, CURRENT_OWNER_FULL_NAME, SUM(NO_TICKET) AS TOTAL FROM EMPLOYEES_LOADS WHERE (STATUS_CODE != 6 and STATUS_CODE != 7) GROUP BY CURRENT_OWNER_ID, CURRENT_OWNER_FULL_NAME) LOADS ON U.USER_ID = LOADS.CURRENT_OWNER_ID WHERE U.USER_ID IN IDS ORDER BY TOTAL ASC