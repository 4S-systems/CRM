insertStageWorkItem=INSERT INTO STAGE_WORK_ITEM VALUES (?,?,?,?,?,SYSDATE,?,?,?,?,?,?,?)
getStageWorkItems=SELECT SW.NOTE, SW.QUANTITY, SW.STAGE_ID, SW.WORK_ITEM_ID, WI.PROJECT_NAME WORK_ITEM_NAME, WI.EQ_NO WORK_ITEM_CODE, CT.PROJECT_NAME CATEGORY_NAME, SUM(R.QUANTITY) ACTUAL_QUANTITY FROM ISSUE I INNER JOIN PROJECT U ON I.UNIT_ID = U.PROJECT_NAME LEFT JOIN STAGE_WORK_ITEM SW ON U.PROJECT_ID = SW.STAGE_ID LEFT JOIN PROJECT WI ON SW.WORK_ITEM_ID = WI.PROJECT_ID LEFT JOIN PROJECT CT ON WI.OPTION_ONE = CT.PROJECT_ID LEFT JOIN REQUEST_ITEMS R ON I.ID = R.ISSUE_ID AND SW.WORK_ITEM_ID = R.PROJECT_ID WHERE SW.STAGE_ID = ? GROUP BY SW.NOTE, SW.QUANTITY, SW.STAGE_ID, SW.WORK_ITEM_ID, WI.PROJECT_NAME, WI.EQ_NO, CT.PROJECT_NAME