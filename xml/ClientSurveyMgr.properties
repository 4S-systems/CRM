insertClientSurvey=INSERT INTO CLIENT_SURVEY VALUES (?,?,?,?,SYSDATE,?,?,?,?,?,?,?)
getClientSurvey=SELECT SUM(CS.RATE) / COUNT(P.PROJECT_NAME) AVERAGE, P.PROJECT_NAME QUESTION FROM PROJECT P LEFT JOIN CLIENT_SURVEY CS ON P.PROJECT_ID = CS.QUESTION_ID WHERE P.LOCATION_TYPE = 'SUR' GROUP BY P.PROJECT_NAME ORDER BY P.PROJECT_NAME
getSurveyQuesRates=select sys_id, name, mobile, project_id, project_name, rate, case when (rate in (1,2)) then '1' when (rate = 3) then '2' Else '3' end As simple_rate from client_survey inner join project on client_survey.question_id = project.project_id inner join client on client_survey.client_id = client.sys_id where question_id = ? AND TRUNC(client_survey.CREATION_TIME) BETWEEN ? AND ? order by sys_id, project_id
getSurveyStatByQues=select Sum(disSats) disSats, Sum(someSats) someSats, Sum(sats) sats, project.project_id, project.project_name from project inner join ( select project_id, case when rate in (1,2) then count(sys_id) else 0 End As disSats, case when rate in (3) then count(sys_id) else 0 End As someSats, case when rate in (4,5) then count(sys_id) else 0 End As sats from client_survey inner join project on client_survey.question_id = project.project_id inner join client on client_survey.client_id = client.sys_id where TRUNC(client_survey.CREATION_TIME) BETWEEN ? AND ? group by project_id, rate) survey on project.project_id  = survey.project_id group by project.project_id, project.project_name order by project.project_id
getSurveyQuesRatesDet=select sys_id, name, mobile, project_id, project_name, rate, case when (rate in (1,2)) then '1' when (rate = 3) then '2' Else '3' end As simple_rate from client_survey inner join project on client_survey.question_id = project.project_id inner join client on client_survey.client_id = client.sys_id where TRUNC(client_survey.CREATION_TIME) BETWEEN ? AND ? order by sys_id, project_id