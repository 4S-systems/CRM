insertComplaintsSLA=INSERT INTO CLIENT_COMPLAINTS_SLA VALUES (?,?,?,SYSDATE,?,?,?,?,?,?,?,?)
updateComplaintsSLA=UPDATE CLIENT_COMPLAINTS_SLA SET EXECUTION_PERIOD = ? WHERE ID = ?
getNotCompletedComplaintsSLA=SELECT SL.*, CC.*, (SL.CREATION_TIME + SL.EXECUTION_PERIOD) - SYSDATE AS REMAIN, I.BUSINESS_ID_BY_DATE, U.FULL_NAME, ST.CASE_AR STATUS_NAME, TRUNC(SL.CREATION_TIME) + SL.EXECUTION_PERIOD END_DATE, I.URGENCY_ID CLIENT_ID, C.NAME CLIENT_NAME FROM CLIENT_COMPLAINTS_SLA SL JOIN CLIENT_COMPLAINTS CC ON SL.ID = CC.ID AND CC.CURRENT_STATUS != '7' LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN USERS U ON CC.CURRENT_OWNER_ID = U.USER_ID LEFT JOIN STATUS_TYPE ST ON CC.CURRENT_STATUS = ST.ID LEFT JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID WHERE SL.CREATED_BY = ?
getCompletedComplaintsSLA=SELECT SL.*, CC.*, I.BUSINESS_ID_BY_DATE, U.FULL_NAME, ST.CASE_AR STATUS_NAME, TRUNC(SL.CREATION_TIME) + SL.EXECUTION_PERIOD END_DATE, I.URGENCY_ID CLIENT_ID, C.NAME CLIENT_NAME FROM CLIENT_COMPLAINTS_SLA SL JOIN CLIENT_COMPLAINTS CC ON SL.ID = CC.ID AND CC.CURRENT_STATUS = '7' LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN USERS U ON CC.CURRENT_OWNER_ID = U.USER_ID LEFT JOIN STATUS_TYPE ST ON CC.CURRENT_STATUS = ST.ID LEFT JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID WHERE SL.CREATED_BY = ?
getDelayedComplaintsSLA=SELECT BUSINESS_ID, BUSINESS_ID_BY_DATE, BUSINESS_COMP_ID, FULL_NAME, STATUS_NAME, REMAIN, CLIENT_COMPLAINT_ID, COMPLAINT_CREATED_BY FROM (SELECT SL.*, CC.*, CC.ID CLIENT_COMPLAINT_ID, CC.CREATED_BY COMPLAINT_CREATED_BY, (SL.CREATION_TIME + SL.EXECUTION_PERIOD) - SYSDATE AS REMAIN, I.BUSINESS_ID_BY_DATE, U.FULL_NAME, ST.CASE_AR STATUS_NAME FROM CLIENT_COMPLAINTS_SLA SL JOIN CLIENT_COMPLAINTS CC ON SL.ID = CC.ID AND CC.CURRENT_STATUS != '7' LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN USERS U ON CC.CURRENT_OWNER_ID = U.USER_ID LEFT JOIN STATUS_TYPE ST ON CC.CURRENT_STATUS = ST.ID) WHERE REMAIN <= 0
getNotCompletedComplaintsGSLA=SELECT SL.*, CC.*, (SL.CREATION_TIME + SL.EXECUTION_PERIOD) - SYSDATE AS REMAIN, I.BUSINESS_ID_BY_DATE, U.FULL_NAME, ST.CASE_AR STATUS_NAME, TRUNC(SL.CREATION_TIME) + SL.EXECUTION_PERIOD END_DATE, I.URGENCY_ID CLIENT_ID, C.NAME CLIENT_NAME FROM CLIENT_COMPLAINTS_SLA SL JOIN CLIENT_COMPLAINTS CC ON SL.ID = CC.ID AND CC.CURRENT_STATUS != '7' LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN USERS U ON CC.CURRENT_OWNER_ID = U.USER_ID LEFT JOIN STATUS_TYPE ST ON CC.CURRENT_STATUS = ST.ID LEFT JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID
getCompletedComplaintsGSLA=SELECT SL.*, CC.*, I.BUSINESS_ID_BY_DATE, U.FULL_NAME, ST.CASE_AR STATUS_NAME, TRUNC(SL.CREATION_TIME) + SL.EXECUTION_PERIOD END_DATE, I.URGENCY_ID CLIENT_ID, C.NAME CLIENT_NAME FROM CLIENT_COMPLAINTS_SLA SL JOIN CLIENT_COMPLAINTS CC ON SL.ID = CC.ID AND CC.CURRENT_STATUS = '7' LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN USERS U ON CC.CURRENT_OWNER_ID = U.USER_ID LEFT JOIN STATUS_TYPE ST ON CC.CURRENT_STATUS = ST.ID LEFT JOIN CLIENT C ON I.URGENCY_ID = C.SYS_ID
