insertReservation=insert into RESERVATION values(?,?,?,?,SYSDATE,?,?,?,?,?,?,SYSDATE,?,?,?,?,?,?,?,?)
updateReservationStatus=update RESERVATION set current_status = ?, current_status_since = SYSDATE where id = ?

getAllReservation=SELECT rs.id, rs.project_id, p.project_name, rs.created_by, rs.budget, c.name client_name, rs.client_id, rs.payment_place, rs.period, u.full_name created_by_name, rs.creation_time, rs.reservation_date, rs.current_status, round((rs.period) - ((sysdate - to_date(to_char(rs.reservation_date, 'YYYY-MM-DD hh24:mi'), 'YYYY-MM-DD hh24:mi'))),0) as remaining_hours, st.STATUS_NAME as unit_current_status, RST.ACTION_TAKEN, SU.FULL_NAME ACTION_BY_NAME FROM PROJECT p RIGHT JOIN reservation rs ON p.project_id = rs.project_id LEFT JOIN client c ON rs.client_id = c.sys_id LEFT JOIN users u ON rs.created_by = u.user_id left join issue_status st on rs.PROJECT_ID = st.BUSINESS_OBJ_ID and st.END_DATE is null LEFT JOIN ISSUE_STATUS RST ON RS.ID = RST.BUSINESS_OBJ_ID AND RST.END_DATE IS NULL LEFT JOIN USERS SU ON RST.CREATED_BY = SU.USER_ID where RS.RESERVATION_DATE between ? and ? AND P.PROJECT_ID IS NOT NULL

getAllSoldUnits=SELECT rs.id, rs.project_id, p.project_name, rs.created_by, rs.budget, c.name client_name, rs.client_id, rs.payment_place, rs.period, u.full_name created_by_name, rs.creation_time, rs.current_status, round(rs.period - (24 * (sysdate - to_date(to_char(rs.creation_time, 'YYYY-MM-DD hh24:mi'), 'YYYY-MM-DD hh24:mi'))),0) as remaining_hours, st.STATUS_NAME as unit_current_status FROM PROJECT p RIGHT JOIN reservation rs ON p.project_id = rs.project_id LEFT JOIN client c ON rs.client_id = c.sys_id LEFT JOIN users u ON rs.created_by = u.user_id left join issue_status st on rs.PROJECT_ID = st.BUSINESS_OBJ_ID and st.END_DATE is null where rs.current_status = '31'
updateReservation=update RESERVATION set PERIOD = ?, PAYMENT_SYSTEM = ?, PAYMENT_PLACE = ?, RESERVATION_DATE = ?, option1=?, option2=?, option3=?, option4=?, option5=?, option6=?, option7=? where ID = ?
getMyAllReservation=SELECT rs.id, rs.project_id, p.project_name, rs.created_by, rs.budget, c.name client_name, C.MOBILE, C.INTER_PHONE, rs.client_id, rs.payment_place, rs.period, u.full_name created_by_name, rs.creation_time, rs.reservation_date, rs.current_status, round((rs.period) - ((sysdate - to_date(to_char(rs.reservation_date, 'YYYY-MM-DD hh24:mi'), 'YYYY-MM-DD hh24:mi'))),0) as remaining_hours, st.STATUS_NAME as unit_current_status, RST.ACTION_TAKEN, SU.FULL_NAME ACTION_BY_NAME, UP.OPTION1 PRICE, (CASE WHEN AP.ADDON_PRICE IS NULL THEN 0 ELSE AP.ADDON_PRICE END) ADDON_PRICE FROM PROJECT p RIGHT JOIN reservation rs ON p.project_id = rs.project_id LEFT JOIN client c ON rs.client_id = c.sys_id LEFT JOIN users u ON rs.created_by = u.user_id left join issue_status st on rs.PROJECT_ID = st.BUSINESS_OBJ_ID and st.END_DATE is null LEFT JOIN ISSUE_STATUS RST ON RS.ID = RST.BUSINESS_OBJ_ID AND RST.END_DATE IS NULL LEFT JOIN USERS SU ON RST.CREATED_BY = SU.USER_ID LEFT JOIN UNIT_PRICE UP ON P.PROJECT_ID = UP.UNIT_ID LEFT JOIN (SELECT SUM(PRICE) ADDON_PRICE, UNIT_ID FROM UNIT_ADDON_DETAILS GROUP BY UNIT_ID) AP ON UP.UNIT_ID = AP.UNIT_ID where rs.created_by = ? and RS.RESERVATION_DATE between ? and ? AND P.PROJECT_ID IS NOT NULL
getProjectsSoldUnits = SELECT rs.id, rs.project_id, p.project_name, rs.created_by, c.name client_name, rs.client_id, rs.payment_place, rs.period, u.full_name created_by_name, rs.creation_time, rs.current_status, round(rs.period - (24 * (sysdate - to_date(to_char(rs.creation_time, 'YYYY-MM-DD hh24:mi'), 'YYYY-MM-DD hh24:mi'))),0) as remaining_hours, st.STATUS_NAME as unit_current_status FROM   PROJECT p RIGHT JOIN reservation rs ON p.project_id = rs.project_id LEFT JOIN client c ON rs.client_id = c.sys_id LEFT JOIN users u ON rs.created_by = u.user_id left join issue_status st on rs.PROJECT_ID = st.BUSINESS_OBJ_ID and st.END_DATE is null where rs.current_status in ('31', '42')
getSalesReport=SELECT RS.ID, RS.PROJECT_ID, P.PROJECT_NAME, RS.CREATED_BY, RS.BUDGET, C.NAME CLIENT_NAME, RS.CLIENT_ID, RS.PAYMENT_PLACE, RS.PERIOD, U.FULL_NAME CREATED_BY_NAME, RS.CREATION_TIME, RS.RESERVATION_DATE, RS.CURRENT_STATUS, ST.STATUS_NAME AS UNIT_CURRENT_STATUS, CP.UNIT_VALUE FROM PROJECT P RIGHT JOIN RESERVATION RS ON P.PROJECT_ID = RS.PROJECT_ID LEFT JOIN CLIENT C ON RS.CLIENT_ID = C.SYS_ID LEFT JOIN USERS U ON RS.CREATED_BY = U.USER_ID LEFT JOIN ISSUE_STATUS ST ON RS.PROJECT_ID = ST.BUSINESS_OBJ_ID AND ST.END_DATE IS NULL LEFT JOIN CLIENT_PROJECTS CP ON P.PROJECT_ID = CP.PROJECT_ID AND C.SYS_ID = CP.CLIENT_ID WHERE RS.CURRENT_STATUS = '31' whereStatement ORDER BY U.FULL_NAME
getSalesTotalAmount=SELECT U.FULL_NAME EMPLOYEE_NAME, SUM(CP.UNIT_VALUE) TOTAL_VALUE FROM PROJECT P RIGHT JOIN RESERVATION RS ON P.PROJECT_ID = RS.PROJECT_ID LEFT JOIN CLIENT C ON RS.CLIENT_ID = C.SYS_ID LEFT JOIN USERS U ON RS.CREATED_BY = U.USER_ID LEFT JOIN ISSUE_STATUS ST ON RS.PROJECT_ID = ST.BUSINESS_OBJ_ID AND ST.END_DATE IS NULL LEFT JOIN CLIENT_PROJECTS CP ON P.PROJECT_ID = CP.PROJECT_ID AND C.SYS_ID = CP.CLIENT_ID WHERE RS.CURRENT_STATUS = '31' whereStatement GROUP BY U.FULL_NAME ORDER BY U.FULL_NAME
getSalesTotalCount=SELECT U.FULL_NAME EMPLOYEE_NAME, COUNT(*) TOTAL_NO FROM PROJECT P RIGHT JOIN RESERVATION RS ON P.PROJECT_ID = RS.PROJECT_ID LEFT JOIN CLIENT C ON RS.CLIENT_ID = C.SYS_ID LEFT JOIN USERS U ON RS.CREATED_BY = U.USER_ID LEFT JOIN ISSUE_STATUS ST ON RS.PROJECT_ID = ST.BUSINESS_OBJ_ID AND ST.END_DATE IS NULL LEFT JOIN CLIENT_PROJECTS CP ON P.PROJECT_ID = CP.PROJECT_ID AND C.SYS_ID = CP.CLIENT_ID WHERE RS.CURRENT_STATUS = '31' whereStatement GROUP BY U.FULL_NAME ORDER BY U.FULL_NAME
getCampaignSoldClients=SELECT R.*, P.PROJECT_NAME, C.NAME CLIENT_NAME, U.FULL_NAME CREATED_BY_NAME FROM RESERVATION R LEFT JOIN CLIENT C ON R.CLIENT_ID = C.SYS_ID LEFT JOIN CLIENT_CAMPAIGN CC ON CC.CLIENT_ID = C.SYS_ID LEFT JOIN PROJECT P ON R.PROJECT_ID = P.PROJECT_ID LEFT JOIN USERS U ON R.CREATED_BY = U.USER_ID WHERE CC.CAMPAIGN_ID = ? AND R.CURRENT_STATUS = '31'