getSparePartsByMainType = select DISTINCT tii.JOB_ORDER_NO,tii.JOB_ORDER_ID,tii.ITEM_CODE,tii.item_quanntity,tii.DEP_QTY1,tii.Cost,tii.transaction_no,a.PARENT_ID,mu.unit_name from ALL_MAINTENANCE_INFO a INNER JOIN trans_info_item tii on a.business_id=tii.JOB_ORDER_NO INNER JOIN maintainable_unit mu on mu.id=a.parent_id where tii.ITEM_CODE=? and trans_date between ? and ? and a.SITE in(sss) and a.MAIN_TYPE_ID in(mmm) order by a.PARENT_ID,tii.transaction_no
getSparePartsByBrand = select DISTINCT tii.JOB_ORDER_NO,tii.JOB_ORDER_ID,tii.ITEM_CODE,tii.item_quanntity,tii.DEP_QTY1,tii.Cost,tii.transaction_no,a.PARENT_ID,mu.unit_name from ALL_MAINTENANCE_INFO a INNER JOIN trans_info_item tii on a.business_id=tii.JOB_ORDER_NO INNER JOIN maintainable_unit mu on mu.id=a.parent_id where tii.ITEM_CODE=? and trans_date between ? and ? and a.SITE in(sss) and a.PARENT_ID in(bbb) order by a.PARENT_ID,tii.transaction_no
getSparePartsByEquipment = select DISTINCT tii.JOB_ORDER_NO,tii.JOB_ORDER_ID,tii.ITEM_CODE,tii.item_quanntity,tii.DEP_QTY1,tii.Cost,tii.transaction_no,a.PARENT_ID,mu.unit_name from ALL_MAINTENANCE_INFO a INNER JOIN trans_info_item tii on a.business_id=tii.JOB_ORDER_NO INNER JOIN maintainable_unit mu on mu.id=a.parent_id where tii.ITEM_CODE=? and trans_date between ? and ? and a.SITE in(sss) and a.UNIT_ID=? order by tii.transaction_no
