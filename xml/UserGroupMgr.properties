isUserHasGroup=SELECT COUNT(*) AS RESULT FROM USER_GROUP WHERE USER_ID = ? AND GROUP_ID = ?
selectActiveUser=select * from user_group where user_name =? and user_id in (select business_obj_id from issue_status where status_name = '21' and object_type = 'User' and end_date is null)
getByUserId=SELECT * FROM USER_GROUP WHERE USER_ID = ?  and user_id in (select business_obj_id from issue_status where status_name = '21' and object_type = 'User' and end_date is null)
selectAllGroupUsers=select t.group_id,t.group_name, u.user_name from user_group u inner join tracker_group t on  t.group_id=u.group_id order by t.group_name
