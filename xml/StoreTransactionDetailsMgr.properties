insertStoreTransactionDetails=INSERT INTO STORE_TRANSACTION_DETAILS VALUES(?,?,?,?,?,?,?,?,SYSDATE,?,?,?,?,?,?,?,?,?,?,?)
updateObject=UPDATE STORE_TRANSACTION_DETAILS SET NOTE = ?, PRICE = ?, QUANTITY = ?, STORE_ID = ?, CURRENT_STATUS = ?, STORE_PLACE = ?, PACKAGE_NO = ? WHERE ID = ?
getByTransactionID=SELECT STD.*, P.PROJECT_NAME ITEM_NAME, P.EQ_NO ITEM_CODE FROM STORE_TRANSACTION_DETAILS STD LEFT JOIN PROJECT P ON STD.ITEM_ID = P.PROJECT_ID WHERE STD.STORE_TRANSACTION_ID = ?
updateTransactionDetailsStatus=UPDATE STORE_TRANSACTION_DETAILS SET CURRENT_STATUS = ?, CURRENT_STATUS_SINCE = SYSDATE WHERE STORE_TRANSACTION_ID = ?