getUserNotAnsweredCallsCount=SELECT COUNT(*) CALLS_COUNT FROM APPOINTMENT WHERE OPTION2 LIKE '%call%' AND APPOINTMENT_FOR = ? AND TRUNC(CURRENT_STATUS_SINCE) = ? AND CURRENT_STATUS IN ('24', '25', '26', '29') AND OPTION9 = 'not answered'
getUserAttendedMeetingsCount=SELECT COUNT(*) MEETINGS_COUNT FROM APPOINTMENT WHERE OPTION2 LIKE '%meeting%' AND APPOINTMENT_FOR = ? AND TRUNC(CURRENT_STATUS_SINCE) = ? AND CURRENT_STATUS IN ('24', '25', '26', '29') AND OPTION9 = 'attended'
getUserNotAttendedMeetingsCount=SELECT COUNT(*) MEETINGS_COUNT FROM APPOINTMENT WHERE OPTION2 LIKE '%meeting%' AND APPOINTMENT_FOR = ? AND TRUNC(CURRENT_STATUS_SINCE) = ? AND CURRENT_STATUS IN ('24', '25', '26', '29') AND OPTION9 = 'not attended'
getUserAnsweredEditCommentsCount = SELECT REGEXP_COUNT("COMMENT", 'dateStr') APP_COMMENTS_COUNT FROM APPOINTMENT WHERE APPOINTMENT_FOR = ? AND REGEXP_COUNT("COMMENT", 'dateStr') != 0 AND REGEXP_COUNT("COMMENT", 'dateStr') IS NOT NULL AND OPTION9 IN ('answered', 'attended')
getUserNotAnsweredEditCommentsCount = SELECT REGEXP_COUNT("COMMENT", 'dateStr') APP_COMMENTS_COUNT FROM APPOINTMENT WHERE APPOINTMENT_FOR = ? AND REGEXP_COUNT("COMMENT", 'dateStr') != 0 AND REGEXP_COUNT("COMMENT", 'dateStr') IS NOT NULL AND OPTION9 IN ('not answered', 'not attended')
getActiveUsersCount=SELECT COUNT(*) TOTAL FROM USERS U LEFT JOIN ISSUE_STATUS I ON U.USER_ID = I.BUSINESS_OBJ_ID WHERE I.END_DATE IS NULL AND OBJECT_TYPE = 'User' AND I.STATUS_NAME = '21'
getUsersByDistributionGroup=SELECT * FROM USERS u left join EMP_MGR um on u.USER_ID = um.EMP_ID and um.COMMENTS !='1' WHERE  um.MGR_ID = ?
