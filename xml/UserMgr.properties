isUserNameExist=SELECT USER_ID FROM USERS WHERE USER_ID != ? AND USER_NAME = ?
searchUsersLike=select * from users where FULL_NAME like '%userName%'
getUsersByProjectAndGroup=SELECT U.USER_ID, U.USER_NAME, U.FULL_NAME FROM USER_PROJECTS UP INNER JOIN USERS U ON UP.USER_ID = U.USER_ID INNER JOIN USER_GROUP UG ON U.USER_ID = UG.USER_ID WHERE UP.PROJECT_ID = ? AND UG.GROUP_ID = ? AND UP.IS_DEFAULT = '1'
getUsersByGroup=SELECT * FROM USERS u left join issue_status iis on u.user_id = iis.business_obj_id WHERE u.USER_ID IN (SELECT USER_GROUP.USER_ID FROM USER_GROUP WHERE USER_GROUP.GROUP_ID = ?) and iis.object_type = 'User' and iis.status_name !='22' and iis.end_date is null
getUsersByGroup2=SELECT * FROM USERS WHERE USER_ID IN (SELECT USER_GROUP.USER_ID FROM USER_GROUP WHERE USER_GROUP.GROUP_ID = ?)
getUsersWithoutManagers=select * from users where USER_ID not in (select option_one from project)
insertUserStatus=insert into issue_status values (?, '22', 'UL', 'UL', NULL, SYSDATE, 0, 'UL', 'UL', 'UL', ?, 'User', '0', ?)
selectUsersWithRowNoAndStatus=SELECT u.*, ROW_NUMBER() OVER (ORDER BY u.USER_NAME) AS INDICES, i.STATUS_NAME FROM USERS u left join ISSUE_STATUS i on u.USER_ID = i.BUSINESS_OBJ_ID where i.END_DATE IS NULL AND OBJECT_TYPE = 'User'
getEmployeeByDepartmentId=SELECT USER_ID, FULL_NAME FROM USERS WHERE USER_ID IN (SELECT EMP_MGR.EMP_ID FROM EMP_MGR WHERE EMP_MGR.MGR_ID IN (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID IN (departmentID)) UNION SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID IN (departmentID))
getEmployeeByEmpId=SELECT USER_ID, FULL_NAME FROM USERS WHERE USER_ID IN (SELECT uss.user_id FROM user_group uss WHERE uss.group_id = '1382943922110')
getAllEngineers=SELECT DISTINCT u.* FROM users u RIGHT JOIN user_company_projects ucp ON u.user_id = ucp.user_id
updateUserNameInDocument=UPDfaATE DOCUMENT SET CREATED_BY_NAME = ? WHERE CREATED_BY = ?
updateUserNameInEmployeeDoc=UPDATE EMPLOYEE_DOC SET CREATED_BY_NAME = ? WHERE CREATED_BY = ?
updateUserNameInIssueDocument=UPDATE ISSUE_DOCUMENT SET CREATED_BY_NAME = ? WHERE CREATED_BY = ?
updateUserNameInMntnbleUnitDoc=UPDATE MNTNBLE_UNIT_DOC SET CREATED_BY_NAME = ? WHERE CREATED_BY = ?
updateUserNameInWfTaskDoc=UPDATE WF_TASK_DOC SET CREATED_BY_NAME = ? WHERE CREATED_BY = ?
updateUserNameInUserTrade=UPDATE USER_TRADE SET USER_NAME = ? WHERE USER_ID = ?
updateUserNameInClientComplaints=UPDATE CLIENT_COMPLAINTS SET CURRENT_OWNER = ? WHERE CURRENT_OWNER_ID = ?
getEmployeesByDepartmentCode=select * from users where USER_ID in (select emp_id from emp_mgr where mgr_id in (select PROJECT.OPTION_ONE from project where eq_no = ?))
getAllTechnicians=SELECT UNIQUE U.* FROM USERS U INNER JOIN USER_AREA UA ON U.USER_ID = UA.USER_ID
getAllActiveUsers=SELECT DISTINCT U.*, ST.STATUS_NAME FROM USERS U LEFT JOIN ISSUE_STATUS ST ON U.USER_ID = ST.BUSINESS_OBJ_ID AND ST.END_DATE IS NULL WHERE ST.STATUS_NAME = '21' ORDER BY TRIM(U.FULL_NAME)
getEmployeesByManager=SELECT * FROM USERS WHERE USER_TYPE = '0' AND USER_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = ?) ORDER BY FULL_NAME
getAllUpperManagers=SELECT * FROM USERS WHERE USER_ID IN (SELECT OPTION_ONE FROM PROJECT)
getUsersInMyReportDepartments=SELECT U.* FROM USERS U LEFT JOIN EMP_MGR EM ON U.USER_ID = EM.EMP_ID LEFT JOIN PROJECT P ON EM.MGR_ID = P.OPTION_ONE WHERE P.PROJECT_ID IN (SELECT DEPARTMENT_ID FROM USER_DEPARTMENT_CONFIG WHERE USER_ID = ?)
getUsersByGroupAndBranch=SELECT * FROM USERS u left join issue_status iis on u.user_id = iis.business_obj_id WHERE u.USER_ID IN (SELECT USER_GROUP.USER_ID FROM USER_GROUP WHERE USER_GROUP.GROUP_ID = ?) AND u.USER_ID IN (SELECT USER_ID FROM USER_PROJECTS WHERE PROJECT_ID prjID) and iis.object_type = 'User' and iis.status_name !='22' and iis.end_date is null

getUsersByBranch = SELECT * FROM USERS WHERE USER_ID IN (SELECT USER_ID FROM USER_PROJECTS WHERE PROJECT_ID = ?)
getAllDistributionUsers=SELECT DISTINCT * FROM USERS U WHERE U.USER_ID IN (SELECT UG.USER_ID FROM USER_GROUP UG LEFT JOIN USER_GROUP_CONFIG UC ON UG.GROUP_ID = UC.GROUP_ID WHERE UC.USER_ID = ?) ORDER BY FULL_NAME
getUserCommentsCount=SELECT COUNT(*) COMMENTS_COUNT FROM COMMENTS WHERE CREATED_BY = ? AND TRUNC(CREATION_TIME) = ?
getUserCallsCount=SELECT COUNT(*) CALLS_COUNT FROM APPOINTMENT WHERE OPTION2 LIKE '%call%' AND APPOINTMENT_FOR = ? AND TRUNC(CURRENT_STATUS_SINCE) = ? AND CURRENT_STATUS IN ('24', '25', '26', '29')
getUserClosureCount=SELECT COUNT(*) CLOSURE_COUNT FROM ISSUE_STATUS ST LEFT JOIN CLIENT_COMPLAINTS CO ON ST.BUSINESS_OBJ_ID = CO.ID LEFT JOIN ISSUE I ON CO.ISSUE_ID = I.ID LEFT JOIN CLIENT CL ON I.URGENCY_ID = CL.SYS_ID WHERE SYS_ID IS NOT NULL AND ST.CREATED_BY = ? AND STATUS_NAME = '6' AND TRUNC(BEGIN_DATE) = ?
getUserFinishCount=SELECT COUNT(*) FINISH_COUNT FROM ISSUE_STATUS ST LEFT JOIN CLIENT_COMPLAINTS CO ON ST.BUSINESS_OBJ_ID = CO.ID LEFT JOIN ISSUE I ON CO.ISSUE_ID = I.ID LEFT JOIN CLIENT CL ON I.URGENCY_ID = CL.SYS_ID WHERE SYS_ID IS NOT NULL AND ST.CREATED_BY = ? AND STATUS_NAME = '7' AND TRUNC(BEGIN_DATE) = ?
getUserEmailsCount=SELECT COUNT(*) EMAIL_COUNT FROM CLIENT_EMAILS WHERE CREATEBY = ? AND TRUNC(CREATION_DATE) = ?
getUserReservationCount=SELECT COUNT(*) RESERVATION_COUNT FROM RESERVATION WHERE CREATED_BY = ? AND TRUNC(RESERVATION_DATE) = ?
getUserMeetingsCount=SELECT COUNT(*) MEETINGS_COUNT FROM APPOINTMENT WHERE OPTION2 LIKE '%meeting%' AND APPOINTMENT_FOR = ? AND TRUNC(CURRENT_STATUS_SINCE) = ? AND CURRENT_STATUS IN ('24', '25', '26', '29')
getClientsCount=SELECT COUNT(*) CLIENTS_COUNT FROM CLIENT WHERE CREATED_BY = ? AND TRUNC(CREATION_TIME) = ?
getUserEditCommentsCount = SELECT REGEXP_COUNT("COMMENT", 'dateStr') APP_COMMENTS_COUNT FROM APPOINTMENT WHERE APPOINTMENT_FOR = ? AND REGEXP_COUNT("COMMENT", 'dateStr') != 0 AND REGEXP_COUNT("COMMENT", 'dateStr') IS NOT NULL
getAllUsers = select * from users
