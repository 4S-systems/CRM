insertUserCompanyProject=INSERT INTO USER_COMPANY_PROJECTS VALUES(?,?,?,?,?,?,sysdate,?,?,?,null)
getAllProjectsByUserId=SELECT PROJECT_ID, PROJECT_NAME FROM USER_PROJECTS WHERE USER_ID = ? ORDER BY PROJECT_NAME ASC
getAllUserProjectIds=SELECT DISTINCT PROJECT_ID FROM USER_PROJECTS
getUserIdsByTrade=SELECT DISTINCT USER_ID FROM USER_COMPANY_PROJECTS WHERE OPTION1 = ?
getAllEngineersInProject=select uc.*, u.full_name, t.name from user_company_projects uc inner join users u on uc.user_id = u.user_id left join trade t on uc.option1 = t.id where project_id = ?
getUserIdByTradeAndProject=SELECT DISTINCT * FROM USER_COMPANY_PROJECTS WHERE OPTION1 = ? and project_id = ?
getUserFinanceProjects = select distinct uc.PROJECT_ID from user_company_projects uc inner join project p on uc.PROJECT_ID = p.PROJECT_ID where option1 = '1424619978891'  and user_id = ?
getAllUsersWithProjects1=select uc.*, u.full_name, t.name from user_company_projects uc  inner join users u on uc.user_id = u.user_id and uc.project_id like ? and uc.option1 like ? left join trade t on uc.option1 = t.id where project_id in(SELECT project_id FROM project WHERE location_type = ?)
getAllIntervals=select * from accut_intervals
getAllUsersWithProjects=select uc.*, u.full_name, t.name,st.* from user_company_projects uc  inner join users u on uc.user_id = u.user_id and uc.project_id like ? and uc.option1 like ? left join sales_targets st on uc.id=st.user_company_project_id left join trade t on uc.option1 = t.id where project_id in(SELECT project_id FROM project WHERE location_type = ?)
insertSalesTarget=INSERT INTO sales_targets VALUES (?,?,?,'UL',?,SYSDATE,?,'UL','UL','UL',0,0,0,'','')
deleteSalesTarget=Delete sales_targets where user_company_project_id=? and interval_id=?
getAllCompanyProjectsByUserId=SELECT PROJECT_ID, PROJECT_NAME FROM USER_COMPANY_PROJECTS WHERE USER_ID = ? ORDER BY PROJECT_NAME ASC