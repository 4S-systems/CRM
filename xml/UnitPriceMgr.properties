insertUnitPrice=INSERT INTO UNIT_PRICE VALUES (?,?,NULL,NULL,?,?,?,SYSDATE,?,?,?)
getLastPriceForUnit=SELECT * FROM UNIT_PRICE WHERE ID IN (SELECT MAX(ID) FROM UNIT_PRICE WHERE UNIT_ID = ?)
getProjectsTotalPrice=SELECT SUM(UP.OPTION1) PROJECT_TOTAL, P.MAIN_PROJ_ID PROJECT_ID FROM UNIT_PRICE UP LEFT JOIN PROJECT P ON UP.UNIT_ID = P.PROJECT_ID WHERE P.PROJECT_ID IS NOT NULL AND P.PROJECT_ID NOT IN (SELECT BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE STATUS_NAME = '28' AND END_DATE IS NULL) GROUP BY P.MAIN_PROJ_ID