selectIssueImages=Select d.* from ISSUE_DOCUMENT d left join CLIENT_COMPLAINTS c on d.BUSINESS_OBJ_ID = c.ID left join ISSUE i on c.ISSUE_ID = i.ID or d.BUSINESS_OBJ_ID = i.ID where DOCUMENT_META_TYPE like '%image%' AND (ISSUE_ID = issueID OR BUSINESS_OBJ_ID = issueID)
updateIssueDocument=UPDATE ISSUE_DOCUMENT SET DOCUMENT_TITLE = ?, DESCRIPTION = ?, CONFIG_ITEM_TYPE = ? WHERE DOCUMENT_ID = ?
getImageMetaData=SELECT * FROM ISSUE_DOCUMENT WHERE BUSINESS_OBJ_ID = ? AND OBJECT_TYPE = ? AND DOCUMENT_META_TYPE LIKE 'image%'
getAllImageMetaData=SELECT * FROM ISSUE_DOCUMENT WHERE BUSINESS_OBJ_ID = ? AND DOCUMENT_META_TYPE LIKE 'image%'
getDocumentCountForIssue=SELECT COUNT(*) DOCUMENT_NO FROM ISSUE_DOCUMENT WHERE BUSINESS_OBJ_ID = ? GROUP BY BUSINESS_OBJ_ID
deleteIssueDoc=delete from issue_document where document_id=?
deleteIssueDocData=delete from issue_document_data where document_id=?