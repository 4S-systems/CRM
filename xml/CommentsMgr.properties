insertComment=INSERT INTO COMMENTS values(?,?,?,?,?,?,SYSDATE,?,?,?,?,?)
deleteComment=delete from COMMENTS where id =?
updateComment=update COMMENTS set COMMENT_DESC=? ,CREATION_TIME=SYSDATE,CREATED_BY=? where id=?
getComments=SELECT * FROM COMMENTS WHERE BUSNIESS_OBJECT_ID = ? AND ((TYPE = '0') OR (TYPE = '1' AND CREATED_BY = ?) OR (TYPE = '2' AND (DESTINATION = ? OR FROM_USER = ?))) ORDER BY CREATION_TIME ASC
getCommentsByClientID =  select USERS.FULL_NAME ,comments.CREATION_TIME ,comments.COMMENT_DESC from comments INNER JOIN USERS On comments.CREATED_BY = USERS.USER_ID  where BUSNIESS_OBJECT_ID = ?
getCommentsByObjectId=SELECT * FROM (SELECT CM.BUSNIESS_OBJECT_ID, CM.CREATION_TIME, CM.COMMENT_DESC, U.FULL_NAME CREATED_BY_NAME FROM COMMENTS CM LEFT JOIN USERS U ON CM.CREATED_BY = U.USER_ID WHERE CM.BUSNIESS_OBJECT_ID = ? UNION ALL SELECT ST.BUSINESS_OBJ_ID BUSNIESS_OBJECT_ID, ST.BEGIN_DATE CREATION_TIME, ST.STATUS_NOTE COMMENT_DESC, U.FULL_NAME CREATED_BY_NAME FROM ISSUE_STATUS ST LEFT JOIN USERS U ON ST.CREATED_BY = U.USER_ID where BUSINESS_OBJ_ID = ? and status_name in ('6', '7')) ORDER BY CREATION_TIME ASC
getCommentsByObjectIdAndOption1=SELECT * FROM COMMENTS WHERE BUSNIESS_OBJECT_ID = ? AND OPTION1 = ? ORDER BY CREATION_TIME ASC
getCommentsProductions=SELECT COUNT(*) AS TOTAL, U.FULL_NAME FROM COMMENTS CM INNER JOIN CLIENT CL ON CM.BUSNIESS_OBJECT_ID = CL.SYS_ID INNER JOIN USERS U ON CM.CREATED_BY = U.USER_ID WHERE CM.CREATED_BY IN (SELECT UG.USER_ID FROM USER_GROUP UG WHERE UG.GROUP_ID = ?) AND CM.CREATION_TIME BETWEEN TO_DATE(?,'dd-MM-YYYY') AND TO_DATE(?,'dd-MM-YYYY') GROUP BY U.FULL_NAME
getCommentssByUser=SELECT COUNT(CREATION_TIME) AS TOTAL, START_DATE, END_DATE FROM (SELECT CREATION_TIME FROM COMMENTS WHERE CREATED_BY = ? AND BUSNIESS_OBJECT_ID IN (SELECT SYS_ID FROM CLIENT)) CM RIGHT JOIN (SELECT UNIQUE TRUNC((TO_DATE(?, 'dd/mm/yyyy') + ROWNUM) - 4, 'IW') + 4 AS START_DATE, TRUNC((to_date(?, 'dd/mm/yyyy') + ROWNUM) + 3, 'IW') + 3 AS END_DATE FROM DUAL CONNECT BY LEVEL <= 92) D ON TRUNC(CM.CREATION_TIME) >= D.START_DATE and TRUNC(CM.CREATION_TIME) <= END_DATE GROUP BY START_DATE, END_DATE ORDER BY START_DATE
getEmployeeComments=select cm.BUSNIESS_OBJECT_ID, cm.CREATED_BY, cm.CREATION_TIME, cm.COMMENT_DESC, cl.SYS_ID, cl.CLIENT_NO, cl."NAME" CLIENT_NAME from COMMENTS cm left join client cl on cm.BUSNIESS_OBJECT_ID = cl.SYS_ID where SYS_ID is not null and cm.CREATED_BY = ? and trunc(cm.CREATION_TIME) between ? and ? order by SYS_ID
getLastUserIssueComment=SELECT * FROM COMMENTS WHERE ID IN (SELECT MAX(ID) FROM COMMENTS WHERE CREATED_BY = ? AND BUSNIESS_OBJECT_ID = ?)
updateLastUserIssueComment=UPDATE COMMENTS SET COMMENT_DESC = ?, CREATION_TIME = SYSDATE WHERE ID = ?
getIssueComments = select busniess_object_id from comments, issue where comments.busniess_object_id = ISSUE.id and issue.ISSUE_TYPE = 'comment_hierarchy' group by busniess_object_id having count(*) > ?
getCommentResponseInterval=SELECT COMMENT1.BUSNIESS_OBJECT_ID, COMMENT1.CREATED_BY COMMENT1_CREATED_BY, COMMENT1.ID COMMENT1_ID, U1.FULL_NAME COMMENT1_CREATED_BY_NAME, COMMENT1.CREATION_TIME COMMENT1_CREATION_TIME, COMMENT1.COMMENT_DESC COMMENT1_COMMENT_DESC, COMMENT2.CREATED_BY COMMENT2_CREATED_BY, COMMENT2.ID COMMENT2_ID, U2.FULL_NAME COMMENT2_CREATED_BY_NAME, COMMENT2.CREATION_TIME COMMENT2_CREATION_TIME, COMMENT2.COMMENT_DESC COMMENT2_COMMENT_DESC, COMMENT2.CREATION_TIME - COMMENT1.CREATION_TIME DIFF, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, I.CREATION_TIME FROM (WITH ORDERED AS (SELECT ID, BUSNIESS_OBJECT_ID, CREATED_BY, CREATION_TIME, COMMENT_DESC, ROW_NUMBER() OVER (PARTITION BY BUSNIESS_OBJECT_ID ORDER BY CREATION_TIME ASC) AS RN FROM COMMENTS) SELECT * FROM ORDERED WHERE RN = 1) COMMENT1 RIGHT JOIN (WITH ORDERED AS (SELECT ID, BUSNIESS_OBJECT_ID, CREATED_BY, CREATION_TIME, COMMENT_DESC, ROW_NUMBER() OVER ( PARTITION BY BUSNIESS_OBJECT_ID ORDER BY CREATION_TIME ASC) AS RN FROM COMMENTS) SELECT * FROM ORDERED WHERE RN = 2) COMMENT2 ON COMMENT1.BUSNIESS_OBJECT_ID = COMMENT2.BUSNIESS_OBJECT_ID LEFT JOIN ISSUE I ON I.ID = COMMENT1.BUSNIESS_OBJECT_ID LEFT JOIN USERS U1 ON COMMENT1.CREATED_BY = U1.USER_ID LEFT JOIN USERS U2 ON COMMENT2.CREATED_BY = U2.USER_ID WHERE I.ISSUE_TYPE = 'comment_hierarchy' AND TRUNC(I.CREATION_TIME) BETWEEN ? AND ? ORDER BY I.CREATION_TIME
updateCommentOwner=UPDATE COMMENTS SET CREATED_BY = ? WHERE ID = ?
clientComments=select DISTINCT CLIENT.SYS_ID, CLIENT.CLIENT_NO, CLIENT.NAME, CLIENT.MOBILE, CLIENT.INTER_PHONE, CLIENT.EMAIL, CLIENT.CREATION_TIME, R.PROJECT_NAME RATE_NAME,cg.campaign_title,st.englishname from CLIENT INNER JOIN COMMENTS ON CLIENT.SYS_ID = COMMENTS.BUSNIESS_OBJECT_ID LEFT JOIN CLIENT_RATING CR ON CLIENT.SYS_ID = CR.CLIENT_ID LEFT JOIN PROJECT R ON CR.RATE_ID = R.PROJECT_ID left join client_campaign cc on CLIENT.SYS_ID = cc.client_id left join campaign cg on cc.campaign_id = cg.id left join SEASON_TYPE st on client.option3 = st.id where (COMMENTS.TYPE = 0 or COMMENTS.TYPE IS NULL) whereStatement ORDER BY CLIENT.SYS_ID
getClientGeneralComments = select * from COMMENTS where COMMENTS.TYPE = 0 and COMMENTS.DESTINATION = 'PUBLIC' and COMMENTS.BUSNIESS_OBJECT_ID = ?
getClientComments=SELECT CM.* FROM COMMENTS CM WHERE cm.busniess_object_id = ? ORDER BY CM.CREATION_TIME
getFinishCloseComments=SELECT CASE ST.STATUS_NAME WHEN '6' THEN '\u0627\u0644\u0623\u0646\u0647\u0627\u0621' ELSE '\u0627\u0644\u0623\u063a\u0644\u0627\u0642' END STATUS_NAME, CASE WHEN ST.STATUS_NOTE IS NULL OR ST.STATUS_NOTE = 'UL' THEN '\u0644\u0627\u064a\u0648\u062c\u062f' ELSE ST.STATUS_NOTE END COMMENT_DESC, CC.BUSINESS_COMP_ID, U.FULL_NAME USER_NAME, ST.BEGIN_DATE CREATION_TIME FROM ISSUE_STATUS ST RIGHT JOIN CLIENT_COMPLAINTS CC ON ST.BUSINESS_OBJ_ID = CC.ID LEFT JOIN USERS U ON ST.CREATED_BY = U.USER_ID WHERE CC.ISSUE_ID = ? AND STATUS_NAME IN ('6', '7') ORDER BY CC.BUSINESS_COMP_ID
getAllComments=SELECT CM.COMMENT_DESC, CC.BUSINESS_COMP_ID, U.FULL_NAME USER_NAME, CM.CREATION_TIME FROM COMMENTS CM JOIN CLIENT_COMPLAINTS CC ON CM.BUSNIESS_OBJECT_ID = CC.ID LEFT JOIN USERS U ON CM.CREATED_BY = U.USER_ID WHERE CC.ISSUE_ID = ?
getClientThirdComments=SELECT COMMENT1.BUSNIESS_OBJECT_ID, COMMENT1.CREATED_BY COMMENT1_CREATED_BY, COMMENT1.ID COMMENT1_ID,U1.FULL_NAME COMMENT1_CREATED_BY_NAME, COMMENT1.CREATION_TIME COMMENT1_CREATION_TIME, COMMENT1.COMMENT_DESC COMMENT1_COMMENT_DESC,COMMENT2.CREATED_BY COMMENT2_CREATED_BY, COMMENT2.ID COMMENT2_ID, U2.FULL_NAME COMMENT2_CREATED_BY_NAME, COMMENT2.CREATION_TIME COMMENT2_CREATION_TIME, COMMENT2.COMMENT_DESC COMMENT2_COMMENT_DESC, COMMENT2.CREATION_TIME - COMMENT1.CREATION_TIME DIFF, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, I.CREATION_TIME, COMMENT3.CREATED_BY COMMENT3_CREATED_BY, COMMENT3.ID COMMENT3_ID, U3.FULL_NAME COMMENT3_CREATED_BY_NAME, COMMENT3.CREATION_TIME COMMENT3_CREATION_TIME, COMMENT3.COMMENT_DESC COMMENT3_COMMENT_DESC, COMMENT3.CREATION_TIME - COMMENT2.CREATION_TIME DIFF2, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, I.CREATION_TIME, I.current_status FROM  (WITH ORDERED AS (SELECT ID, BUSNIESS_OBJECT_ID, CREATED_BY, CREATION_TIME, COMMENT_DESC, ROW_NUMBER() OVER (PARTITION BY BUSNIESS_OBJECT_ID ORDER BY CREATION_TIME ASC) AS RN FROM COMMENTS) SELECT * FROM ORDERED WHERE RN = 1) COMMENT1  RIGHT JOIN (WITH ORDERED AS (SELECT ID, BUSNIESS_OBJECT_ID, CREATED_BY, CREATION_TIME, COMMENT_DESC, ROW_NUMBER() OVER ( PARTITION BY BUSNIESS_OBJECT_ID ORDER BY CREATION_TIME ASC) AS RN FROM COMMENTS) SELECT * FROM ORDERED WHERE RN = 2) COMMENT2 ON COMMENT1.BUSNIESS_OBJECT_ID = COMMENT2.BUSNIESS_OBJECT_ID  RIGHT JOIN (WITH ORDERED AS (SELECT ID, BUSNIESS_OBJECT_ID, CREATED_BY, CREATION_TIME, COMMENT_DESC, ROW_NUMBER() OVER ( PARTITION BY BUSNIESS_OBJECT_ID ORDER BY CREATION_TIME ASC) AS RN  FROM COMMENTS) SELECT * FROM ORDERED WHERE RN = 3) COMMENT3 ON COMMENT2.BUSNIESS_OBJECT_ID = COMMENT3.BUSNIESS_OBJECT_ID  LEFT JOIN ISSUE I ON I.ID = COMMENT1.BUSNIESS_OBJECT_ID  LEFT JOIN USERS U1 ON COMMENT1.CREATED_BY = U1.USER_ID  LEFT JOIN USERS U2 ON COMMENT2.CREATED_BY = U2.USER_ID LEFT JOIN USERS U3 ON COMMENT3.CREATED_BY = U3.USER_ID WHERE I.ISSUE_TYPE = 'comment_hierarchy' AND TRUNC(I.CREATION_TIME) BETWEEN ? AND ? ORDER BY I.CREATION_TIME 
getThirdEmptyComments=SELECT COMMENT1.BUSNIESS_OBJECT_ID, COMMENT1.CREATED_BY COMMENT1_CREATED_BY, COMMENT1.ID COMMENT1_ID, U1.FULL_NAME COMMENT1_CREATED_BY_NAME, COMMENT1.CREATION_TIME COMMENT1_CREATION_TIME, COMMENT1.COMMENT_DESC COMMENT1_COMMENT_DESC, COMMENT2.CREATED_BY COMMENT2_CREATED_BY, COMMENT2.ID COMMENT2_ID, U2.FULL_NAME COMMENT2_CREATED_BY_NAME, COMMENT2.CREATION_TIME COMMENT2_CREATION_TIME, COMMENT2.COMMENT_DESC COMMENT2_COMMENT_DESC, COMMENT2.CREATION_TIME - COMMENT1.CREATION_TIME DIFF, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, I.CREATION_TIME,I.current_status FROM  (WITH ORDERED AS (SELECT ID, BUSNIESS_OBJECT_ID, CREATED_BY, CREATION_TIME, COMMENT_DESC, ROW_NUMBER() OVER (PARTITION BY BUSNIESS_OBJECT_ID ORDER BY CREATION_TIME ASC) AS RN FROM COMMENTS) SELECT * FROM ORDERED WHERE RN = 1) COMMENT1 RIGHT JOIN (WITH ORDERED AS (SELECT ID, BUSNIESS_OBJECT_ID, CREATED_BY, CREATION_TIME, COMMENT_DESC, ROW_NUMBER() OVER ( PARTITION BY BUSNIESS_OBJECT_ID ORDER BY CREATION_TIME ASC) AS RN FROM COMMENTS) SELECT * FROM ORDERED WHERE RN = 2) COMMENT2 ON COMMENT1.BUSNIESS_OBJECT_ID = COMMENT2.BUSNIESS_OBJECT_ID left JOIN (select issue.BUSINESS_ID, issue.ID, issue.current_status, issue.ISSUE_TYPE,issue.BUSINESS_ID_BY_DATE, issue.CREATION_TIME, count(comments.id) from comments inner join issue on comments.BUSNIESS_OBJECT_ID = issue.ID  group by issue.BUSINESS_ID, issue.ID, issue.current_status, issue.ISSUE_TYPE, issue.BUSINESS_ID_BY_DATE, issue.CREATION_TIME having count(comments.id) <3) I on I.ID = COMMENT1.BUSNIESS_OBJECT_ID LEFT JOIN USERS U1 ON COMMENT1.CREATED_BY = U1.USER_ID LEFT JOIN USERS U2 ON COMMENT2.CREATED_BY = U2.USER_ID LEFT JOIN ISSUE_PROJECT IP on I.ID = IP.ISSUE_ID WHERE I.ISSUE_TYPE = 'comment_hierarchy' AND IP.PROJECT_ID LIKE '%projectID%' AND TRUNC(I.CREATION_TIME) BETWEEN ? AND ? ORDER BY I.CREATION_TIME 
getFirstClientComment=SELECT C.SYS_ID, C.CLIENT_NO, C.Name, C.CREATED_BY, C.CREATION_TIME, COMMENTS.BUSNIESS_OBJECT_ID, COMMENTS.CREATED_BY CREATED_EMP, COMMENTS.ID COMMENT1_ID, COMMENTS.CREATION_TIME COMMENTS_CREATION_TIME, COMMENTS.COMMENT_DESC , U.FULL_NAME COMMENT_CREATED_BY_NAME FROM COMMENTS JOIN USERS U ON COMMENTS.CREATED_BY = U.USER_ID RIGHT JOIN (select CLIENT.SYS_ID, CLIENT.CLIENT_NO, CLIENT.Name, CLIENT.CREATED_BY, CLIENT.CREATION_TIME, comments.BUSNIESS_OBJECT_ID, count(CLIENT.SYS_ID) from CLIENT inner join COMMENTS on CLIENT.SYS_ID = COMMENTS.BUSNIESS_OBJECT_ID  where comments."TYPE" = 0 and  comments.DESTINATION = 'PUBLIC' group by CLIENT.SYS_ID, CLIENT.CLIENT_NO, CLIENT.Name, CLIENT.CREATED_BY, CLIENT.CREATION_TIME, comments.BUSNIESS_OBJECT_ID having count(COMMENTS.BUSNIESS_OBJECT_ID) <2 order by CLIENT.CLIENT_NO) C ON C.SYS_ID = COMMENTS.BUSNIESS_OBJECT_ID where TRUNC(C.CREATION_TIME) BETWEEN ? AND ? ORDER BY C.CREATION_TIME
getAllClientComments=SELECT * FROM COMMENTS WHERE BUSNIESS_OBJECT_ID = ?
getEmployeeComplaintComments=SELECT CM.BUSNIESS_OBJECT_ID, CM.CREATED_BY, CM.CREATION_TIME, CM.COMMENT_DESC, CL.SYS_ID, CL.CLIENT_NO, CL."NAME" CLIENT_NAME, CC.BUSINESS_ID, CC.ID CLIENT_COMPLAINT_ID, I.BUSINESS_ID_BY_DATE, DL.OPTION1 COMPLAINT_TITLE FROM COMMENTS CM LEFT JOIN CLIENT_COMPLAINTS CC ON CM.BUSNIESS_OBJECT_ID = CC.ID LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID RIGHT JOIN CLIENT CL ON I.URGENCY_ID = CL.SYS_ID LEFT JOIN DISTRIBUTION_LIST DL ON DL.CLIENT_COM_ID = CC.ID WHERE CM.CREATED_BY = ? AND TRUNC(CM.CREATION_TIME) BETWEEN ? AND ? ORDER BY SYS_ID
getClientFirstComment=SELECT CM.CREATION_TIME, CM.COMMENT_DESC, U.FULL_NAME COMMENTED_BY FROM COMMENTS CM LEFT JOIN USERS U ON CM.CREATED_BY = U.USER_ID WHERE CM.BUSNIESS_OBJECT_ID = ? ORDER BY CM.CREATION_TIME

getClientCommentsExcel = SELECT CM.CREATION_TIME, CM.COMMENT_DESC, U.FULL_NAME, C.CLIENT_NO, C.NAME, C.MOBILE, C.INTER_PHONE, C.EMAIL, C.CREATION_TIME addtionTime FROM COMMENTS CM LEFT JOIN USERS U ON CM.CREATED_BY = U.USER_ID LEFT JOIN CLIENT C ON CM.BUSNIESS_OBJECT_ID = C.SYS_ID whereStatement ORDER BY CM.BUSNIESS_OBJECT_ID
getCommentsOnEmployee=SELECT CT.*, CL.NAME CLIENT_NAME, U.FULL_NAME FROM_USER_NAME FROM COMMENTS CT LEFT JOIN CLIENT CL ON CT.BUSNIESS_OBJECT_ID = CL.SYS_ID LEFT JOIN USERS U ON CT.FROM_USER = U.USER_ID WHERE TRUNC(CT.CREATION_TIME) BETWEEN ? AND ? AND CT.OPTION1 = ?