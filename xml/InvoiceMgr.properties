insertInvoice=INSERT INTO INVOICE VALUES (?,?,?,?,?,?,SYSDATE,?,SYSDATE,?,?,?,?,?,?)
updateInvoice=UPDATE INVOICE SET INVOICE_DATE = ?, EXTRACT_NO = ?, OPTION1 = ? WHERE ID = ?

getInvoiceByStatus = SELECT unique I.ID, I.INVOICE_NO, I.EXTRACT_NO, I.INVOICE_DATE, I.CURRENT_STATUS_SINCE, I.CREATION_TIME, I.OPTION1, U.FULL_NAME, CC.BUSINESS_ID, CC.CREATION_TIME, CC.ISSUE_ID, C.SYS_ID, C.NAME, P.PROJECT_NAME, ST.CASE_EN, ST.CASE_AR FROM INVOICE I LEFT JOIN USERS U ON I.CREATED_BY = U.USER_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ID LEFT JOIN ISSUE ISS ON CC.ISSUE_ID = ISS.ID LEFT JOIN CLIENT C ON ISS.URGENCY_ID = C.SYS_ID LEFT JOIN CLIENT_COMPLAINTS_SLA CCS ON I.ID = CCS.ID LEFT JOIN PROJECT P ON CCS.OPTION3 = P.PROJECT_ID LEFT JOIN STATUS_TYPE ST ON I.CURRENT_STATUS = ST.ID WHERE I.CURRENT_STATUS = ?
updateInvoiceToEngApprove = UPDATE INVOICE SET CURRENT_STATUS = ? WHERE ID = ?

getAllInvoices = SELECT I.ID, I.INVOICE_NO, I.EXTRACT_NO, I.INVOICE_DATE, I.CURRENT_STATUS_SINCE, I.CREATION_TIME, I.OPTION1, U.FULL_NAME, CC.BUSINESS_ID, CC.CREATION_TIME, CC.ISSUE_ID, C.SYS_ID, C.NAME, P.PROJECT_NAME, ST.CASE_EN, ST.CASE_AR FROM INVOICE I LEFT JOIN USERS U ON I.CREATED_BY = U.USER_ID LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ID LEFT JOIN ISSUE ISS ON CC.ISSUE_ID = ISS.ID LEFT JOIN CLIENT C ON ISS.URGENCY_ID = C.SYS_ID LEFT JOIN CLIENT_COMPLAINTS_SLA CCS ON I.ID = CCS.ID LEFT JOIN PROJECT P ON CCS.OPTION3 = P.PROJECT_ID LEFT JOIN STATUS_TYPE ST ON I.CURRENT_STATUS = ST.ID
getContractorApprovedInvoices=SELECT I.BUSINESS_ID, I.INVOICE_NO, I.INVOICE_DATE, I.OPTION1 FROM INVOICE I LEFT JOIN JOB_ORDER_ITEMS JO ON I.ID = JO.COMPLAINTS_ID WHERE JO.ITEM_ID = ? AND I.CURRENT_STATUS IN ('83', '84') ORDER BY I.INVOICE_DATE
getContractorInvoices = SELECT I.*, CL.NAME, CL.MOBILE, CL.EMAIL, U.FULL_NAME, ST.CASE_EN, ST.CASE_AR FROM INVOICE I LEFT JOIN CLIENT_COMPLAINTS CC ON I.ID = CC.ID LEFT JOIN JOB_ORDER_ITEMS JOI ON CC.ID = JOI.COMPLAINTS_ID LEFT JOIN CLIENT CL ON JOI.ITEM_ID = CL.SYS_ID LEFT JOIN USERS U ON I.CREATED_BY = U.USER_ID LEFT JOIN STATUS_TYPE ST ON I.CURRENT_STATUS = ST.ID WHERE TRUNC(I.CREATION_TIME) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND CL.NAME IS NOT NULL
getContractorApprovedInvoicesN=SELECT CC.BUSINESS_ID, CC.CURRENT_STATUS_SINCE IN_DATE, CC.ISSUE_ID, SUM(CASE WHEN RID.OPTION6 = 'UL' OR RID.OPTION6 = 'NaN' THEN '0' ELSE RID.OPTION6 END) TOTAL FROM CLIENT_COMPLAINTS CC LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN REQUESTEDDOCS RD ON CC.ISSUE_ID = RD.DOC_ID LEFT JOIN REQUEST_ITEMS_DETAILS RID ON RD.REQUEST_ID = RID.ISSUE_ID WHERE CC.TICKET_TYPE = '7' AND CC.CURRENT_STATUS = '7' AND I.URGENCY_ID = ?  GROUP BY CC.BUSINESS_ID, CC.CURRENT_STATUS_SINCE, CC.ISSUE_ID
getContractorApprovedInvoices1=SELECT I.ID,I.OPTION4,I.OPTION3, I.BUSINESS_ID, I.INVOICE_NO, I.INVOICE_DATE, I.OPTION1,I.OPTION2 FROM INVOICE I LEFT JOIN JOB_ORDER_ITEMS JO ON I.ID = JO.COMPLAINTS_ID WHERE JO.ITEM_ID = ? AND I.CURRENT_STATUS IN ('83', '84') AND TRUNC(I.INVOICE_DATE) >= TO_DATE(?,'YYYY/MM/DD') AND TRUNC(I.INVOICE_DATE) <= TO_DATE(?,'YYYY/MM/DD')  union  SELECT I.ID,I.OPTION4,I.OPTION3, I.BUSINESS_ID, I.INVOICE_NO, I.INVOICE_DATE, I.OPTION1,I.OPTION2 FROM INVOICE I LEFT JOIN JOB_ORDER_ITEMS JO ON I.OPTION3 = JO.COMPLAINTS_ID WHERE JO.ITEM_ID = ? AND I.CURRENT_STATUS IN ('83', '84') AND TRUNC(I.INVOICE_DATE) >= TO_DATE(?,'YYYY/MM/DD') AND TRUNC(I.INVOICE_DATE) <= TO_DATE(?,'YYYY/MM/DD') 
