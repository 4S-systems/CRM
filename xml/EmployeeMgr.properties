insertEmployee=INSERT INTO EMPLOYEE (EMP_ID, EMP_NO, EMP_NAME, ADDRESS,HOME_PHONE,EMAIL,DEPARTMENT,HOURE_SALARY, NOTE, CREATION_TIME, CREATED_BY, GENDER, MARITAL_STATUS,EDUCATION, OPTION_1,SOCIAL_NUMBER,POSITION,WORK_START_DATE,MELATRY_STATUS, INSURANCE_NUMBER, BIRTH_DATE) VALUES (?, ?, ?, ?,?,?,?,?, ?, SYSDATE, ?, ?, ?,?,?, ?,?,?,?,?,?)
getEmpVacStatistic=select EMPLOYEE_REQUESTS.EMP_ID , users.full_name, Sum(case when EMPLOYEE_REQUESTS.REQ_ID = '1522914195709' THEN EMPLOYEE_REQUESTS.OPTION1 ELSE '0' END) as EDEP, Sum(case when EMPLOYEE_REQUESTS.REQ_ID = '1522914119534' THEN EMPLOYEE_REQUESTS.OPTION1 ELSE '0' END) as EMRGH, Sum(case when EMPLOYEE_REQUESTS.REQ_ID = '1522914237717' THEN EMPLOYEE_REQUESTS.OPTION1 ELSE '0' END) as LATT, Sum(case when EMPLOYEE_REQUESTS.REQ_ID = '1522914151406' THEN EMPLOYEE_REQUESTS.OPTION1 ELSE '0' END) as STANDARDH, Sum(case when EMPLOYEE_REQUESTS.REQ_ID = '1522914151407' THEN EMPLOYEE_REQUESTS.OPTION1 ELSE '0' END) as HEALTHVAC from EMPLOYEE_REQUESTS inner join ISSUE_STATUS on EMPLOYEE_REQUESTS.ID = ISSUE_STATUS.BUSINESS_OBJ_ID and ISSUE_STATUS.OBJECT_TYPE = 'Employee Requests' and ISSUE_STATUS.STATUS_NAME = '69' inner join users on EMPLOYEE_REQUESTS.EMP_id = users.USER_ID where EMPLOYEE_REQUESTS.EMP_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ? )) and TRUNC(EMPLOYEE_REQUESTS.From_Date) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd') group by EMPLOYEE_REQUESTS.EMP_ID, users.full_name order by EMPLOYEE_REQUESTS.EMP_ID
