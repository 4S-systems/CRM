getClientComplaintList=SELECT * FROM issue_by_complaint where entry_date between to_char(to_date(?,'DD-MM-YY'),'DD-Mon-YY') and to_char(to_date(?,'DD-MM-YY'),'DD-Mon-YY') ORDER BY group_selector
getComplaintCountPerDepartment=SELECT department_name, COUNT(client_com_id) AS complaint_count FROM issue_by_complaint GROUP BY department_name ORDER BY department_name ASC
getNotAcknowledgeComplaintsBySince=SELECT IBC.*, CMP.TICKET_TYPE FROM CLIENT_COMPLAINTS CMP INNER JOIN ISSUE_BY_COMPLAINT IBC ON CMP.ID = IBC.COMP_ID WHERE CMP.ID IN (SELECT IS1.BUSINESS_OBJ_ID FROM ISSUE_STATUS IS1 WHERE '3' NOT IN (SELECT IS2.STATUS_NAME FROM ISSUE_STATUS IS2 WHERE CMP.ID = IS2.BUSINESS_OBJ_ID)) AND CMP.CURRENT_STATUS_SINCE NOT BETWEEN SYSDATE - since/24 and SYSDATE and CMP.TICKET_TYPE in ('1', '2', '3', '4') and IBC.STATUS_CODE not in ('5', '6', '7')
getComplaintByOlderStatus=SELECT * FROM ISSUE_BY_COMPLAINT WHERE STATUS_CODE = ? AND CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.CREATED_BY = ? AND ISSUE_STATUS.STATUS_NAME = ?) AND trunc(ENTRY_DATE) BETWEEN ? AND ?
getComplaintByOlder=SELECT * FROM ISSUE_BY_COMPLAINT WHERE CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.CREATED_BY = ?) AND TRUNC(ENTRY_DATE) BETWEEN ? AND ?
getComplaintByDepartment=SELECT * FROM ISSUE_BY_COMPLAINT where STATUS_CODE IN (7,6,5,4,3,2) AND BUSINESS_COMP_ID LIKE 'depCode-%' dateCondition
getComplaintByCreatedBy=SELECT * FROM ISSUE_BY_COMPLAINT where STATUS_CODE IN (7,6,5,4,3,2) AND CREATED_BY = ? AND ENTRY_DATE BETWEEN SYSDATE - WITH_IN/24 AND SYSDATE
getComplaintsByCreatorDateComments=SELECT IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, I.CURRENT_STATUS AS ISSUE_STATUS_CODE, IC.STATUS_CODE, COUNT(C.BUSNIESS_OBJECT_ID) AS NO_COMMENTS FROM ISSUE_BY_COMPLAINT IC LEFT OUTER JOIN COMMENTS C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID LEFT OUTER JOIN ISSUE_STATUS S ON IC.ISSUE_ID = S.BUSINESS_OBJ_ID AND S.END_DATE IS NULL LEFT OUTER JOIN STATUS_TYPE ST ON S.STATUS_NAME = ST.ID LEFT JOIN ISSUE I ON IC.ISSUE_ID = I.ID WHERE IC.CREATED_BY = ? AND TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND TICKET_TYPE = ? AND CUSTOMER_ID LIKE '%contractorID%' GROUP BY IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, I.CURRENT_STATUS, ST.CASE_AR, IC.STATUS_CODE ORDER BY IC.ENTRY_DATE DESC
getComplaintsByDateComments=SELECT IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, COUNT(C.BUSNIESS_OBJECT_ID) AS NO_COMMENTS FROM ISSUE_BY_COMPLAINT IC LEFT OUTER JOIN COMMENTS C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID WHERE TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND TICKET_TYPE = ? GROUP BY IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID
getValidComplaintsByComments=SELECT IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, COUNT(C.BUSNIESS_OBJECT_ID) AS NO_COMMENTS, CS.STATUS_NOTE, ST.CASE_AR STATUS_NAME FROM ISSUE_BY_COMPLAINT IC LEFT JOIN ISSUE SU ON IC.ISSUE_ID = SU.ID LEFT OUTER JOIN COMMENTS C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID LEFT JOIN (SELECT BUSINESS_OBJ_ID, STATUS_NOTE FROM ISSUE_STATUS WHERE END_DATE IS NULL) CS ON IC.ISSUE_ID = CS.BUSINESS_OBJ_ID LEFT JOIN STATUS_TYPE ST ON SU.CURRENT_STATUS = ST.ID WHERE TICKET_TYPE = ? AND IC.ISSUE_ID NOT IN (SELECT REQUESTEDDOCS.REQUEST_ID FROM REQUESTEDDOCS) AND IC.CUSTOMER_ID = ? AND IC.STATUS_CODE in ('6', '7') AND SU.CURRENT_STATUS  in ('34', '35', '36', '40') GROUP BY IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, CS.STATUS_NOTE, ST.CASE_AR
getIssueComplaintsByComments=SELECT UNIQUE IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, COUNT(C.BUSNIESS_OBJECT_ID) AS NO_COMMENTS, CS.STATUS_NOTE, ST.CASE_AR STATUS_NAME FROM ISSUE_BY_COMPLAINT IC LEFT OUTER JOIN COMMENTS C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID LEFT JOIN (SELECT BUSINESS_OBJ_ID, STATUS_NOTE FROM ISSUE_STATUS WHERE END_DATE IS NULL) CS ON IC.ISSUE_ID = CS.BUSINESS_OBJ_ID LEFT JOIN ISSUE SU ON IC.ISSUE_ID = SU.ID LEFT JOIN STATUS_TYPE ST ON SU.CURRENT_STATUS = ST.ID WHERE TICKET_TYPE = ? AND IC.ISSUE_ID IN (SELECT REQUESTEDDOCS.REQUEST_ID FROM REQUESTEDDOCS WHERE DOC_ID = ?) GROUP BY IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, CS.STATUS_NOTE, ST.CASE_AR
getAllCaseWithinTimeAndCompliantCode=SELECT * FROM ISSUE_BY_COMPLAINT WHERE trunc(entry_date) between ? and ? whereStatement
getAllComplaintsByDateComments=SELECT IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, I.CURRENT_STATUS AS ISSUE_STATUS_CODE, IC.STATUS_CODE, COUNT(C.BUSNIESS_OBJECT_ID) AS NO_COMMENTS FROM ISSUE_BY_COMPLAINT IC LEFT OUTER JOIN COMMENTS C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID LEFT OUTER JOIN ISSUE_STATUS S ON IC.ISSUE_ID = S.BUSINESS_OBJ_ID AND S.END_DATE IS NULL LEFT OUTER JOIN STATUS_TYPE ST ON S.STATUS_NAME = ST.ID LEFT JOIN ISSUE_PROJECT IP ON IC.ISSUE_ID = IP.ISSUE_ID LEFT JOIN ISSUE I ON IC.ISSUE_ID = I.ID WHERE TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND TICKET_TYPE = ? AND CREATED_BY LIKE '%engineerID%' AND CUSTOMER_ID LIKE '%contractorID%' AND IC.ISSUE_ID IN (SELECT ISSUE_ID FROM REQUEST_ITEMS WHERE PROJECT_ID LIKE '%itemID%') AND IP.PROJECT_ID LIKE '%projectID%' GROUP BY IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, ST.ID, ST.CASE_AR, IC.STATUS_CODE, I.CURRENT_STATUS ORDER BY IC.ENTRY_DATE DESC
getAllComplaintsByUserAndStatus=SELECT I.ID ISSUE_ID, I.ISSUE_TITLE, I.CALL_TYPE, I.PROJECT_NAME, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, I.USER_ID CREATED_BY, CS.FULL_NAME CREATED_BY_NAME, CC.CREATION_TIME ENTRY_DATE, CC.BUSINESS_COMP_ID, CC.ID AS COMP_ID, CC.TICKET_TYPE, CC.CURRENT_OWNER, CC.CURRENT_OWNER_ID, CC.CURRENT_OWNER_SINCE, CU.SYS_ID AS CUSTOMER_ID, CU.NAME AS CUSTOMER_NAME, CU.AGE_GROUP AS AGE, CU.PHONE AS CLIENT_PHONE, CU.MOBILE AS CLIENT_MOBILE, CU.OPTION3 AS CLIENT_OTHER, CU.INTER_PHONE, IST.STATUS_NAME STATUS_CODE, IST.ACTION_TAKEN ACTION_TAKEN, ST.CASE_EN STATUS_EN_NAME, ST.CASE_AR STATUS_AR_NAME, CC.CREATED_BY SENDER_ID, S.USER_NAME AS SENDER_NAME, S.FULL_NAME AS SENDER_FULL_NAME, TP.TYPE_NAME, CT.TYPE_TAG,CASE WHEN cu.current_status = '12' THEN 'LEAD' ELSE 'CUSTOMER' END AS current_status FROM CLIENT_COMPLAINTS CC LEFT JOIN ISSUE I ON CC.ISSUE_ID = I.ID LEFT JOIN CLIENT CU ON I.URGENCY_ID = CU.SYS_ID LEFT JOIN TICKET_TYPE TP ON CC.TICKET_TYPE = TP.TYPE_ID LEFT JOIN ISSUE_STATUS IST ON CC.ID = IST.BUSINESS_OBJ_ID AND IST.END_DATE IS NULL LEFT JOIN STATUS_TYPE ST ON IST.STATUS_NAME = ST.ID LEFT JOIN USERS S ON CC.CREATED_BY = S.USER_ID LEFT JOIN USERS CS ON I.USER_ID = CS.USER_ID LEFT JOIN CLIENT_COMPLAINTS_TYPE CT ON CC.ID = CT.ID
getComplaintsByCrruentOwnerDateComments=SELECT IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, ST.ID AS ISSUE_STATUS_CODE, ST.CASE_AR AS ISSUE_STATUS_NAME, IC.STATUS_CODE, COUNT(C.BUSNIESS_OBJECT_ID) AS NO_COMMENTS FROM ISSUE_BY_COMPLAINT IC LEFT OUTER JOIN COMMENTS C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID LEFT OUTER JOIN ISSUE_STATUS S ON IC.ISSUE_ID = S.BUSINESS_OBJ_ID AND S.END_DATE IS NULL LEFT OUTER JOIN STATUS_TYPE ST ON S.STATUS_NAME = ST.ID WHERE IC.CURRENT_OWNER_ID = ? AND TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND TICKET_TYPE = ? GROUP BY IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, ST.ID, ST.CASE_AR, IC.STATUS_CODE ORDER BY IC.ENTRY_DATE DESC
getComplaintsWithComments=SELECT IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, ST.ID AS ISSUE_STATUS_CODE, ST.CASE_AR AS ISSUE_STATUS_NAME, IC.STATUS_CODE, COUNT(C.BUSNIESS_OBJECT_ID) AS NO_COMMENTS FROM ISSUE_BY_COMPLAINT IC LEFT OUTER JOIN COMMENTS C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID LEFT OUTER JOIN ISSUE_STATUS S ON IC.ISSUE_ID = S.BUSINESS_OBJ_ID AND S.END_DATE IS NULL LEFT OUTER JOIN STATUS_TYPE ST ON S.STATUS_NAME = ST.ID WHERE IC.CREATED_BY like ? AND TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND TICKET_TYPE in (6, 10, 11) AND C.COMMENT_DESC like ? GROUP BY IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, ST.ID, ST.CASE_AR, IC.STATUS_CODE ORDER BY IC.ENTRY_DATE DESC
getTimeAgeByDepartmentAcknow=SELECT IBC.*, CMP.TICKET_TYPE FROM CLIENT_COMPLAINTS CMP INNER JOIN ISSUE_BY_COMPLAINT IBC ON CMP.ID = IBC.COMP_ID WHERE CMP.ID IN (SELECT IS1.BUSINESS_OBJ_ID FROM ISSUE_STATUS IS1 WHERE '3' NOT IN (SELECT IS2.STATUS_NAME FROM ISSUE_STATUS IS2 WHERE CMP.ID = IS2.BUSINESS_OBJ_ID)) AND CMP.CURRENT_STATUS_SINCE NOT BETWEEN SYSDATE - since and SYSDATE AND CMP.CURRENT_OWNER_ID  IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID IN (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT_ID = ?)) and CMP.TICKET_TYPE in ('1', '2', '3', '4') and IBC.STATUS_CODE not in ('5', '6', '7')
getTimeAgeByDepartmentClose=SELECT IBC.*, CMP.TICKET_TYPE FROM CLIENT_COMPLAINTS CMP INNER JOIN ISSUE_BY_COMPLAINT IBC ON CMP.ID = IBC.COMP_ID WHERE CMP.ID IN (SELECT IS1.BUSINESS_OBJ_ID FROM ISSUE_STATUS IS1 WHERE CMP.CURRENT_STATUS != '7') AND CMP.CURRENT_STATUS_SINCE NOT BETWEEN SYSDATE - since and SYSDATE AND CMP.CURRENT_OWNER_ID  IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID IN (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT_ID = ?))
getTimeAgeByDepartmentFinish=SELECT IBC.*, CMP.TICKET_TYPE FROM CLIENT_COMPLAINTS CMP INNER JOIN ISSUE_BY_COMPLAINT IBC ON CMP.ID = IBC.COMP_ID WHERE CMP.ID IN (SELECT IS1.BUSINESS_OBJ_ID FROM ISSUE_STATUS IS1 WHERE CMP.CURRENT_STATUS not in ('6', '7')) AND CMP.CURRENT_STATUS_SINCE NOT BETWEEN SYSDATE - since and SYSDATE AND CMP.CURRENT_OWNER_ID  IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID IN (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT_ID = ?))
getComplaintsPerEmployee=SELECT * FROM (SELECT * FROM ISSUE_BY_COMPLAINT WHERE CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.CREATED_BY = ? AND ISSUE_STATUS.STATUS_NAME = '6') AND TRUNC(ENTRY_DATE) BETWEEN ? AND ? UNION SELECT UNIQUE * FROM ISSUE_BY_COMPLAINT WHERE CURRENT_OWNER_ID = ? AND ( STATUS_CODE = '4' OR STATUS_CODE ='3' OR STATUS_CODE ='2') AND RESP= '1' AND TRUNC(ENTRY_DATE) BETWEEN ? AND ?) IC  LEFT JOIN (SELECT CASE WHEN C.TOTAL_CONFIRMED IS NOT NULL THEN C.TOTAL_CONFIRMED ELSE 0 END TOTAL_CONFIRMED, CASE WHEN R.TOTAL_RESERVATION IS NOT NULL THEN R.TOTAL_RESERVATION ELSE 0 END TOTAL_RESERVATION, CASE WHEN R.CLIENT_ID IS NOT NULL THEN R.CLIENT_ID ELSE C.CLIENT_ID END CLIENT_ID FROM (SELECT COUNT(*) TOTAL_CONFIRMED, CLIENT_ID FROM RESERVATION WHERE CURRENT_STATUS = '31' AND CREATED_BY = ? GROUP BY CLIENT_ID) C FULL JOIN (SELECT COUNT(*) TOTAL_RESERVATION, CLIENT_ID FROM RESERVATION WHERE CURRENT_STATUS = '30' AND CREATED_BY = ? GROUP BY CLIENT_ID) R ON R.CLIENT_ID = C.CLIENT_ID) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID whereStatement ORDER BY ENTRY_DATE DESC

getAppointmentsPerEmp=Select current_owner_id,users.full_name,TYPE_TAG, count(CUSTOMER_ID) as total_client,sum(call) as call, sum(call_duration) as call_duration, Sum(meeting) as meeting, Sum(meeting_duration) as meeting_duration, Sum(not_answred) not_answred FROM (SELECT DISTINCT CUSTOMER_ID, CURRENT_OWNER_ID, TYPE_TAG FROM ISSUE_BY_COMPLAINT WHERE STATUS_CODE IN ('4', '3', '2', '1') AND RESP= '1' AND TRUNC(ENTRY_DATE) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) IC left outer join (select Appointment.USER_ID , users.full_name,client_id, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%'and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting' THEN Appointment.client_ID END) as meeting, Sum(case when Appointment.OPTION2 = 'meeting' THEN Appointment.CALL_DURATION END) as meeting_duration, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 in ('not answered','wrong number') THEN Appointment.client_ID END) as not_answred from Appointment inner join users on Appointment.user_id = users.USER_ID where (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting') and (trunc(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) and Appointment.user_id = ? group by Appointment.USER_ID, users.full_name, client_id order by Appointment.user_id ) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID left join users on IC.current_owner_id = users.USER_ID where TYPE_TAG in (select project_name from project where location_type = 'RQ-TYPE') and current_owner_id = ? group by current_owner_id,users.full_name, TYPE_TAG order by TYPE_TAG

getAbstAppointmentsPerEmp=Select current_owner_id,users.full_name,count(distinct CUSTOMER_ID) as total_client,sum(call) as call, sum(call_duration) as call_duration, Sum(meeting) as meeting, Sum(meeting_duration) as meeting_duration, Sum(not_answred) not_answred FROM (SELECT * FROM ISSUE_BY_COMPLAINT WHERE CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.STATUS_NAME = '6') AND TRUNC(ENTRY_DATE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') UNION SELECT UNIQUE * FROM ISSUE_BY_COMPLAINT WHERE ( STATUS_CODE = '4' OR STATUS_CODE ='3' OR STATUS_CODE ='2') AND RESP= '1' AND TRUNC(ENTRY_DATE) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) IC left outer join (select Appointment.USER_ID , users.full_name,client_id, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%'and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting' THEN Appointment.client_ID END) as meeting, Sum(case when Appointment.OPTION2 = 'meeting' THEN Appointment.CALL_DURATION END) as meeting_duration, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 in ('not answered','wrong number') THEN Appointment.client_ID END) as not_answred from Appointment inner join users on Appointment.user_id = users.USER_ID where (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting') and trunc(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') group by Appointment.USER_ID, users.full_name, client_id order by Appointment.user_id ) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID left join users on IC.current_owner_id = users.USER_ID where IC.current_owner_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and TYPE_TAG in (SELECT PROJECT_NAME FROM PROJECT WHERE LOCATION_TYPE = 'RQ-TYPE') group by current_owner_id,users.full_name 

getAppointmentsPerEmpDetails=SELECT CUSTOMER_ID, customer_name,sum(call) as call, sum(call_duration) as call_duration, Sum(meeting) as meeting, Sum(meeting_duration) as meeting_duration, Sum(not_answred) not_answred FROM (SELECT * FROM ISSUE_BY_COMPLAINT WHERE CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.CREATED_BY = ? AND ISSUE_STATUS.STATUS_NAME = '6') AND TRUNC(ENTRY_DATE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') UNION SELECT UNIQUE * FROM ISSUE_BY_COMPLAINT WHERE CURRENT_OWNER_ID = ? AND ( STATUS_CODE = '4' OR STATUS_CODE ='3' OR STATUS_CODE ='2') AND RESP= '1' AND TRUNC(ENTRY_DATE) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) IC left outer join (select Appointment.USER_ID , users.full_name,client_id, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%'and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting' THEN Appointment.client_ID END) as meeting, Sum(case when Appointment.OPTION2 = 'meeting' THEN Appointment.CALL_DURATION END) as meeting_duration, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 in ('not answered','wrong number') THEN Appointment.client_ID END) as not_answred from Appointment inner join users on Appointment.user_id = users.USER_ID where (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting') and trunc(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') group by Appointment.USER_ID, users.full_name, client_id order by Appointment.user_id ) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID left join users on IC.current_owner_id = users.USER_ID where current_owner_id = ? and TYPE_TAG = ? group by CUSTOMER_ID, customer_name

getAllComplaintsByDateLastCommenter=SELECT UNIQUE IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, IC.STATUS_CODE, C.CREATED_BY AS LAST_COMMENTER_ID, C.CREATION_TIME LAST_COMMENT_DATE, P.PROJECT_NAME AS NAME_OF_PROJECT, EU.FULL_NAME AS ENGINEER_NAME, I.CURRENT_STATUS ISSUE_STATUS, C.COMMENT_COUNT AS NO_COMMENTS FROM ISSUE_BY_COMPLAINT IC LEFT OUTER JOIN (SELECT C.*, M.COMMENT_COUNT FROM COMMENTS C LEFT JOIN (SELECT COUNT(*) COMMENT_COUNT, BUSNIESS_OBJECT_ID FROM COMMENTS GROUP BY BUSNIESS_OBJECT_ID) M ON C.BUSNIESS_OBJECT_ID = M.BUSNIESS_OBJECT_ID WHERE ID IN (SELECT MAX(ID) FROM COMMENTS GROUP BY BUSNIESS_OBJECT_ID)) C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID LEFT JOIN ISSUE_PROJECT IP ON IC.ISSUE_ID = IP.ISSUE_ID LEFT JOIN PROJECT P ON IP.PROJECT_ID = P.PROJECT_ID LEFT JOIN USERS EU ON IC.CREATED_BY = EU.USER_ID LEFT JOIN ISSUE I ON IC.ISSUE_ID = I.ID WHERE TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND TICKET_TYPE = ? AND IC.CREATED_BY LIKE '%engineerID%' AND CUSTOMER_ID LIKE '%contractorID%' AND IC.ISSUE_ID IN (SELECT ISSUE_ID FROM REQUEST_ITEMS WHERE PROJECT_ID LIKE '%itemID%') AND IP.PROJECT_ID LIKE '%projectID%' AND I.CURRENT_STATUS LIKE '%statusOfIssue%' ORDER BY IC.ENTRY_DATE DESC
getAllEmployeeComplaints=SELECT UNIQUE * FROM ISSUE_BY_COMPLAINT_UNIQUE WHERE (RECEIP_ID = ?)
getOverallPerformance=SELECT COUNT(I.CURRENT_STATUS) TOTAL_NO, I.CURRENT_STATUS ISSUE_STATUS FROM ISSUE_BY_COMPLAINT IC LEFT OUTER JOIN (SELECT * FROM COMMENTS WHERE ID IN (SELECT MAX(ID) FROM COMMENTS GROUP BY BUSNIESS_OBJECT_ID)) C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID LEFT JOIN ISSUE_PROJECT IP ON IC.ISSUE_ID = IP.ISSUE_ID LEFT JOIN PROJECT P ON IP.PROJECT_ID = P.PROJECT_ID LEFT JOIN USERS EU ON IC.CREATED_BY = EU.USER_ID LEFT JOIN ISSUE I ON IC.ISSUE_ID = I.ID WHERE TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND TICKET_TYPE = ? AND IC.CREATED_BY LIKE '%engineerID%' AND CUSTOMER_ID LIKE '%contractorID%' AND IC.ISSUE_ID IN (SELECT ISSUE_ID FROM REQUEST_ITEMS WHERE PROJECT_ID LIKE '%itemID%') AND IP.PROJECT_ID LIKE '%projectID%' GROUP BY I.CURRENT_STATUS
getAllComplaintsByDateLastCommenterFinance=SELECT UNIQUE IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, IC.STATUS_CODE, C.CREATED_BY AS LAST_COMMENTER_ID, P.PROJECT_NAME AS NAME_OF_PROJECT, EU.FULL_NAME AS ENGINEER_NAME, I.CURRENT_STATUS ISSUE_STATUS, C.COMMENT_COUNT AS NO_COMMENTS FROM ISSUE_BY_COMPLAINT IC LEFT OUTER JOIN (SELECT C.*, M.COMMENT_COUNT FROM COMMENTS C LEFT JOIN (SELECT COUNT(*) COMMENT_COUNT, BUSNIESS_OBJECT_ID FROM COMMENTS GROUP BY BUSNIESS_OBJECT_ID) M ON C.BUSNIESS_OBJECT_ID = M.BUSNIESS_OBJECT_ID WHERE ID IN (SELECT MAX(ID) FROM COMMENTS GROUP BY BUSNIESS_OBJECT_ID)) C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID LEFT JOIN ISSUE_PROJECT IP ON IC.ISSUE_ID = IP.ISSUE_ID LEFT JOIN PROJECT P ON IP.PROJECT_ID = P.PROJECT_ID LEFT JOIN USERS EU ON IC.CREATED_BY = EU.USER_ID LEFT JOIN ISSUE I ON IC.ISSUE_ID = I.ID WHERE TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND TICKET_TYPE = ? AND IC.CREATED_BY LIKE '%engineerID%' AND CUSTOMER_ID LIKE '%contractorID%' AND IC.ISSUE_ID IN (SELECT ISSUE_ID FROM REQUEST_ITEMS WHERE PROJECT_ID LIKE '%itemID%') AND IP.PROJECT_ID LIKE '%projectID%' AND I.CURRENT_STATUS IN ('34', '35', '36', '40') ORDER BY IC.ENTRY_DATE DESC
getClientRequestsByComments=SELECT UNIQUE IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, COUNT(C.BUSNIESS_OBJECT_ID) AS NO_COMMENTS, CS.STATUS_NOTE, ST.CASE_AR STATUS_NAME FROM ISSUE_BY_COMPLAINT IC LEFT OUTER JOIN COMMENTS C ON IC.ISSUE_ID = C.BUSNIESS_OBJECT_ID LEFT JOIN (SELECT BUSINESS_OBJ_ID, STATUS_NOTE FROM ISSUE_STATUS WHERE END_DATE IS NULL) CS ON IC.ISSUE_ID = CS.BUSINESS_OBJ_ID LEFT JOIN ISSUE SU ON IC.ISSUE_ID = SU.ID LEFT JOIN STATUS_TYPE ST ON SU.CURRENT_STATUS = ST.ID WHERE TICKET_TYPE in ('6') and IC.CUSTOMER_ID = ? GROUP BY IC.ISSUE_ID, IC.ISSUE_TITLE, IC.PROJECT_NAME, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, CS.STATUS_NOTE, ST.CASE_AR
getAllProcurementRequests=SELECT UNIQUE IC.ISSUE_ID, IC.ISSUE_TITLE, IC.BUSINESS_ID, IC.BUSINESS_ID_BY_DATE, IC.BUSINESS_COMP_ID, IC.COMP_ID, IC.CURRENT_OWNER, IC.CURRENT_OWNER_ID, IC.CURRENT_OWNER_SINCE, IC.CUSTOMER_ID, IC.CUSTOMER_NAME, IC.USER_ID, IC.USER_NAME, IC.FULL_NAME, IC.SENDER_ID, IC.SENDER_NAME, IC.ENTRY_DATE, IC.RECEIP_ID, IC.CLIENT_COM_ID, IC.STATUS_AR_NAME, IC.STATUS_CODE, I.CURRENT_STATUS ISSUE_STATUS, IP.PROJECT_ID REQUEST_TYPE, IP.OPTION2 REQUEST_CODE FROM ISSUE_BY_COMPLAINT IC LEFT JOIN ISSUE_PROJECT IP ON IC.ISSUE_ID = IP.ISSUE_ID LEFT JOIN USERS EU ON IC.CREATED_BY = EU.USER_ID LEFT JOIN ISSUE I ON IC.ISSUE_ID = I.ID WHERE TRUNC(ENTRY_DATE) BETWEEN TO_DATE(?,'DD-MM-YY') AND TO_DATE(?,'DD-MM-YY') AND TICKET_TYPE = ? AND IC.ISSUE_ID IN (SELECT ISSUE_ID FROM REQUEST_ITEMS WHERE PROJECT_ID LIKE '%itemID%') ORDER BY IC.ENTRY_DATE DESC
getAppntsTagPerEmp=Select current_owner_id,users.full_name,count(case when TYPE_TAG = 'Inbound' THEN TYPE_TAG END) as Inbound, count(case when TYPE_TAG = 'Visit' THEN TYPE_TAG END) as Visit, count(case when TYPE_TAG = 'Outbound' THEN TYPE_TAG END) as Outbound, count(case when TYPE_TAG = 'Recycle Data' THEN TYPE_TAG END) as Recycle_Data FROM (SELECT * FROM ISSUE_BY_COMPLAINT WHERE CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.STATUS_NAME = '6') AND TRUNC(ENTRY_DATE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') UNION SELECT UNIQUE * FROM ISSUE_BY_COMPLAINT WHERE ( STATUS_CODE = '4' OR STATUS_CODE ='3' OR STATUS_CODE ='2') AND RESP= '1' AND TRUNC(ENTRY_DATE) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) IC left outer join (select Appointment.USER_ID , users.full_name,client_id, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%'and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting' THEN Appointment.client_ID END) as meeting, Sum(case when Appointment.OPTION2 = 'meeting' THEN Appointment.CALL_DURATION END) as meeting_duration, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 in ('not answered','wrong number') THEN Appointment.client_ID END) as not_answred from Appointment inner join users on Appointment.user_id = users.USER_ID where (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting') and trunc(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') group by Appointment.USER_ID, users.full_name, client_id order by Appointment.user_id ) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID left join users on IC.current_owner_id = users.USER_ID where IC.current_owner_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and TYPE_TAG in ('Inbound','Visit','Outbound','Recycle Data') and current_owner_id = ? group by current_owner_id,users.full_name
getAppntsTagPerDept=Select current_owner_id,users.full_name CountTypeTag FROM (SELECT DISTINCT CUSTOMER_ID, CURRENT_OWNER_ID, TYPE_TAG FROM ISSUE_BY_COMPLAINT WHERE STATUS_CODE IN ('4', '3', '2', '1') AND RESP= '1' AND TRUNC(ENTRY_DATE) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) IC left outer join (select Appointment.USER_ID , users.full_name,client_id, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%'and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting' THEN Appointment.client_ID END) as meeting, Sum(case when Appointment.OPTION2 = 'meeting' THEN Appointment.CALL_DURATION END) as meeting_duration, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 in ('not answered','wrong number') THEN Appointment.client_ID END) as not_answred from Appointment inner join users on Appointment.user_id = users.USER_ID where (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting') and trunc(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') group by Appointment.USER_ID, users.full_name, client_id order by Appointment.user_id ) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID and RS.USER_ID = IC.current_owner_id left join users on IC.current_owner_id = users.USER_ID where IC.current_owner_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and TYPE_TAG in (select project_name from project where location_type = 'RQ-TYPE') group by current_owner_id,users.full_name

getAppointmentsPerEmpDetails_old=SELECT CUSTOMER_ID, customer_name,sum(call) as call, sum(call_duration) as call_duration, Sum(meeting) as meeting, Sum(meeting_duration) as meeting_duration, Sum(not_answred) not_answred FROM (SELECT * FROM ISSUE_BY_COMPLAINT WHERE CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.CREATED_BY = ? AND ISSUE_STATUS.STATUS_NAME = '6') AND TRUNC(ENTRY_DATE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') UNION SELECT UNIQUE * FROM ISSUE_BY_COMPLAINT WHERE CURRENT_OWNER_ID = ? AND ( STATUS_CODE = '4' OR STATUS_CODE ='3' OR STATUS_CODE ='2') AND RESP= '1' AND TRUNC(ENTRY_DATE) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) IC left outer join (select Appointment.USER_ID , users.full_name,client_id, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%'and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting' THEN Appointment.client_ID END) as meeting, Sum(case when Appointment.OPTION2 = 'meeting' THEN Appointment.CALL_DURATION END) as meeting_duration, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 in ('not answered','wrong number') THEN Appointment.client_ID END) as not_answred from Appointment inner join users on Appointment.user_id = users.USER_ID where (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting') and trunc(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') group by Appointment.USER_ID, users.full_name, client_id order by Appointment.user_id ) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID left join users on IC.current_owner_id = users.USER_ID where IC.current_owner_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and TYPE_TAG = ? group by CUSTOMER_ID, customer_name

getEmpDistCalls=SELECT COUNT(CASE WHEN OPTION9 IN ('answered') THEN CUSTOMER_ID END) AS ANSWERED, COUNT(CASE WHEN OPTION9 IN ('wrong number','not answered') THEN CUSTOMER_ID END) AS NOT_ANSWERED, COUNT(CASE WHEN OPTION9 is null or OPTION9 = 'UL' THEN CUSTOMER_ID END) AS PLANED_CALLS FROM (SELECT * FROM ISSUE_BY_COMPLAINT WHERE CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.CREATED_BY = ? AND ISSUE_STATUS.STATUS_NAME = '6') AND TRUNC(ENTRY_DATE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') UNION SELECT UNIQUE * FROM ISSUE_BY_COMPLAINT WHERE CURRENT_OWNER_ID = ? AND ( STATUS_CODE = '4' OR STATUS_CODE ='3' OR STATUS_CODE ='2') AND RESP= '1' AND TRUNC(ENTRY_DATE) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) IC inner join (select Appointment.USER_ID, client_id,option9 from Appointment where (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting') and trunc(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') order by Appointment.user_id ) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID and RS.USER_ID = IC.current_owner_id left join users on IC.current_owner_id = users.USER_ID where current_owner_id = ? and TYPE_TAG = ?
getEmpDistCallsDetails=SELECT RS.Name, RS.Client_ID, RS.APPOINTMENT_DATE, RS."COMMENT", RS.CALL_DURATION, RS.Note FROM (SELECT * FROM ISSUE_BY_COMPLAINT WHERE CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.CREATED_BY = ? AND ISSUE_STATUS.STATUS_NAME = '6') AND TRUNC(ENTRY_DATE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') UNION SELECT UNIQUE * FROM ISSUE_BY_COMPLAINT WHERE CURRENT_OWNER_ID = ? AND ( STATUS_CODE = '4' OR STATUS_CODE ='3' OR STATUS_CODE ='2') AND RESP= '1' AND TRUNC(ENTRY_DATE) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) IC inner join (select Appointment.USER_ID, Client.NAME, Appointment.CLIENT_ID, Appointment.APPOINTMENT_DATE, Appointment."COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE From Appointment inner join Client on Appointment.CLIENT_ID = Client.SYS_ID where (Appointment.option2 like '%call%') and trunc(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') order by Appointment.user_id ) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID and RS.USER_ID = IC.current_owner_id left join users on IC.current_owner_id = users.USER_ID where current_owner_id = ? and TYPE_TAG = ? Option9Cond
getEmpDistMeeting=SELECT count(case when current_status = '26' THEN client_id END) AS Sccuess, count(case when current_status IN('23','24','25','27') THEN client_id END) AS Fail FROM (SELECT * FROM ISSUE_BY_COMPLAINT WHERE CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.CREATED_BY = ? AND ISSUE_STATUS.STATUS_NAME = '6') AND TRUNC(ENTRY_DATE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') UNION SELECT UNIQUE * FROM ISSUE_BY_COMPLAINT WHERE CURRENT_OWNER_ID = ? AND ( STATUS_CODE = '4' OR STATUS_CODE ='3' OR STATUS_CODE ='2') AND RESP= '1' AND TRUNC(ENTRY_DATE) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) IC inner join (select Appointment.USER_ID, client_id, current_status from Appointment where Appointment.option2 = 'meeting' and trunc(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') order by Appointment.user_id ) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID and RS.USER_ID = IC.current_owner_id inner join users on IC.current_owner_id = users.USER_ID where current_owner_id = ? and TYPE_TAG = ?
getEmpDistMeetingDetails=SELECT RS.Name, RS.Client_ID, RS.APPOINTMENT_DATE, RS."COMMENT", RS.CALL_DURATION, RS.Note, RS.current_status FROM (SELECT * FROM ISSUE_BY_COMPLAINT WHERE CLIENT_COM_ID IN (SELECT ISSUE_STATUS.BUSINESS_OBJ_ID FROM ISSUE_STATUS WHERE ISSUE_STATUS.CREATED_BY = ? AND ISSUE_STATUS.STATUS_NAME = '6') AND TRUNC(ENTRY_DATE) BETWEEN to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') UNION SELECT UNIQUE * FROM ISSUE_BY_COMPLAINT WHERE CURRENT_OWNER_ID = ? AND ( STATUS_CODE = '4' OR STATUS_CODE ='3' OR STATUS_CODE ='2') AND RESP= '1' AND TRUNC(ENTRY_DATE) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd')) IC inner join (select Appointment.USER_ID, Client.NAME, Appointment.CLIENT_ID, Appointment.APPOINTMENT_DATE, Appointment."COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE, Appointment.current_status From Appointment inner join Client on Appointment.CLIENT_ID = Client.SYS_ID where Appointment.option2 = 'meeting' and trunc(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') AND to_date(?,'yyyy/mm/dd') order by Appointment.user_id ) RS ON RS.CLIENT_ID = IC.CUSTOMER_ID and RS.USER_ID = IC.current_owner_id left join users on IC.current_owner_id = users.USER_ID where current_owner_id = ? and TYPE_TAG = ? currentStatusCond

srchJobOrderByBusId = SELECT ISS.URGENCY_ID, CC.ID FROM ISSUE ISS LEFT JOIN CLIENT_COMPLAINTS CC ON ISS.ID = CC.ISSUE_ID WHERE ISS.BUSINESS_ID = ?