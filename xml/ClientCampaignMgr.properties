saveClientCampaigns=INSERT INTO CLIENT_CAMPAIGN VALUES (?,?,?,?,?,?,?,SYSDATE)
saveSourceClient=INSERT INTO CLIENT_SOURCE VALUES (?,?,SYSDATE)
getCampaignsByClient=SELECT c.id, c.CAMPAIGN_TITLE, cc.REFERENCE, cc.BUSINESS_OBJ_ID, cc.BUSINESS_OBJ_TYPE, cc.CREATION_TIME, u.FULL_NAME CREATED_BY_NAME FROM CLIENT_CAMPAIGN cc right join CAMPAIGN c on cc.CAMPAIGN_ID = c.ID left join users u on cc.CREATED_BY = u.USER_ID where cc.CLIENT_ID = ?
deleteOldClientCampaigns=delete from CLIENT_CAMPAIGN where CLIENT_ID = ?
getClientsByCampaign=select distinct c.CLIENT_NO, c.NAME, c.CREATED_BY, c.SYS_ID, c.MOBILE, c.INTER_PHONE from CLIENT c, CLIENT_CAMPAIGN cc where c.SYS_ID=cc.CLIENT_ID and cc.CAMPAIGN_ID = ?
deleteClientsCampaign=DELETE FROM CLIENT_CAMPAIGN WHERE CLIENT_ID IN (clientIDs) AND CAMPAIGN_ID = ?
getRepeatedCampaigns=SELECT COUNT(*) CAMPAIGN_COUNT, CC.CLIENT_ID, C.NAME, C.MOBILE, C.PHONE, C.INTER_PHONE FROM CLIENT_CAMPAIGN CC LEFT JOIN CLIENT C ON CC.CLIENT_ID = C.SYS_ID whereStatement GROUP BY CC.CLIENT_ID, C.NAME, C.MOBILE, C.PHONE, C.INTER_PHONE
updateClientCampaign=UPDATE CLIENT_CAMPAIGN SET CAMPAIGN_ID = ? WHERE CLIENT_ID = ? AND CAMPAIGN_ID = ?

getCampaignWboByClientList = SELECT c.id, cc.ID clntCmpID, c.CAMPAIGN_TITLE, cc.REFERENCE, cc.BUSINESS_OBJ_ID, cc.BUSINESS_OBJ_TYPE, cc.CREATION_TIME, u.FULL_NAME CREATED_BY_NAME FROM CLIENT_CAMPAIGN cc right join CAMPAIGN c on cc.CAMPAIGN_ID = c.ID left join users u on cc.CREATED_BY = u.USER_ID where cc.CLIENT_ID = ? AND cc.CAMPAIGN_ID = ? 

removeClientCampaign = DELETE FROM CLIENT_CAMPAIGN WHERE ID IN (clntCmpIDStr)