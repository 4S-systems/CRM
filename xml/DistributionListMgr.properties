getDistributionListInfoByComplaintId=SELECT * FROM DISTRIBUTION_LIST WHERE SYS_ID = (SELECT MAX(SYS_ID) FROM DISTRIBUTION_LIST WHERE CLIENT_COM_ID = ? AND RESP_CONTEXT = '1')
getLastOwnerForComp=SELECT RECEIP_ID from distribution_list where SYS_ID =(select max(TO_NUMBER(SYS_ID)) FROM distribution_list where RESP_CONTEXT = '1' and CLIENT_COM_ID= ?)
getComplaintPerProject=select count(option1) complaint_count, option1 complaint from (select i.ID issue_id, cc.ID complaint_id, i.URGENCY_ID client_id, i.CREATION_TIME issue_date, cc.PRODUCT_CATEGORY_ID, cc.TICKET_TYPE from CLIENT_COMPLAINTS cc left join issue i on i.ID = cc.ISSUE_ID) cc inner join (select min(DISTRIBUTION_LIST.RECEIVE_DATE), CLIENT_COM_ID, OPTION1 from DISTRIBUTION_LIST group by CLIENT_COM_ID, OPTION1 order by CLIENT_COM_ID) d on cc.complaint_id = d.CLIENT_COM_ID where PRODUCT_CATEGORY_ID = ? AND cc.TICKET_TYPE = ? where_between_date group by option1
getProjectPerformance=select count(SERV_LEVEL_AGR) complaint_count, SERV_LEVEL_AGR urgency from (select i.ID issue_id, cc.ID complaint_id, i.URGENCY_ID client_id, i.CREATION_TIME issue_date, cc.PRODUCT_CATEGORY_ID, cc.TICKET_TYPE, cc.SERV_LEVEL_AGR from CLIENT_COMPLAINTS cc left join issue i on i.ID = cc.ISSUE_ID where SERV_LEVEL_AGR in ('1', '2')) cc inner join (select min(DISTRIBUTION_LIST.RECEIVE_DATE), CLIENT_COM_ID, OPTION1 from DISTRIBUTION_LIST group by CLIENT_COM_ID, OPTION1 order by CLIENT_COM_ID) d on cc.complaint_id = d.CLIENT_COM_ID where cc.TICKET_TYPE = ? where_project_and_between_date group by SERV_LEVEL_AGR
getLastResponsibleEmployee=SELECT RECEIP_ID FROM DISTRIBUTION_LIST WHERE SYS_ID = (SELECT MAX(DL.SYS_ID) FROM DISTRIBUTION_LIST DL WHERE DL.CLIENT_COM_ID = (SELECT MAX(CC.ID) FROM CLIENT_COMPLAINTS CC WHERE CC.ISSUE_ID IN (SELECT ISSUE.ID FROM ISSUE WHERE ISSUE.URGENCY_ID = ?)))
updateResponsible=UPDATE DISTRIBUTION_LIST SET RECEIP_ID = ?, RECEIVE_DATE = SYSDATE, OPTION1 = OPTION1 WHERE SYS_ID IN (SELECT MAX(SYS_ID) FROM DISTRIBUTION_LIST WHERE CLIENT_COM_ID = ?) AND RESP_CONTEXT = '1'

updateMgr = UPDATE DISTRIBUTION_LIST SET SENDER_ID = ? WHERE SENDER_ID = ? AND RECEIP_ID = ?
updateSenderManager=UPDATE DISTRIBUTION_LIST SET SENDER_ID = ? WHERE RECEIP_ID = ?
updateRecipientManager=UPDATE DISTRIBUTION_LIST DL SET DL.RECEIP_ID = ? WHERE DL.CLIENT_COM_ID IN (SELECT CLIENT_COM_ID FROM DISTRIBUTION_LIST WHERE RECEIP_ID = ?) AND DL.RECEIP_ID != ?
getDistributionListByIssueID=SELECT * FROM DISTRIBUTION_LIST WHERE CLIENT_COM_ID IN (SELECT ID FROM CLIENT_COMPLAINTS WHERE ISSUE_ID = ?)
updateSenderManagerN = UPDATE EMP_MGR SET MGR_ID = ? WHERE EMP_ID = ?