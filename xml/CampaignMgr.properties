insertCampaign=INSERT INTO CAMPAIGN VALUES (?,?,?,?,?,?,?,?,?,?,SYSDATE,?,SYSDATE,?)
getCampaignStatus=SELECT * FROM STATUS_TYPE WHERE ID = ? AND BUSINESS_TYPE = 'Campaign'
updateCampaignStatus=UPDATE CAMPAIGN SET CURRENT_STATUS = ?, CURRENT_STATUS_SINCE = SYSDATE WHERE ID = ?
updateCampaignFromDate=UPDATE CAMPAIGN SET FROM_DATE = ? WHERE ID = ?
updateCampaignToDate=UPDATE CAMPAIGN SET TO_DATE = ? WHERE ID = ?
updateCampaignCost=UPDATE CAMPAIGN SET COST = ? WHERE ID = ?
updateCampaignObjective=UPDATE CAMPAIGN SET OBJECTIVE = ? WHERE ID = ?
updateCampaignDirection=UPDATE CAMPAIGN SET DIRECTION = ? WHERE ID = ?
getAllSubCampaigns=SELECT * FROM CAMPAIGN WHERE PARENT_ID IN (SELECT ID FROM CAMPAIGN WHERE CURRENT_STATUS IN ('16', '20'))
activeCampaignClientsReport=SELECT A.*, CASE WHEN B.SOLD_COUNT IS NOT NULL THEN B.SOLD_COUNT ELSE 0 END SOLD_COUNT FROM (SELECT COUNT(CLIENT_NO) CLIENT_COUNT, CP.CAMPAIGN_TITLE, CP.ID FROM CLIENT C, (SELECT DISTINCT CLIENT_ID, CAMPAIGN_ID FROM CLIENT_CAMPAIGN whereStatement) CC, CAMPAIGN CP WHERE C.SYS_ID = CC.CLIENT_ID AND CC.CAMPAIGN_ID = CP.ID AND CP.CURRENT_STATUS = '16' GROUP BY CP.CAMPAIGN_TITLE, CP.ID) A LEFT JOIN (SELECT COUNT(CLIENT_NO) SOLD_COUNT, CP.CAMPAIGN_TITLE, CP.ID FROM CLIENT C, (SELECT DISTINCT CLIENT_ID, CAMPAIGN_ID FROM CLIENT_CAMPAIGN whereStatement) CC, CAMPAIGN CP WHERE C.SYS_ID = CC.CLIENT_ID AND CC.CAMPAIGN_ID = CP.ID AND CP.CURRENT_STATUS = '16' AND C.SYS_ID IN (SELECT CLIENT_PROJECTS.CLIENT_ID FROM CLIENT_PROJECTS WHERE CLIENT_PROJECTS.PRODUCT_ID = 'purche') GROUP BY CP.CAMPAIGN_TITLE, CP.ID) B ON A.ID = B.ID
updatesubCampDate = update CAMPAIGN set FROM_DATE = (select FROM_DATE from CAMPAIGN where ID = ?), TO_DATE = (select TO_DATE from CAMPAIGN where ID = ?), CURRENT_STATUS_SINCE = ?, CREATION_TIME = ? where PARENT_ID = ?
deleteSubCamp = DELETE FROM CAMPAIGN WHERE ID = ? AND ID NOT IN (SELECT CAMPAIGN_ID FROM CLIENT_CAMPAIGN)
campaignClientsReport_old=select count(CLIENT_NO) CLIENT_COUNT, cp.CAMPAIGN_TITLE, cp.ID from CLIENT c, CLIENT_CAMPAIGN cc, CAMPAIGN cp where c.SYS_ID=cc.CLIENT_ID and cc.CAMPAIGN_ID = cp.ID
campaignClientsReport=select count(c.CLIENT_NO) CLIENT_COUNT, cp.ID, cp.CAMPAIGN_TITLE from CLIENT c inner join CLIENT_CAMPAIGN cc  on c.SYS_ID = cc.CLIENT_ID inner join CAMPAIGN cp on  cc.CAMPAIGN_ID = cp.ID LEFT JOIN SEASON_TYPE ST on C.OPTION3 = ST.ID LEFT JOIN ISSUE I ON C.SYS_ID = I.URGENCY_ID LEFT JOIN CLIENT_COMPLAINTS CL ON CL.ISSUE_ID = I.ID WHERE CL.CURRENT_STATUS NOT IN ('5', '6', '7')
campaignCampClientsReport=SELECT A.*, CASE WHEN B.SOLD_COUNT IS NOT NULL THEN B.SOLD_COUNT ELSE 0 END SOLD_COUNT FROM (SELECT COUNT(CLIENT_NO) CLIENT_COUNT, CP.ID, CP.CAMPAIGN_TITLE FROM CLIENT C INNER JOIN (SELECT DISTINCT CLIENT_ID, CAMPAIGN_ID FROM CLIENT_CAMPAIGN whereStatement) CC  ON C.SYS_ID = CC.CLIENT_ID INNER JOIN CAMPAIGN CP ON  CC.CAMPAIGN_ID = CP.ID GROUP BY CP.ID, CP.CAMPAIGN_TITLE) A LEFT JOIN (SELECT COUNT(CLIENT_NO) SOLD_COUNT, CP.ID, CP.CAMPAIGN_TITLE FROM CLIENT C INNER JOIN (SELECT DISTINCT CLIENT_ID, CAMPAIGN_ID FROM CLIENT_CAMPAIGN whereStatement) CC  ON C.SYS_ID = CC.CLIENT_ID INNER JOIN CAMPAIGN CP ON  CC.CAMPAIGN_ID = CP.ID GROUP BY CP.ID, CP.CAMPAIGN_TITLE) B ON A.ID = B.ID

getProjectCampaign = SELECT ID, CAMPAIGN_TITLE, FROM_DATE, TO_DATE, COST, OBJECTIVE FROM CAMPAIGN WHERE ID IN ( SELECT CAMPAIGN_ID FROM CAMPAIGN_PROJECT WHERE PROJECT_ID IN ( SELECT PROJECT_ID FROM PROJECT_ZONE WHERE ZONE_ID = ?)) 
campaignStatistics=SELECT DISTINCT campaign.ID, campaign.campaign_title, RECORD_SEASON.ENGLISH_NAME Tool_Name, campaign.cost, campaign.objective, campaign.parent_id, p.project_id, p.PROJECT_NAME, InboundTotal, OutboundTotal, InboundTotal+OutboundTotal AS Total_Clients FROM campaign left JOIN client_campaign ON campaign.ID = client_campaign.CAMPAIGN_ID left JOIN client ON CLIENT_CAMPAIGN.client_id = client.sys_id left JOIN (SELECT client_campaign.campaign_id, count(CASE WHEN client.CREATED_BY = '323' or client.CREATED_BY = '324' or client.CREATED_BY = '360' or client.CREATED_BY = '361' or client.CREATED_BY = '384' or client.CREATED_BY = '200' or client.CREATED_BY = '201' or client.CREATED_BY = '227' THEN client.sys_id END) OutboundTotal, count(CASE WHEN client.CREATED_BY != '323' or client.CREATED_BY != '324' or client.CREATED_BY != '360' or client.CREATED_BY != '361' or client.CREATED_BY != '384' or client.CREATED_BY != '200' or client.CREATED_BY != '201' or client.CREATED_BY != '227' THEN client.sys_id END) InboundTotal FROM client INNER JOIN client_campaign ON client_campaign.client_ID = client.sys_id where client_campaign.creation_time between to_date(?, 'yyyy/mm/dd') and to_date(?, 'yyyy/mm/dd') GROUP BY client_campaign.campaign_id) All_Clients ON campaign.ID = All_Clients.CAMPAIGN_ID left JOIN campaign_project ON campaign.id = campaign_project.CAMPAIGN_ID left JOIN project p ON campaign_project.PROJECT_ID = p.PROJECT_ID LEFT JOIN RECORD_SEASON ON campaign.TOOL_ID = RECORD_SEASON.id joinStmt WHERE pramCondition campaign.campaign_title NOT LIKE '%Recycle%' START WITH campaign.parent_id = 0 CONNECT BY NOCYCLE campaign.parent_id = PRIOR campaign.ID ORDER BY campaign.campaign_title

getCampaignPrj = SELECT PROJECT_ID, PROJECT_NAME FROM PROJECT WHERE PROJECT_ID IN ( SELECT PROJECT_ID FROM CAMPAIGN_PROJECT WHERE CAMPAIGN_ID = ? )
getCampaignTool = SELECT ID, ENGLISH_NAME FROM RECORD_SEASON WHERE ID IN ( SELECT TOOL_ID FROM CAMPAIGN WHERE ID = ? OR PARENT_ID = ? )

getSyncClntCmpn = SELECT C.CAMPAIGN_TITLE, MAX(CC.CREATION_TIME) AS MAX, MIN(CC.CREATION_TIME) AS MIN FROM CAMPAIGN C LEFT JOIN CLIENT_CAMPAIGN CC ON C.ID = CC.CAMPAIGN_ID whrStmnt GROUP BY C.CAMPAIGN_TITLE
getSyncCmpnActvtyLst = SELECT C.CAMPAIGN_TITLE, C.ID, ISS.BEGIN_DATE, ISS.END_DATE FROM CAMPAIGN C LEFT JOIN ISSUE_STATUS ISS ON C.ID = ISS.BUSINESS_OBJ_ID WHERE (ISS.STATUS_NAME = '16' OR ISS.STATUS_NAME IS NULL) AND C.CAMPAIGN_TITLE IS NOT NULL AND ISS.BEGIN_DATE IS NOT NULL whrStmnt ORDER BY C.ID, ISS.BEGIN_DATE

getChannelCampaigns=SELECT * FROM CAMPAIGN WHERE CURRENT_STATUS='16' and  TOOL_ID IN (SELECT ID FROM RECORD_SEASON WHERE S_TYPECODE IN (SELECT S_TYPECODE FROM SEASON_TYPE WHERE ID = ?))

campaignComparison=SELECT to_char(CL.CREATION_TIME, 'yyyy-mm') YEAR, CA.CAMPAIGN_TITLE ,COUNT (CL.ID) CLNT_CNT FROM CLIENT_CAMPAIGN CL LEFT JOIN CAMPAIGN CA ON CL.CAMPAIGN_ID = CA.ID WHERE CA.ID IS NOT NULL  whrStmnt GROUP BY to_char(CL.CREATION_TIME, 'yyyy-mm'), CA.CAMPAIGN_TITLE ORDER BY to_char(CL.CREATION_TIME, 'yyyy-mm'), CA.CAMPAIGN_TITLE
getAllCampaign = SELECT C.*, U.FULL_NAME FROM CAMPAIGN C LEFT JOIN USERS U ON C.CREATED_BY = U.USER_ID WHERE c.direction in ('4')
updateCampaignTitle = UPDATE CAMPAIGN SET CAMPAIGN_TITLE = ? WHERE ID = ?
mainCampaignClientsReport=SELECT A.*, CASE WHEN B.SOLD_COUNT IS NOT NULL THEN B.SOLD_COUNT ELSE 0 END SOLD_COUNT FROM (SELECT SUM(CLIENT_COUNT) CLIENT_COUNT, Y.ID, CP.CAMPAIGN_TITLE FROM (SELECT CLIENT_COUNT, CASE WHEN PARENT_ID = '0' THEN ID ELSE PARENT_ID END ID FROM (SELECT COUNT(CLIENT_NO) CLIENT_COUNT, CP.PARENT_ID, CP.ID FROM CLIENT C INNER JOIN (SELECT DISTINCT CLIENT_ID, CAMPAIGN_ID FROM CLIENT_CAMPAIGN whereStatement) CC  ON C.SYS_ID = CC.CLIENT_ID INNER JOIN CAMPAIGN CP ON  CC.CAMPAIGN_ID = CP.ID GROUP BY CP.ID, CP.PARENT_ID) T) Y LEFT JOIN CAMPAIGN CP ON Y.ID = CP.ID GROUP BY Y.ID, CP.CAMPAIGN_TITLE) A LEFT JOIN (SELECT SUM(SOLD_COUNT) SOLD_COUNT, Y.ID, CP.CAMPAIGN_TITLE FROM (SELECT SOLD_COUNT, CASE WHEN PARENT_ID = '0' THEN ID ELSE PARENT_ID END ID FROM (SELECT COUNT(CLIENT_NO) SOLD_COUNT, CP.PARENT_ID, CP.ID FROM CLIENT C INNER JOIN (SELECT DISTINCT CLIENT_ID, CAMPAIGN_ID FROM CLIENT_CAMPAIGN whereStatement) CC  ON C.SYS_ID = CC.CLIENT_ID INNER JOIN CAMPAIGN CP ON  CC.CAMPAIGN_ID = CP.ID WHERE C.SYS_ID IN (SELECT CLIENT_PROJECTS.CLIENT_ID FROM CLIENT_PROJECTS WHERE CLIENT_PROJECTS.PRODUCT_ID = 'purche') GROUP BY CP.ID, CP.PARENT_ID) T) Y LEFT JOIN CAMPAIGN CP ON Y.ID = CP.ID GROUP BY Y.ID, CP.CAMPAIGN_TITLE) B ON A.ID = B.ID
getCampaignStatuses=SELECT * FROM STATUS_TYPE WHERE BUSINESS_TYPE = 'Campaign'
getUserDepartmentsCampaigns=SELECT * FROM CAMPAIGN WHERE CREATED_BY IN (SELECT OPTION_ONE FROM PROJECT WHERE PROJECT_ID IN (SELECT DEPARTMENT_ID FROM USER_DEPARTMENT_CONFIG WHERE USER_ID = ?))
getPorjectsCampaigns=SELECT CM.*, CP.PROJECT_ID, P.PROJECT_NAME FROM CAMPAIGN CM LEFT JOIN CAMPAIGN_PROJECT CP ON CM.ID = CP.CAMPAIGN_ID RIGHT JOIN PROJECT P ON CP.PROJECT_ID = P.PROJECT_ID WHERE CM.PARENT_ID = '0' AND CM.CURRENT_STATUS != '19' whereStatement ORDER BY CM.ID
getDaysRatioCampaigns=SELECT A.* FROM (SELECT COUNT(CLIENT_NO) CLIENT_COUNT, CP.ID, CP.CAMPAIGN_TITLE ,CP.OBJECTIVE TARGET_COUNT ,floor (CP.TO_DATE-CP.FROM_DATE) TOTALL_DAY,floor (CP.TO_DATE-SYSDATE+1) REMAINING_DAYS,floor(SYSDATE-CP.from_date) last_days  FROM CLIENT C INNER JOIN (SELECT DISTINCT CLIENT_ID, CAMPAIGN_ID FROM CLIENT_CAMPAIGN  ) CC  ON C.SYS_ID = CC.CLIENT_ID RIGHT JOIN CAMPAIGN CP ON  CC.CAMPAIGN_ID = CP.ID GROUP BY CP.ID, CP.CAMPAIGN_TITLE,CP.OBJECTIVE,CP.from_date,CP.TO_DATE) A 
getBrokersCampaigns=SELECT DISTINCT C.* FROM USERS U INNER JOIN CAMPAIGN C ON C.CAMPAIGN_TITLE LIKE ('%' || U.FULL_NAME)
getCampaignClientsDetails=SELECT COUNT(*) TOTAL_CLIENT, CP.CAMPAIGN_TITLE, R.PROJECT_NAME RATE_NAME FROM CLIENT C INNER JOIN CLIENT_CAMPAIGN CC ON C.SYS_ID = CC.CLIENT_ID AND CC.CAMPAIGN_ID IN (SELECT ID FROM CAMPAIGN WHERE PARENT_ID = ?) AND TRUNC(C.CREATION_TIME) >= ? AND TRUNC(C.CREATION_TIME) <= ? LEFT JOIN CAMPAIGN CP ON CC.CAMPAIGN_ID = CP.ID LEFT JOIN CLIENT_RATING CR ON C.SYS_ID = CR.CLIENT_ID LEFT JOIN PROJECT R ON CR.RATE_ID = R.PROJECT_ID GROUP BY CP.CAMPAIGN_TITLE, R.PROJECT_NAME
getCampainInfo=select CAMPAIGN_TITLE, FROM_DATE,CAMPAIGN.TO_DATE,CAMPAIGN.COST, status_type.CASE_EN, count(distinct CLIENT_CAMPAIGN.CLIENT_ID) Total_Campaign_Client, peroid_tables.CLIENT_ID AS period_client , maxdatetable.max_date AS MaxClientDate, users.user_name,CAMPAIGN.CREATION_TIME from   CAMPAIGN inner join  STATUS_TYPE on CAMPAIGN.CURRENT_STATUS = STATUS_TYPE.ID and BUSINESS_TYPE = 'Campaign' inner join  CLIENT_CAMPAIGN on campaign.id = client_campaign.campaign_id inner join users on CAMPAIGN.CREATED_BY = users.user_id left outer join (select CAMPAIGN_ID, count(distinct CLIENT_ID) AS CLIENT_ID from CLIENT_CAMPAIGN  where  CLIENT_CAMPAIGN.creation_time between TO_DATE(?,'yyyy/MM/dd') AND TO_DATE(?,'yyyy/MM/dd') group by CAMPAIGN_ID) Peroid_Tables on CAMPAIGN.id = Peroid_Tables.CAMPAIGN_ID  left outer join (select CAMPAIGN_ID, max(CLIENT_CAMPAIGN.creation_time) as max_date from   CLIENT_CAMPAIGN group by CAMPAIGN_ID) MaxDateTable on CAMPAIGN.id = MaxDateTable.CAMPAIGN_ID  where  CAMPAIGN.ID = ? group by CAMPAIGN_TITLE,FROM_DATE,CAMPAIGN.TO_DATE, CAMPAIGN.COST, status_type.CASE_EN, peroid_tables.CLIENT_ID, maxdatetable.max_date, users.user_name,CAMPAIGN.CREATION_TIME

