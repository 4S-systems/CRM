insertSeason=INSERT INTO season_type values(?,?,?,?,?,?,?,?,SYSDATE,?)
updateSeason=update season_type set S_TYPECODE=? , ENGLISHNAME=? ,ARABICNAME=? ,PREP_SHLDER=? ,CL_SHLDER=?, DISPLAY = ? where ID=?
getAllSeasoncodes = select ID , S_TYPECODE ,IMAGE_NAME ,ARABICNAME FROM season_type

communicationChannelsComparison = SELECT to_char(CL.CREATION_TIME, 'yyyy-mm') YEAR, ST.ENGLISHNAME, ST.ARABICNAME, COUNT(CL.SYS_ID) CLNT_CNT FROM CLIENT CL LEFT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID WHERE ST.ID IS NOT NULL whrStmnt GROUP BY to_char(CL.CREATION_TIME, 'yyyy-mm'), ST.ENGLISHNAME, ST.ARABICNAME ORDER BY to_char(CL.CREATION_TIME, 'yyyy-mm'), ST.ENGLISHNAME
getChannlesExpenses=SELECT ST.*, CE.EXPENSE_DATE, CE.CURRENCY_TYPE, CE.AMOUNT, CE.OPTION1 EXCHANGE_RATE, CE.OPTION2 PAID_AMOUNT, CL.NAME COMPANY_NAME FROM SEASON_TYPE ST RIGHT JOIN CHANNELS_EXPENSE CE ON ST.ID = CE.CHANNEL_ID LEFT JOIN CLIENT CL ON CE.COMPANY_ID = CL.SYS_ID WHERE CE.EXPENSE_DATE BETWEEN ? AND ? ORDER BY ST.ENGLISHNAME
getCommunicationsClassificationsStat=SELECT ST.ENGLISHNAME CHANNEL_NAME countStatement FROM CLIENT CL RIGHT JOIN SEASON_TYPE ST ON CL.OPTION3 = ST.ID LEFT JOIN CLIENT_RATING CR ON CL.SYS_ID = CR.CLIENT_ID LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID WHERE TRUNC(CL.CREATION_TIME) BETWEEN ? AND ? AND CR.CREATED_BY IN (SELECT USER_ID FROM USER_GROUP WHERE GROUP_ID = ?) GROUP BY ST.ENGLISHNAME

getSpecificCodeForSType=select * from SEASON_TYPE where lower(ENGLISHNAME) =?
updateSeasonDisplayHide=UPDATE SEASON_TYPE SET DISPLAY = ? WHERE ID = ?
getSeasonTotalClientsNo=SELECT COUNT(*) TOTAL_NO FROM CLIENT WHERE OPTION3 = ?