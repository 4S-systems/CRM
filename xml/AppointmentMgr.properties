getCallTypeStatByUsrID = select count(Appointment.CLIENT_ID) As Total, Appointment.OPTION2 From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE USER_ID = ? AND CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN (?) AND TRUNC(CO2.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')) where TRUNC(Appointment.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd') and  Appointment.OPTION9 in (?) group by Appointment.OPTION2
getCallResultStatByUsrID = select count(Appointment.CLIENT_ID) As Total, Appointment.NOTE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE USER_ID = ? AND CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN (?) AND TRUNC(CO2.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')) where TRUNC(Appointment.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd') and  Appointment.OPTION9 in (?) group by Appointment.NOTE
getDeptsStatistic=select project.project_name, users.full_name, count(case when Appointment.OPTION2 like '%call%' THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%' THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting' THEN Appointment.client_ID END) as meeting, Sum(case when Appointment.OPTION2 = 'meeting' THEN Appointment.CALL_DURATION END) as meeting_duration, Appointment.USER_ID, option_one from Appointment inner join users on Appointment.user_id = users.USER_ID inner join EMP_MGR on EMP_MGR.EMP_ID = Appointment.USER_ID inner join project on EMP_MGR.MGR_ID = project.option_one where Appointment.user_id in (select emp_id from EMP_MGR where (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting')) and Appointment.creation_time between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')+1 and Appointment.OPTION9 not in ('not answered','wrong number') group by option_one, project.project_name, Appointment.USER_ID, users.full_name order by Appointment.user_id 
getAppointmentsByClientIDNew=select USERS.FULL_NAME ,APPOINTMENT.CREATION_TIME ,APPOINTMENT.APPOINTMENT_DATE ,APPOINTMENT.NOTE, APPOINTMENT."COMMENT", APPOINTMENT.CURRENT_STATUS,status_type.CASE_AR from APPOINTMENT INNER JOIN USERS On APPOINTMENT.USER_ID = USERS.USER_ID inner join status_type on appointment.current_status = status_type.id where APPOINTMENT.CLIENT_ID = ? ORDER BY APPOINTMENT.CREATION_TIME
getAppointmentDetails=select Client.NAME,users.FULL_NAME, Appointment.creation_time,Appointment.APPOINTMENT_DATE, Appointment. "COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE, Appointment.CLIENT_ID, Appointment.APPOINTMENT_PLACE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID where Appointment.creation_time between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')+1 whereStatement and Appointment.OPTION2 = 'meeting' and trunc(Appointment.appointment_date) <= trunc(sysdate)
getFuturedAppointmentDetails=select Client.NAME,users.FULL_NAME, Appointment.creation_time,Appointment.APPOINTMENT_DATE, Appointment. "COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE, Appointment.CLIENT_ID, Appointment.APPOINTMENT_PLACE, C.COMMENT_DESC, C.CREATION_TIME COMMENTED_ON_TIME From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID LEFT JOIN (SELECT * FROM COMMENTS WHERE ID = (SELECT MAX(ID) FROM COMMENTS WHERE CREATED_BY = ?)) C ON C.BUSNIESS_OBJECT_ID = CLIENT.SYS_ID where TRUNC(Appointment.appointment_date) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd') and Appointment.current_status in ('23') and Appointment.OPTION2 = 'meeting' and TRUNC(Appointment.appointment_date) >= TRUNC(sysdate)

getMyFuturedAppointmentDetails = SELECT Client.NAME, users.FULL_NAME, Appointment.creation_time, Appointment.APPOINTMENT_DATE, Appointment."COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE, Appointment.CLIENT_ID, Appointment.APPOINTMENT_PLACE FROM Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID where Appointment.USER_ID = ? AND Appointment.creation_time between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')+1 and Appointment.current_status in ('23') and Appointment.OPTION2 = 'meeting' and TRUNC(Appointment.appointment_date) > sysdate
getMyAppointmentDetails = select Client.NAME, users.FULL_NAME, Appointment.creation_time, Appointment.APPOINTMENT_DATE, Appointment."COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE, Appointment.CLIENT_ID, Appointment.APPOINTMENT_PLACE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID where Appointment.USER_ID = ? AND TRUNC(Appointment.creation_time) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd') whereStatement and Appointment.OPTION2 = 'meeting' and trunc(Appointment.appointment_date) <= trunc(sysdate)

getClientStatistic =SELECT AP.CLIENT_ID, P.PROJECT_NAME AS RATE, CL.NAME, U.FULL_NAME, COUNT(CASE WHEN AP.OPTION2 IN ('inboundcall', 'Follow', 'call', 'outbouncall') THEN AP.OPTION2 END) AS CALL, COUNT(CASE WHEN AP.OPTION2 IN ('Transfer To Other Area', 'meeting') AND AP.OPTION9 = 'attended' THEN AP.OPTION2 END) AS MEETING FROM APPOINTMENT AP LEFT JOIN CLIENT_RATING CR ON AP.CLIENT_ID = CR.CLIENT_ID LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID LEFT JOIN USERS U ON CR.CREATED_BY = U.USER_ID INNER JOIN CLIENT CL ON AP.CLIENT_ID = CL.SYS_ID WHERE TRUNC(AP.CREATION_TIME) BETWEEN TO_DATE(?,'yyyy/mm/dd') AND TO_DATE(?,'yyyy/mm/dd') whereStatement GROUP BY AP.CLIENT_ID, CL.NAME, CR.RATE_ID, P.PROJECT_NAME, U.FULL_NAME
getFutureAppointment=SELECT * FROM APPOINTMENT WHERE CLIENT_ID = ? AND TRUNC(APPOINTMENT_DATE) > TRUNC(SYSDATE) ORDER BY APPOINTMENT_DATE

getJOComplaint = SELECT CC.ID AS complaintID, OCC.ISSUE_ID, CL.SYS_ID, CL.CLIENT_NO, CL.NAME, CL.PHONE, CL.MOBILE, CL.EMAIL, DL.ANY_COMMENT, CC.SERV_LEVEL_AGR, ST.CASE_EN, CC.CREATION_TIME, ORU.FULL_NAME, ORU.USER_ID, eqClass.PROJECT_ID AS eqClassID, eqClass.PROJECT_NAME AS eqClassName, OIss.ID AS originalIssID, eq.PROJECT_ID AS eq_ID, eq.PROJECT_NAME AS eq_Name FROM CLIENT_COMPLAINTS CC LEFT JOIN ISSUE ISS ON CC.ISSUE_ID = ISS.ID LEFT JOIN CLIENT CL ON ISS.URGENCY_ID = CL.SYS_ID LEFT JOIN DISTRIBUTION_LIST DL ON CC.ID = DL.CLIENT_COM_ID LEFT JOIN STATUS_TYPE ST ON ST.ID = CC.CURRENT_STATUS LEFT JOIN CLIENT_COMPLAINTS OCC ON OCC.ID = CC.PRODUCT_CATEGORY_ID LEFT JOIN DISTRIBUTION_LIST ODL ON OCC.ID = ODL.CLIENT_COM_ID LEFT JOIN USERS ORU ON ORU.USER_ID = ODL.RECEIP_ID LEFT JOIN CLIENT_COMPLAINTS_SLA OCCS ON OCC.ID = OCCS.ID LEFT JOIN PROJECT eqClass ON OCCS.OPTION2 = eqClass.PROJECT_ID LEFT JOIN ISSUE OIss ON OCC.ISSUE_ID = OIss.ID LEFT JOIN APPOINTMENT OAP ON OCC.ID = OAP.CLIENT_COMPLAINT_ID LEFT JOIN PROJECT eq ON OAP.OPTION6 = eq.PROJECT_ID WHERE CC.CURRENT_OWNER_ID = ? AND CC.BUSINESS_COMP_ID LIKE 'QA%'

getLastComment = SELECT "COMMENT", ID FROM APPOINTMENT WHERE CLIENT_ID = ? AND APPOINTMENT_DATE = (SELECT MAX(APPOINTMENT_DATE) FROM APPOINTMENT WHERE CLIENT_ID = ?)


getFutureEmpStatistic=select Appointment.USER_ID , users.full_name, count(case when Appointment.OPTION2 like '%call%' THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%' THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting' THEN Appointment.client_ID END) as meeting, Sum(case when Appointment.OPTION2 = 'meeting' THEN Appointment.CALL_DURATION END) as meeting_duration, count(case when Appointment.OPTION2 like '%call%' THEN Appointment.client_ID END) as not_answred, count(distinct client_id) as total_clients from Appointment inner join users on Appointment.user_id = users.USER_ID where Appointment.CURRENT_STATUS='23' and Appointment.user_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ? )) and (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting') and (TRUNC(Appointment.creation_time) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd') OR TRUNC(Appointment.APPOINTMENT_DATE) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')) group by Appointment.USER_ID, users.full_name order by Appointment.user_id 


getNotAnsweredAppointments = select a.CREATION_TIME, a.NOTE, a.APPOINTMENT_DATE, a.APPOINTMENT_PLACE, a.CALL_DURATION, a."COMMENT", u.FULL_NAME as EmpName , c.NAME as ClientName , c.MOBILE,  c.SYS_ID from APPOINTMENT a left join users u on a.USER_ID = u.USER_ID left join client c on a.CLIENT_ID  =c.SYS_ID where  a.OPTION9 like '%not answered%' and a.USER_ID = ? and TRUNC(a.creation_time) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd') AND TRUNC(a.APPOINTMENT_DATE) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')


getWrongNumberAppointments = select a.CREATION_TIME, a.NOTE, a.APPOINTMENT_DATE, a.APPOINTMENT_PLACE, a.CALL_DURATION, a."COMMENT", u.FULL_NAME as EmpName , c.NAME as  ClientName , c.MOBILE,  c.SYS_ID from APPOINTMENT a left join users u on a.USER_ID = u.USER_ID left join client c on a.CLIENT_ID  =c.SYS_ID where a.OPTION9 like '% wrong number%' and a.USER_ID = ? and TRUNC(a.creation_time) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd') AND TRUNC(a.APPOINTMENT_DATE) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')

getAnsweredAppointments = select a.CREATION_TIME, a.NOTE, a.APPOINTMENT_DATE, a.APPOINTMENT_PLACE, a.CALL_DURATION, a."COMMENT", u.FULL_NAME as EmpName , c.NAME as ClientName , c.MOBILE,  c.SYS_ID from APPOINTMENT a left join users u on a.USER_ID = u.USER_ID left join client c on a.CLIENT_ID  =c.SYS_ID where  a.OPTION9 like '%answered%' and a.USER_ID = ? and TRUNC(a.creation_time) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd') AND TRUNC(a.APPOINTMENT_DATE) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')

