insertAppointment= INSERT INTO APPOINTMENT values(?,?,?,SYSDATE,?,?,?,?,?,?,?,?,?,?, ?, SYSDATE,?,?,?,?,?,?,?,?)
deleteAppointment=delete from APPOINTMENT where id =?
updateAppointment=update APPOINTMENT set title=? ,note=?,APPOINTMENT_DATE=?, CREATION_TIME=SYSDATE, user_id=?, option1=? , option2=?, option3=?, CURRENT_STATUS = ?, CURRENT_STATUS_SINCE = SYSDATE , "COMMENT" = "COMMENT" || ?, CALL_DURATION = ?, APPOINTMENT_PLACE = ?, OPTION9 = ? where id=?
userAppointment=select distinct(APPOINTMENT_DATE),APPOINTMENT_FOR,CLIENT_ID from APPOINTMENT where APPOINTMENT_FOR = ? and APPOINTMENT_DATE between to_date('beginDate','yyyy/mm/dd') and to_date('endDate','yyyy/mm/dd')
userAppointmentByDate=select * from APPOINTMENT where  APPOINTMENT_FOR = ? and TRUNC(APPOINTMENT_DATE) = to_date('ppp','yyyy/mm/dd') order by APPOINTMENT_DATE asc
userCountAppointmentByDate=select count(*) from APPOINTMENT where  APPOINTMENT_FOR = ? AND CURRENT_STATUS <> '24' AND CURRENT_STATUS <> '29' AND TRUNC(APPOINTMENT_DATE) = to_date('ppp','yyyy/mm/dd') 
updateAppointmentFor=UPDATE APPOINTMENT SET APPOINTMENT_FOR = ?, OPTION4 = ? WHERE ID = ?
updateCurrentStatus=UPDATE APPOINTMENT SET CURRENT_STATUS = ?, CURRENT_STATUS_SINCE = SYSDATE WHERE ID = ?
updateNote=UPDATE APPOINTMENT SET NOTE = ? WHERE ID = ?
acceptAppointment=UPDATE APPOINTMENT SET OPTION6 = '1' WHERE ID = ?
updateAppointmentComment= UPDATE APPOINTMENT SET "COMMENT" = "COMMENT" || ? , APPOINTMENT_PLACE = ? , CALL_DURATION = ? WHERE ID = ?
userAppointmentsReport=SELECT COUNT(AP.ID) APPOINTMENT_COUNT, US.FULL_NAME FROM APPOINTMENT AP, USERS US WHERE AP.APPOINTMENT_FOR = US.USER_ID
getJobOrdersList=SELECT AP.*, CL.NAME, CL.ADDRESS, CL.MOBILE, I.BUSINESS_ID, I.BUSINESS_ID_BY_DATE, IST.BEGIN_DATE COMPLAINT_STATUS_SINCE, IST.STATUS_NAME STATUS_CODE, P.PROJECT_NAME, ST.CASE_AR, ST.CASE_EN, U.FULL_NAME CURRENT_OWNER, UC.FULL_NAME CREATED_BY_NAME, MP.PROJECT_NAME BRANCHNAME, CCSLA.EXECUTION_PERIOD SLA_EXECUTION_PERIOD, P.MAIN_PROJ_ID AS comPrj FROM APPOINTMENT AP LEFT JOIN CLIENT CL ON AP.CLIENT_ID = CL.SYS_ID LEFT JOIN ISSUE I ON AP.ISSUE_ID = I.ID LEFT JOIN PROJECT P ON AP.OPTION6 = P.PROJECT_ID LEFT JOIN PROJECT MP ON P.MAIN_PROJ_ID = MP.PROJECT_ID LEFT JOIN CLIENT_COMPLAINTS CC ON CC.ID = AP.CLIENT_COMPLAINT_ID LEFT JOIN ISSUE_STATUS IST ON IST.BUSINESS_OBJ_ID = CC.ID AND IST.END_DATE IS NULL LEFT JOIN STATUS_TYPE ST ON IST.STATUS_NAME = ST.ID LEFT JOIN USERS U ON U.USER_ID = CC.CURRENT_OWNER_ID LEFT JOIN USERS UC ON AP.USER_ID = UC.USER_ID LEFT JOIN CLIENT_COMPLAINTS_SLA CCSLA ON CC.ID = CCSLA.ID WHERE AP.TITLE = 'Job Order'
getAppointmentProductions=SELECT COUNT(*) AS TOTAL, U.FULL_NAME FROM APPOINTMENT A INNER JOIN USERS U ON A.USER_ID = U.USER_ID WHERE A.USER_ID IN (SELECT UG.USER_ID FROM USER_GROUP UG WHERE UG.GROUP_ID = ?) AND  A.OPTION2 = ? AND A.CREATION_TIME BETWEEN TO_DATE(?,'dd-MM-YYYY') AND TO_DATE(?,'dd-MM-YYYY') GROUP BY U.FULL_NAME
getAppointmentsByClientID=select USERS.FULL_NAME ,APPOINTMENT.CREATION_TIME ,APPOINTMENT."COMMENT" from APPOINTMENT INNER JOIN USERS On APPOINTMENT.USER_ID = USERS.USER_ID  where APPOINTMENT.CLIENT_ID = ?
getAppointmentsClients=SELECT DISTINCT CL.SYS_ID, CL.CLIENT_NO, CL.NAME, CL.MOBILE, CL.EMAIL, CL.INTER_PHONE, P.PROJECT_NAME RATE_NAME FROM CLIENT CL INNER JOIN APPOINTMENT AP ON CL.SYS_ID = AP.CLIENT_ID LEFT JOIN CLIENT_RATING CR ON CL.SYS_ID = CR.CLIENT_ID LEFT JOIN PROJECT P ON CR.RATE_ID = P.PROJECT_ID WHERE AP.CURRENT_STATUS IN ('24', '25', '26', '29') whereStatement ORDER BY CL.SYS_ID
getClientAppointments=SELECT AP.*, U.FULL_NAME CREATED_BY_NAME, ST.CASE_EN STATUS_NAME_EN, ST.CASE_AR STATUS_NAME_AR FROM APPOINTMENT AP LEFT JOIN USERS U ON AP.USER_ID = U.USER_ID LEFT JOIN STATUS_TYPE ST ON AP.CURRENT_STATUS = ST.ID WHERE  AP.CLIENT_ID = ? AND AP.APPOINTMENT_FOR LIKE '%createdBy%' AND (AP.CURRENT_STATUS IN ('24', '25', '26', '29') OR (AP.CURRENT_STATUS = '23' AND AP.APPOINTMENT_DATE < SYSDATE - 24)) whereStatement ORDER  BY AP.CREATION_TIME
getInternalCampaignAppointments=SELECT AP.*, CL.NAME, CL.PHONE, CL.MOBILE FROM APPOINTMENT AP LEFT JOIN CLIENT CL ON AP.CLIENT_ID = CL.SYS_ID WHERE AP.OPTION4 = ?

getEmpStatistic_old=select Appointment.USER_ID, users.full_name, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%'and Appointment.OPTION9 not in ('not answered','wrong number' ) THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting' and Appointment.OPTION9 in ('attended') THEN Appointment.client_ID END) as meeting, count(case when Appointment.OPTION2 = 'ts-meeting' and Appointment.OPTION9 in ('attended') THEN Appointment.client_ID END) as ts_meeting, count(case when Appointment.OPTION2 = 'sls-meeting' and Appointment.OPTION9 in ('attended') THEN Appointment.client_ID END) as sls_meeting, count(case when Appointment.OPTION2 = 'bkr-meeting' and Appointment.OPTION9 in ('attended') THEN Appointment.client_ID END) as bkr_meeting, Sum(case when Appointment.OPTION2 like '%meeting%' and Appointment.OPTION9 in ('attended') THEN Appointment.CALL_DURATION END) as meeting_duration, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 in ('not answered','wrong number') THEN Appointment.client_ID END) as not_answred, count(distinct client_id) as total_clients, ATT.CLIENT_COUNT , ANS.CLIENT_COUNT As ANS_CLIENT_COUNT, count(case when NEW_ANS.dist_client = 1 then dist_client else 0 end) As NEW_ANS_CLIENT_COUNT from Appointment inner join users on Appointment.user_id = users.USER_ID LEFT JOIN (SELECT COUNT(DISTINCT AP.CLIENT_ID) CLIENT_COUNT,AP.USER_ID FROM APPOINTMENT AP WHERE AP.OPTION9 = 'attended' AND USER_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) AND TRUNC(AP.CURRENT_STATUS_SINCE) BETWEEN TO_DATE(?,'yyyy/MM/dd') AND TO_DATE(?,'yyyy/MM/dd') GROUP BY AP.USER_ID) ATT ON APPOINTMENT.USER_ID = ATT.USER_ID  LEFT JOIN (SELECT COUNT(DISTINCT AP.CLIENT_ID) CLIENT_COUNT,  AP.USER_ID FROM APPOINTMENT AP WHERE AP.OPTION2 like '%call%' and OPTION9 is not null AND USER_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) AND TRUNC(AP.CURRENT_STATUS_SINCE) BETWEEN TO_DATE(?,'yyyy/MM/dd') AND TO_DATE(?,'yyyy/MM/dd') GROUP BY AP.USER_ID) ANS ON APPOINTMENT.USER_ID = ANS.USER_ID LEFT JOIN (SELECT count(AP.CLIENT_ID) dist_client , AP.USER_ID FROM APPOINTMENT AP WHERE OPTION9 is not null AND USER_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) GROUP BY AP.USER_ID) NEW_ANS ON APPOINTMENT.USER_ID = NEW_ANS.USER_ID where Appointment.user_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ? )) and (Appointment.option2 like '%call%' or Appointment.option2 like '%meeting%') and TRUNC(Appointment.CURRENT_STATUS_SINCE) between TO_DATE(?,'yyyy/MM/dd') AND TO_DATE(?,'yyyy/MM/dd') group by Appointment.USER_ID, users.full_name, ATT.CLIENT_COUNT, ANS.CLIENT_COUNT order by Appointment.user_id
getEmpStatistic=select uss.user_id,uss.full_name,ugo.group_name,nvl(count(DISTINCT dl.sys_id),0) as all_client,nvl(apt.distinct_client_count,0) as distinct_client_count,nvl(count(DISTINCT dl.sys_id),0) - nvl(apt.distinct_client_count,0) as diff,nvl(count(co.sys_id),0) AS nomination,nvl(count(coo.sys_id),0) AS direct,nvl(count(cooo.sys_id),0) AS indirect,nvl(count(co.sys_id) + count(coo.sys_id) + count(cooo.sys_id),0) total,nvl(count(res.project_id),0) as reserve,nvl(count(buy.status_name),0) as buyrel from DISTRIBUTION_LIST dl left join users uss on dl.receip_id = uss.user_id left join user_group ugo on uss.user_id = ugo.user_id and ugo.is_default = '1' left join EMP_MGR em on uss.user_id = em.emp_id left join project pp on em.mgr_id = pp.option_one left join client_complaints ccl on dl.client_com_id = ccl.id left join issue iss on ccl.issue_id = iss.id left join client cc on iss.urgency_id = cc.sys_id left join (SELECT ap.user_id, COUNT(DISTINCT ap.client_id) AS distinct_client_count FROM appointment ap where ap.CREATION_TIME >= TO_DATE(?,'yyyy/MM/dd') and ap.CREATION_TIME < TO_DATE(?,'yyyy/MM/dd') + interval '1' day AND ap.client_id IN (SELECT cc.SYS_ID FROM distribution_list dll LEFT JOIN client_complaints cck ON dll.client_com_id = cck.id LEFT JOIN issue iss ON cck.issue_id = iss.id LEFT JOIN client cc ON iss.urgency_id = cc.sys_id WHERE dll.RECEIP_ID = ap.user_id) GROUP BY ap.user_id) apt on dl.receip_id = apt.user_id left join (SELECT co.sys_id FROM client co WHERE co.option3 = '1' ) co on co.sys_id = cc.sys_id left join (SELECT co.sys_id FROM client co WHERE co.option3 = '2' ) coo on coo.sys_id = cc.sys_id left join (SELECT co.sys_id FROM client co WHERE co.option3 = '3' ) cooo on cooo.sys_id = cc.sys_id left join (select cp.client_id,cp.project_id from client_projects cp) res on res.client_id = cc.sys_id left join (select cp.client_id,isst.status_name from client_projects cp left join issue_status isst on cp.project_id = isst.business_obj_id where isst.status_name = '10' and isst.end_date is null) buy on buy.client_id = cc.sys_id where pp.PROJECT_ID = ? and dl.receive_date >= TO_DATE(?,'yyyy/MM/dd') and dl.receive_date < TO_DATE(?,'yyyy/MM/dd') + interval '1' day and length(dl.option2) > 3 and uss.user_id in (select isstu.business_obj_id from issue_status isstu where isstu.business_obj_id = uss.user_id and isstu.status_name = '21' and isstu.end_date is null) wherestatment group by uss.user_id,uss.full_name,ugo.group_name,apt.distinct_client_count order by LENGTH(ugo.group_name) DESC

getEmpClientStatistic=select Appointment.USER_ID , users.full_name,client.SYS_ID, client.NAME,  count(case when Appointment.OPTION2 like '%call%' THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%' THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting'  THEN Appointment.client_ID END) as meeting, Sum(case when Appointment.OPTION2 = 'meeting'  THEN Appointment.CALL_DURATION END) as meeting_duration from Appointment inner join users on Appointment.user_id = users.USER_ID inner join client on Appointment.CLIENT_ID = client.SYS_ID where Appointment.user_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting') and Appointment.creation_time between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')+1 and Appointment.OPTION9 not in ('not answered','wrong number') group by Appointment.USER_ID, users.full_name, client.SYS_ID, client.NAME order by Appointment.user_id
getClientCallStatistic=select COUNT(case when (OPTION2 like '%call' and OPTION9 = 'answered') THEN 1 ELSE null END) AS ANSWERED, COUNT(CASE WHEN (OPTION2 like '%call' and OPTION9  in ('not answered','wrong number')) THEN 1 ELSE NULL END) AS NOT_ANSWERED, users.FULL_NAME USER_NAME, Appointment.USER_ID from Appointment inner join users on Appointment.user_id = users.USER_ID LEFT JOIN (SELECT COUNT(DISTINCT AP.CLIENT_ID) CLIENT_COUNT, AP.USER_ID FROM APPOINTMENT AP WHERE AP.OPTION9 = 'attended' AND USER_ID IN (SELECT EMP_ID FROM EMP_MGR WHERE MGR_ID = (SELECT PROJECT.OPTION_ONE FROM PROJECT WHERE PROJECT.PROJECT_ID = ?)) AND TRUNC(AP.CURRENT_STATUS_SINCE) BETWEEN TO_DATE(?,'yyyy/MM/dd') AND TO_DATE(?,'yyyy/MM/dd') GROUP BY AP.USER_ID) ATT ON APPOINTMENT.USER_ID = ATT.USER_ID where Appointment.user_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ? )) and (Appointment.option2 like '%call%' or Appointment.option2 like '%meeting%') and TRUNC(Appointment.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd') whereStatement group by users.FULL_NAME , Appointment.USER_ID 
getAbstarctAnsweredDetailed=select users.FULL_NAME, Client.NAME, Appointment.CLIENT_ID, Appointment.APPOINTMENT_DATE, Appointment. "COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN ('answered', 'attended')) where Appointment.CURRENT_STATUS_SINCE between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')+1 and Appointment.OPTION9 in ('answered','attended')
getAnsweredDetailed=select users.FULL_NAME, Client.NAME, Appointment.CLIENT_ID, Appointment.APPOINTMENT_DATE, Appointment. "COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN ('answered', 'attended')) where Appointment.user_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and Appointment.CURRENT_STATUS_SINCE between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')+1 and  Appointment.OPTION9 in ('answered','attended')
getAnsweredDetailedWithCampaign=select users.FULL_NAME, Client.NAME, Appointment.CLIENT_ID, Appointment.APPOINTMENT_DATE, Appointment. "COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN ('answered', 'attended')) inner join CLIENT_CAMPAIGN on CLIENT.SYS_ID = CLIENT_CAMPAIGN.CLIENT_ID inner join CAMPAIGN on CAMPAIGN.ID = CLIENT_CAMPAIGN.CAMPAIGN_ID where Appointment.user_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and Appointment.CURRENT_STATUS_SINCE between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')+1 and  Appointment.OPTION9 in ('answered','attended') and CAMPAIGN_ID = ? whrStmnt
