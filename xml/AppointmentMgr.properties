getNotAnsweredDetailed=select users.FULL_NAME, Client.NAME, Appointment.CLIENT_ID, Appointment.APPOINTMENT_DATE, Appointment. "COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN ('wrong number','not answered')) where Appointment.user_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and Appointment.CURRENT_STATUS_SINCE between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')+1 and Appointment.OPTION9 in ('wrong number','not answered')
getAbstractNotAnsweredDetailed=select users.FULL_NAME, Client.NAME, Appointment.CLIENT_ID, Appointment.APPOINTMENT_DATE, Appointment. "COMMENT", Appointment.OPTION2, Appointment.OPTION9, Appointment.OPTION8, Appointment.CALL_DURATION, Appointment.NOTE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN ('wrong number','not answered')) where Appointment.CURRENT_STATUS_SINCE between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd')+1 and Appointment.OPTION9 in ('wrong number','not answered')
