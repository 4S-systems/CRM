getCallTypeStatWithCampaign=select count(Appointment.CLIENT_ID) As Total, Appointment.OPTION2 From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN (?) AND TRUNC(CO2.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')) inner join CLIENT_CAMPAIGN on CLIENT.SYS_ID = CLIENT_CAMPAIGN.CLIENT_ID inner join CAMPAIGN on CAMPAIGN.ID = CLIENT_CAMPAIGN.CAMPAIGN_ID where Appointment.user_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and TRUNC(Appointment.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd') and  Appointment.OPTION9 in (?) and CAMPAIGN_ID = ? whrStmnt group by Appointment.OPTION2
getCallTypeStatWithCampaignOnly=select count(Appointment.CLIENT_ID) As Total, Appointment.OPTION2 From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN (?) AND TRUNC(CO2.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')) inner join CLIENT_CAMPAIGN on CLIENT.SYS_ID = CLIENT_CAMPAIGN.CLIENT_ID inner join CAMPAIGN on CAMPAIGN.ID = CLIENT_CAMPAIGN.CAMPAIGN_ID where TRUNC(Appointment.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd') and  Appointment.OPTION9 in (?) and CAMPAIGN_ID = ? whrStmnt group by Appointment.OPTION2
getCallResultStat=select count(Appointment.CLIENT_ID) As Total, Appointment.NOTE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN (?) AND TRUNC(CO2.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')) where Appointment.user_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and TRUNC(Appointment.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd') and  Appointment.OPTION9 in (?) group by Appointment.NOTE
getAbstractCallResultStat=select count(Appointment.CLIENT_ID) As Total, Appointment.NOTE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN (?) AND TRUNC(CO2.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')) where TRUNC(Appointment.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd') and  Appointment.OPTION9 in (?) group by Appointment.NOTE
getCallResultStatWithCampaign=select count(Appointment.CLIENT_ID) As Total, Appointment.NOTE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN (?) AND TRUNC(CO2.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')) inner join CLIENT_CAMPAIGN on CLIENT.SYS_ID = CLIENT_CAMPAIGN.CLIENT_ID inner join CAMPAIGN on CAMPAIGN.ID = CLIENT_CAMPAIGN.CAMPAIGN_ID where Appointment.user_id in (select emp_id from EMP_MGR where MGR_ID = (select project.option_one from project where project.project_id = ?)) and TRUNC(Appointment.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd') and  Appointment.OPTION9 in (?) and CAMPAIGN_ID = ? whrStmnt group by Appointment.NOTE
getCallResultStatWithCampOnly=select count(Appointment.CLIENT_ID) As Total, Appointment.NOTE From Appointment inner join users on Appointment.USER_ID = users.USER_ID inner join Client on Appointment.CLIENT_ID = Client.SYS_ID and Appointment.CURRENT_STATUS_SINCE = (SELECT MAX(CO2.CURRENT_STATUS_SINCE) FROM APPOINTMENT CO2 WHERE CO2.CLIENT_ID = Client.SYS_ID AND CO2.OPTION9 IN (?) AND TRUNC(CO2.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd')) inner join CLIENT_CAMPAIGN on CLIENT.SYS_ID = CLIENT_CAMPAIGN.CLIENT_ID inner join CAMPAIGN on CAMPAIGN.ID = CLIENT_CAMPAIGN.CAMPAIGN_ID where TRUNC(Appointment.CURRENT_STATUS_SINCE) between to_date(?,'yyyy/mm/dd') and to_date(?,'yyyy/mm/dd') and  Appointment.OPTION9 in (?) and CAMPAIGN_ID = ? whrStmnt group by Appointment.NOTE
updateAppointmentResult=UPDATE APPOINTMENT SET OPTION9 = ?, NOTE = ? WHERE ID = ?
getMyCallCenterStat=SELECT COUNT(CASE WHEN OPTION9 = 'answered' THEN 1 END) AS ANSWERED, COUNT(CASE WHEN OPTION9 = 'not answered' THEN 1 END) AS NOT_ANSWERED, FULL_NAME USER_NAME, USER_ID FROM (SELECT DISTINCT CL.SYS_ID, CL.NAME, AP.OPTION9, U.FULL_NAME, U.USER_ID FROM APPOINTMENT AP LEFT JOIN CLIENT CL ON AP.CLIENT_ID = CL.SYS_ID LEFT JOIN USERS U ON AP.USER_ID = U.USER_ID WHERE AP.USER_ID = ? AND AP.OPTION9 IN ('answered', 'not answered') AND TRUNC(AP.CURRENT_STATUS_SINCE) BETWEEN ? AND ? whrStmnt) GROUP BY FULL_NAME, USER_ID ORDER BY FULL_NAME

