getEmpStatisticByGroup=select Appointment.USER_ID , users.full_name, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 not in ('not answered','wrong number') THEN Appointment.client_ID END) as call, Sum(case when Appointment.OPTION2 like '%call%'and Appointment.OPTION9 not in ('not answered','wrong number' ) THEN Appointment.CALL_DURATION END) as call_duration, count(case when Appointment.OPTION2 = 'meeting' and Appointment.OPTION9 in ('attended') THEN Appointment.client_ID END) as meeting, Sum(case when Appointment.OPTION2 = 'meeting'and Appointment.OPTION9 in ('attended') THEN Appointment.CALL_DURATION END) as meeting_duration, count(case when Appointment.OPTION2 like '%call%' and Appointment.OPTION9 in ('not answered','wrong number') THEN Appointment.client_ID END) as not_answred, count(distinct client_id) as total_clients from Appointment inner join users on Appointment.user_id = users.USER_ID where Appointment.user_id in (SELECT UG.USER_ID FROM USER_GROUP UG WHERE UG.GROUP_ID = ?) and (Appointment.option2 like '%call%' or Appointment.option2 = 'meeting') and TRUNC(Appointment.creation_time) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd') AND TRUNC(Appointment.APPOINTMENT_DATE) between to_date(?,'yyyy/MM/dd') and to_date(?,'yyyy/MM/dd') group by Appointment.USER_ID, users.full_name order by Appointment.user_id
updateAppointmentResultNewResult = UPDATE APPOINTMENT SET OPTION9 = ? WHERE ID = ?
deleteAllFutureAppointments=DELETE FROM APPOINTMENT WHERE CLIENT_ID = ? AND APPOINTMENT_DATE > SYSDATE
getFutureClientAppointments=SELECT AP.*, U.FULL_NAME CREATED_BY_NAME, ST.CASE_EN STATUS_NAME_EN, ST.CASE_AR STATUS_NAME_AR FROM APPOINTMENT AP LEFT JOIN USERS U ON AP.USER_ID = U.USER_ID LEFT JOIN STATUS_TYPE ST ON AP.CURRENT_STATUS = ST.ID WHERE  AP.CLIENT_ID = ?  AND AP.CURRENT_STATUS IN ('23') AND AP.APPOINTMENT_DATE > SYSDATE ORDER  BY AP.APPOINTMENT_DATE
updateAppointmentMeetingType=UPDATE APPOINTMENT SET OPTION2 = ? WHERE ID = ?
getEmployeeCallStatistics=SELECT SUM(CASE WHEN CALL_HOUR <= 12 THEN TOTAL ELSE 0 END) TOTAL12, SUM(CASE WHEN CALL_HOUR <= 15 THEN TOTAL ELSE 0 END) TOTAL15, SUM(CASE WHEN CALL_HOUR <= 18 THEN TOTAL ELSE 0 END) TOTAL18, SUM(CASE WHEN CALL_HOUR <= 21 THEN TOTAL ELSE 0 END) TOTAL21 FROM (SELECT COUNT(EXTRACT(HOUR FROM AP.CURRENT_STATUS_SINCE)) AS TOTAL, EXTRACT(HOUR FROM AP.CURRENT_STATUS_SINCE) AS CALL_HOUR FROM APPOINTMENT AP LEFT JOIN USERS U ON AP.USER_ID = U.USER_ID LEFT JOIN STATUS_TYPE ST ON AP.CURRENT_STATUS = ST.ID WHERE AP.APPOINTMENT_FOR LIKE ? AND (AP.CURRENT_STATUS IN ('24', '25', '26', '29') OR (AP.CURRENT_STATUS = '23' AND AP.APPOINTMENT_DATE < SYSDATE - 24)) AND TRUNC(AP.CURRENT_STATUS_SINCE) = ? AND AP.OPTION2 LIKE '%call%' GROUP BY EXTRACT(HOUR FROM AP.CURRENT_STATUS_SINCE))
getAppointmentsCount=SELECT COUNT(*) APPOINTMENT_NO FROM APPOINTMENT WHERE APPOINTMENT_FOR = ? AND TRUNC(APPOINTMENT_DATE) = ? AND CURRENT_STATUS = '23'

getAppointmentsCountInPeriod=select count(ap.id) appointCount,(select full_name from users where user_id=ap.user_id) username,ap.user_id from appointment ap  where ap.user_id= ? and ap.current_status_since between ? and ? and ap.current_status='29'  group by ap.user_id