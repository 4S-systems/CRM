getClientComplaintList=SELECT * FROM issue_by_complaint where entry_date between to_char(to_date(?,'DD-MM-YY'),'DD-Mon-YY') and to_char(to_date(?,'DD-MM-YY'),'DD-Mon-YY') ORDER BY group_selector
getComplaints=  SELECT * FROM EMPLOYEE_VIEW2 WHERE USER_ID=? AND USER_ID=receip_id AND STATUS_CODE=? AND TICKET_TYPE=? AND entry_date between to_char(to_date(?,'DD-MM-YY'),'DD-Mon-YY') and to_char(to_date(?,'DD-MM-YY'),'DD-Mon-YY') order by entry_date 
getComplaintCountPerDepartment=SELECT department_name, COUNT(client_com_id) AS complaint_count FROM issue_by_complaint GROUP BY department_name ORDER BY department_name ASC
getDistributedClients=select EV2.*, U.FULL_NAME AS CREATEDBY from EMPLOYEE_VIEW2 EV2 LEFT JOIN USERS U ON EV2.CLIENT_CREATED_BY = U.USER_ID where EV2.status_code not in (5, 6, 7) and ev2.business_id = (select max(ev3.business_id) from EMPLOYEE_VIEW2 EV3 where ev3.customer_id = ev2.customer_id)
getDistributedClients2=select EV2.*, U.FULL_NAME AS CREATEDBY from EMPLOYEE_VIEW2 EV2 LEFT JOIN USERS U ON EV2.CLIENT_CREATED_BY = U.USER_ID where EV2.status_code not in (5, 6, 7) and EV2.COMP_SUBJECT IN (SELECT PROJECT_NAME FROM PROJECT WHERE LOCATION_TYPE = 'RQ-TYPE')
getDistributedClientsForPagination=SELECT * FROM (SELECT ISSUE_ID, ISSUE_TITLE, PROJECT_NAME, BUSINESS_ID, BUSINESS_ID_BY_DATE, BUSINESS_COMP_ID, COMP_ID, TICKET_TYPE, CURRENT_OWNER, CURRENT_OWNER_ID, CURRENT_OWNER_SINCE , TYPE_NAME, CUSTOMER_ID, CUSTOMER_NAME, AGE, USER_ID, USER_NAME, FULL_NAME, SENDER_ID, SENDER_NAME, ENTRY_DATE, ACKNOWLEDGE_DATE, COMP_SUBJECT, MANAGER_COMMENT, IS_ACKNOWLEDGED, COMMENTS, CLIENT_COM_ID, RECEIP_ID, RESP, SYS_ID, STATUS_CODE, STATUS_EN_NAME, STATUS_AR_NAME, CASE WHEN CLIENT_PHONE IS NULL OR CLIENT_PHONE = 'UL' THEN '' ELSE CLIENT_PHONE END CLIENT_PHONE, CASE WHEN CLIENT_MOBILE IS NULL OR CLIENT_MOBILE = 'UL' THEN '' ELSE CLIENT_MOBILE END CLIENT_MOBILE, CLIENT_OTHER, CLIENT_CREATED_BY, ROW_NUMBER() OVER (ORDER BY orderedBy) I FROM EMPLOYEE_VIEW2 WHERE STATUS_CODE NOT IN (5, 6, 7) whereStatement)
getDistributedClientsCount=SELECT COUNT(*) TOTAL_NO FROM EMPLOYEE_VIEW2 WHERE STATUS_CODE NOT IN (5, 6, 7) whereStatement

getMyClientRatedByNo=select * from client  left join employee_view2 ev2 on ev2.customer_id=client.sys_id left JOIN client_communication cc on cc.client_id=client.sys_id where (client.mobile LIKE '%searchBy%'or client.phone like '%searchBy%' or client.client_no like'%searchBy%' or cc.COMMUNICATION_VALUE like'%searchBy%' or inter_phone like '%searchBy%')and client.sys_id in (select client_id from client_rating where created_by= ? )  and  ev2.status_code not in (5, 6, 7) and ev2.CURRENT_OWNER_ID = ?
getMyClientRatedByName=select * from client  left join employee_view2 ev2 on ev2.customer_id=client.sys_id  where (LOWER(client.NAME) LIKE LOWER('%searchBy%') OR UPPER(client.NAME) LIKE UPPER('%searchBy%')) and client.sys_id in (select client_id from client_rating where created_by= ?)  and  ev2.status_code not in (5, 6, 7) and ev2.CURRENT_OWNER_ID = ? 
getMyClientRatedByDesc=select * from client  left join employee_view2 ev2 on ev2.customer_id=client.sys_id  where client.description like'%searchBy%' and client.sys_id in (select client_id from client_rating where created_by= ? )  and  ev2.status_code not in (5, 6, 7) and ev2.CURRENT_OWNER_ID = ?