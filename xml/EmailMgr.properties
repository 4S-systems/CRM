InsertEmail=Insert into CLIENT_EMAILS (ID,CLIENT_EMAIL,LABEL_IDS,TO_EMAILS,FROM_EMAIL,SUBJECT,PLAINTEXT,IS_SENT_REC_DRAFT,CREATEBY,DATE_EMAIL,CREATION_DATE)  values (?,?,?,?,?,?,?,?,?,?,?)
getClientMailBox=SELECT * FROM GMAIL_CLIENT_EMAILS where EMAIL = ? ORDER BY DATE_EMAIL DESC
getEmailsInPeriod=SELECT CE.*, C.NAME, C.MOBILE, C.PHONE, C.INTER_PHONE, C.SYS_ID FROM CLIENT_EMAILS CE RIGHT JOIN CLIENT C ON CE.CLIENT_EMAIL = C.EMAIL WHERE TRUNC(CE.DATE_EMAIL) BETWEEN ? AND ? AND CE.LABEL_IDS = ?

getAllEmails=SELECT DISTINCT CE.ID, CE.CLIENT_EMAIL, CE.DATE_EMAIL, CE.SUBJECT, CE.PLAINTEXT, CL.CLIENT_NO, CL.NAME, USR.FULL_NAME FROM CLIENT_EMAILS CE LEFT JOIN CLIENT CL ON CE.CLIENT_EMAIL = CL.EMAIL LEFT JOIN USERS USR ON CE.CREATEBY = USR.USER_ID WHERE TRUNC(CE.CREATION_DATE) BETWEEN ? AND ?