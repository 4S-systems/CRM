<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>

<title>Untitled Document</title>

<script type="text/javascript">
$(function(){
	$("#add_claim").click(function(){
	$("#claim_division").css("visibility","visible").toggle();
	
	
	});
	$("#add_order").click(function(){
	
	$("#claim_division").show($("#order_division").css("visibility","visible").toggle());
	});
	
	});

</script>
<style>

	table td{
	padding:2px;
	}
label{
	font:Verdana, Geneva, sans-serif;
	font-size:18px;
	font-weight:bold;
	color:#005599;
	}
#call_center{
	direction:rtl;
	padding:0px;
	margin:0px;
	color:#005599;
		height:600px;
	width:100%;
	position:relative;
	border:1px solid #f1f1f1;
	font:Verdana, Geneva, sans-serif;
	font-size:18px;
	font-weight:bold;
	
	}
#title{padding;10px;
	margin:0px 10px;
	height:30px;
	width:95%;
	text-align:center;
	
}
.text-success{
	font-family:Verdana, Geneva, sans-serif;
	font-size:24px;
	font-weight:bold;
	}

#unit_division {
	width:45%;
	float:left;
	height:200px;

	padding-left: 10px;

}
#customer_division {

}

	width:49%;
	float:left;
	height:75%;

#right_info{

	border:1px solid #555;

#claim_division {
	padding: 10px;

#order_division{

        </tr>

      	</tr>
         <tr>
        	<td>بيانات أخرى:</td>

      	</tr>
    </table>
  
  
  </div>
  <div id="customer_division">

  <tr>

    <td><input name="call_status" type="radio" value="incoming" /><label>واردة</label></td>
    <td><input name="call_status" type="radio" value="out_call" /><label>صادرة</label>

  </tr>

</table>

  </tr>
</table>

    </div>

  </div>
      <div style="width:96%;text-align:right;margin-top:2px; margin-right:5px">
    
     <input name="add_claim" id="add_claim" type="button" value="إضافة شكوى" class="btn btn-large btn-danger" />

  <tr>

    <td>

    </select>
   
    </td>

    </td>
  </tr>

 
</table>
   <div style="margin:5px;">
  	<input name="add_c" type="button" value="إضافة" class="btn btn-primary"/>

  </div>

  </tr>

 
</table>
   <div style="margin:5px;">
  	<input name="add_o" type="button" value="إضافة" class="btn btn-primary"/>
